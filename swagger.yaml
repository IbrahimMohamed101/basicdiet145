      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneE164, otp]
              properties:
                phoneE164:
                  type: string
                otp:
                  type: string
                  description: 6-digit code
      responses:
        '200':
          description: Verified.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/AuthUserProfile'
              example:
                ok: true
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                user:
                  id: 65f0f01f1f1f1f1f1f1f1f20
                  fullName: null
                  phone: "+966501234567"
                  email: null
                  role: client
                  createdAt: "2026-02-26T07:30:00.000Z"
        '400':
          description: Invalid input or expired/missing OTP.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid OTP.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: OTP attempts exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
