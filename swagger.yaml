        Currency in response is always `SAR` (system currency). If non-SAR plan currency exists in database, checkout validation rejects it server-side.
        Each plan includes active grams options and active meals options only, sorted by:
        - plans: `sortOrder ASC`, then `createdAt DESC`
        - grams options: `sortOrder ASC`, then `grams ASC`
        - meals options: `sortOrder ASC`, then `mealsPerDay ASC`
