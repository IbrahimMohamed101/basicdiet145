  /api/subscriptions/{id}/premium-selections:
    post:
      tags: [Wallet]
      summary: Consume one premium wallet credit for a day slot
      description: |
        Upgrades one base slot to a premium meal.
        Rules:
        - subscription must be active and owned by caller
        - day must be `open`
        - `baseSlotKey` can be upgraded only once per day
        - wallet deduction is FIFO by `purchasedAt`
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsumePremiumSelectionRequest'
            example:
              date: "2026-03-12"
              baseSlotKey: meal_slot_1
              premiumMealId: 65f2000a1f1f1f1f1f1f2001
      responses:
        '200':
          description: Premium credit consumed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumePremiumSelectionResponse'
              example:
                ok: true
                data:
                  subscriptionId: 65f1b6a0be3f7e2ea1234567
                  premiumMealId: 65f2000a1f1f1f1f1f1f2001
                  remainingQtyTotal: 3
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Locked day, duplicate slot, or insufficient premium credits.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                locked:
                  value:
                    ok: false
                    error:
                      code: LOCKED
                      message: Day is locked
                insufficientPremium:
                  value:
                    ok: false
                    error:
                      code: INSUFFICIENT_PREMIUM
                      message: Not enough premium credits
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags: [Wallet]
      summary: Refund one premium selection
      description: |
        Refunds one premium selection by `(dayId|date + baseSlotKey)`.
        Refund is allowed only when subscription is active and day status is `open`.
        If original wallet bucket is missing or exceeds purchased quantity, returns `409 DATA_INTEGRITY_ERROR`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundPremiumSelectionRequest'
      responses:
        '200':
          description: Refunded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      subscriptionId:
                        type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Locked day or wallet integrity conflict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                locked:
                  value:
                    ok: false
                    error:
                      code: LOCKED
                      message: Day is locked
                integrity:
                  value:
                    ok: false
                    error:
                      code: DATA_INTEGRITY_ERROR
                      message: Cannot refund premium credits because the original wallet bucket was not found
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/Internal'

  /api/subscriptions/{id}/addon-selections:
    post:
      tags: [Wallet]
      summary: Consume addon wallet credits for a day
      description: |
        Consumes addon credits (`qty >= 1`) using FIFO.
        Requires active subscription and open day.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsumeAddonSelectionRequest'
      responses:
        '200':
          description: Addon credits consumed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumeAddonSelectionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Locked day, duplicate selection, or insufficient addon credits.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                locked:
                  value:
                    ok: false
                    error:
                      code: LOCKED
                      message: Day is locked
                insufficientAddon:
                  value:
                    ok: false
                    error:
                      code: INSUFFICIENT_ADDON
                      message: Not enough addon credits
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags: [Wallet]
      summary: Refund addon selections for a day/addon pair
      description: |
        Refunds all addon selection rows matching `(dayId|date + addonId)`.
        Refund is allowed only when subscription is active and day status is `open`.
        Missing bucket/overflow conflicts return `409 DATA_INTEGRITY_ERROR`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundAddonSelectionRequest'
      responses:
        '200':
          description: Refunded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      subscriptionId:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Locked day or wallet integrity conflict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                locked:
                  value:
                    ok: false
                    error:
                      code: LOCKED
                      message: Day is locked
                integrity:
                  value:
                    ok: false
                    error:
                      code: DATA_INTEGRITY_ERROR
                      message: Cannot refund addon credits because refund exceeds purchased quantity
        '422':
          $ref: '#/components/responses/Unprocessable'
        '500':
          $ref: '#/components/responses/Internal'

