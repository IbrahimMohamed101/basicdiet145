  /api/admin/uploads/image:
    post:
      tags: [Admin (Dashboard)]
      summary: Upload an image to Cloudinary
      description: Admin-only multipart endpoint that streams an image to Cloudinary and returns hosted metadata.
      security:
        - dashboardBearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                folder:
                  type: string
                  description: Optional Cloudinary folder suffix under `basicdiet/`, for example `plans`, `meals`, or `addons`.
      responses:
        '201':
          description: Uploaded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                      secureUrl:
                        type: string
                      publicId:
                        type: string
                      resourceType:
                        type: string
              example:
                ok: true
                data:
                  url: https://res.cloudinary.com/demo/image/upload/v1/basicdiet/plans/sample.png
                  secureUrl: https://res.cloudinary.com/demo/image/upload/v1/basicdiet/plans/sample.png
                  publicId: basicdiet/plans/sample
                  resourceType: image
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/Internal'

