                ok: true
                data:
                  - id: 65f1000a1f1f1f1f1f1f1001
                    name: 26 Days
                    daysCount: 26
                    currency: SAR
                    isActive: true
                    skipAllowanceCompensatedDays: 3
                    freezePolicy:
