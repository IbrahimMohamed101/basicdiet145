openapi: 3.0.3
info:
  title: basicdiet145 Backend API
  version: 1.0.0
  description: |
    Code-inspected OpenAPI spec for the Node.js + Express + MongoDB backend.

    Authentication details:
    - `bearerAuth` is JWT for app/mobile users (`Authorization: Bearer <token>`).
    - App tokens are minted by OTP/app auth endpoints and include `tokenType: app_access`.
    - `dashboardBearerAuth` is JWT for dashboard/internal users and includes `tokenType: dashboard_access`.
    - In development only, `DEV_AUTH_BYPASS=true` allows a static token (`DEV_STATIC_TOKEN`) mapped to configured user/role.

    Admin routing:
    - Canonical admin endpoints are documented under `/api/admin/*`.
    - `/api/dashboard/*` (except `/api/dashboard/auth/*`) is a runtime alias/proxy to the same handlers and is intentionally omitted from the main path inventory to avoid duplicate endpoint contracts.

    Localization:
    - Some endpoints resolve multilingual fields using `Accept-Language`.
    - Supported resolved languages are `ar` and `en`.
    - Fallback order at runtime: requested language -> other supported language -> empty string.

servers:
  - url: http://localhost:{port}
    description: Local development server
    variables:
      port:
        default: "3000"

tags:
  - name: System
    description: Health and documentation endpoints.
  - name: Auth (App)
    description: OTP and app registration/authentication.
  - name: Auth (Dashboard)
    description: Email/password + JWT auth for internal dashboard users.
  - name: Users
    description: User and dashboard-user related endpoints.
  - name: Meals / Menu
    description: Meals, salad ingredients, and custom salad pricing.
  - name: Plans
    description: Subscription plan endpoints.
  - name: Orders
    description: One-time order lifecycle endpoints.
  - name: Deliveries / Courier
    description: Courier and delivery operations.
  - name: Kitchen
    description: Kitchen operations and transitions.
  - name: Subscriptions
    description: Subscription lifecycle and day operations.
  - name: Webhooks
    description: External webhook ingestion.
  - name: Admin (Dashboard)
    description: Admin settings and dashboard management endpoints.
  - name: Notifications
    description: Notification-log endpoints.
  - name: Menu
    description: Public premium meals and addons menu endpoints.
  - name: Wallet
    description: Premium/addon wallet consumption, refunds, and top-ups.
  - name: Admin
    description: Admin CRUD and controls for premium meals and addons.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        App JWT signed with `JWT_SECRET`.
        App tokens include `tokenType=app_access` and `role=client`.
        DEV-only bypass: if `DEV_AUTH_BYPASS=true`, exact token match against `DEV_STATIC_TOKEN` is accepted.
    dashboardBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Dashboard JWT signed with `DASHBOARD_JWT_SECRET`.
        Dashboard tokens include `tokenType=dashboard_access` and role in `superadmin|admin|kitchen|courier`.

  parameters:
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      description: Preferred language. Runtime resolves to `ar` or `en`; unknown values fall back to `ar`.
      schema:
        type: string
        example: en
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId.
    PlanId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Plan Mongo ObjectId.
    SubscriptionId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId.
    PaymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
      description: Payment Mongo ObjectId.
    CheckoutDraftId:
      name: draftId
      in: path
      required: true
      schema:
        type: string
      description: Checkout draft Mongo ObjectId.
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId.
    DeliveryId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId.
    IngredientId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId.
    KsaDate:
      name: date
      in: path
      required: true
      schema:
        type: string
        pattern: '^\\d{4}-\\d{2}-\\d{2}$'
      description: KSA date string in `YYYY-MM-DD` format.
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: INVALID
              message: Invalid input
    Unauthorized:
      description: Missing or invalid token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: UNAUTHORIZED
              message: Missing token
    Forbidden:
      description: Authenticated but insufficient role/permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: FORBIDDEN
              message: Insufficient permissions
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: NOT_FOUND
              message: Resource not found
    Conflict:
      description: Resource state conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: LOCKED
              message: Day is locked
    Unprocessable:
      description: Unprocessable entity / business rule violation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: SUB_INACTIVE
              message: Subscription not active
    TooManyRequests:
      description: Rate limit or OTP cooldown exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: RATE_LIMIT
              message: Too many requests
    Internal:
      description: Internal error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: INTERNAL
              message: Unexpected error
    InternalError:
      description: Internal error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: INTERNAL
              message: Unexpected error
    ValidationError:
      description: Input validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: VALIDATION_ERROR
              message: Invalid request payload
    LockedConflict:
      description: Day is not open / resource is locked.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: LOCKED
              message: Day is locked
    CheckoutInProgressConflict:
      description: Existing checkout draft is still initializing for the same idempotency scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: CHECKOUT_IN_PROGRESS
              message: Checkout initialization is still in progress. Retry with the same idempotency key.
              details:
                draftId: 65f1b6a0be3f7e2ea1234567
    IdempotencyConflict:
      description: Idempotency key reused with a different payload or finalized status.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: IDEMPOTENCY_CONFLICT
              message: idempotencyKey is already used with a different checkout payload
    DataIntegrityConflict:
      description: Wallet refund/restore integrity violation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: DATA_INTEGRITY_ERROR
              message: Cannot refund premium credits because the original wallet bucket was not found
    InsufficientPremium:
      description: Not enough premium credits available.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: INSUFFICIENT_PREMIUM
              message: Not enough premium credits
    InsufficientAddon:
      description: Not enough addon credits available.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: INSUFFICIENT_ADDON
              message: Not enough addon credits
    MismatchConflict:
      description: Webhook payload does not match stored payment identifiers/amount/currency.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: MISMATCH
              message: Amount mismatch

  schemas:
    ErrorObject:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    ErrorResponse:
      description: |
        Runtime error envelope returned by `errorResponse(...)`.
        Shape in backend responses is `{ ok:false, error:{ code, message, details? } }`.
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum: [false]
        code:
          type: string
          nullable: true
          description: Optional flattened alias for compatibility; canonical value is `error.code`.
        message:
          type: string
          nullable: true
          description: Optional flattened alias for compatibility; canonical value is `error.message`.
        details:
          type: object
          nullable: true
          additionalProperties: true
          description: Optional flattened alias for compatibility; canonical value is `error.details`.
        error:
          $ref: '#/components/schemas/ErrorObject'

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          nullable: true
          description: Optional payload object; shape varies by endpoint.
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
            - type: string
            - type: number
            - type: boolean

    HalalaAmount:
      type: integer
      minimum: 0
      description: Amount in halala (SAR minor units). All pricing is SAR-only.

    LocalizedText:
      type: object
      properties:
        ar:
          type: string
        en:
          type: string
      additionalProperties: false

    Address:
      type: object
      properties:
        line1:
          type: string
        line2:
          type: string
        city:
          type: string
        notes:
          type: string

    DeliverySlotInput:
      type: object
      properties:
        type:
          type: string
          enum: [delivery, pickup]
        window:
          type: string
        slotId:
          type: string
        locationId:
          type: string
          description: Optional pickup location identifier used by UI-driven pickup flows.

    DeliveryInput:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [delivery, pickup]
        address:
          type: object
          nullable: true
          additionalProperties: true
        pickupLocationId:
          type: string
          description: Optional pickup location identifier. When provided for pickup, backend can resolve the stored pickup address.
        locationId:
          type: string
          description: Alias of `pickupLocationId`.
        slot:
          $ref: '#/components/schemas/DeliverySlotInput'

    PremiumItemInput:
      type: object
      required: [premiumMealId, qty]
      properties:
        premiumMealId:
          type: string
        qty:
          type: integer
          minimum: 1

    SubscriptionAddonSelectionId:
      type: string
      description: |
        Recurring subscription add-on id for the purchase flow.
        Each selected id implies qty = 1 per day across the full plan duration.

    AddonItemInput:
      type: object
      required: [addonId, qty]
      properties:
        addonId:
          type: string
        qty:
          type: integer
          minimum: 1

    CheckoutBreakdown:
      type: object
      properties:
        basePlanPriceHalala:
          $ref: '#/components/schemas/HalalaAmount'
        premiumTotalHalala:
          $ref: '#/components/schemas/HalalaAmount'
        addonsTotalHalala:
          $ref: '#/components/schemas/HalalaAmount'
        deliveryFeeHalala:
          $ref: '#/components/schemas/HalalaAmount'
        vatHalala:
          $ref: '#/components/schemas/HalalaAmount'
        totalHalala:
          $ref: '#/components/schemas/HalalaAmount'
        currency:
          type: string
          enum: [SAR]
      description: |
        All prices are in SAR halala integers.
        `deliveryFeeHalala` is determined server-side only.
        If server cannot determine delivery fee, backend returns `400 VALIDATION_ERROR`.

    SubscriptionQuoteRequest:
      type: object
      required: [planId, grams, mealsPerDay, delivery]
      properties:
        planId:
          type: string
        grams:
          type: integer
          minimum: 1
        mealsPerDay:
          type: integer
          minimum: 1
        startDate:
          type: string
          format: date
        delivery:
          $ref: '#/components/schemas/DeliveryInput'
        premiumItems:
          type: array
          items:
            $ref: '#/components/schemas/PremiumItemInput'
        addons:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionAddonSelectionId'
      description: |
        Quote input. Totals are always recomputed server-side.
        Premium meals are explicit `{ premiumMealId, qty }` rows.
        Recurring add-ons are selected ids only and price as `unitPriceHalala × plan.daysCount`.

    SubscriptionQuoteResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            breakdown:
              $ref: '#/components/schemas/CheckoutBreakdown'
            totalSar:
              type: number
            summary:
              type: object
              description: UI-ready summary of selected package, delivery choice, premium meals, add-ons, and line items.
              additionalProperties: true

    SubscriptionCheckoutRequest:
      type: object
      required: [planId, grams, mealsPerDay, delivery]
      properties:
        planId:
          type: string
        grams:
          type: integer
          minimum: 1
        mealsPerDay:
          type: integer
          minimum: 1
        startDate:
          type: string
          format: date
        idempotencyKey:
          type: string
          description: Optional body key; header keys are also accepted.
        delivery:
          $ref: '#/components/schemas/DeliveryInput'
        successUrl:
          type: string
        backUrl:
          type: string
        premiumItems:
          type: array
          items:
            $ref: '#/components/schemas/PremiumItemInput'
        addons:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionAddonSelectionId'
      description: |
        Idempotency key is required from either:
        - `Idempotency-Key` header
        - `X-Idempotency-Key` header
        - `body.idempotencyKey`
        Premium meals are explicit `{ premiumMealId, qty }` rows.
        Recurring add-ons are selected ids only and price as `unitPriceHalala × plan.daysCount`.

    SubscriptionCheckoutData:
      type: object
      properties:
        subscriptionId:
          type: string
          nullable: true
          description: Always `null` during checkout init. Created only after paid webhook.
        draftId:
          type: string
        paymentId:
          type: string
          nullable: true
        payment_url:
          type: string
        totals:
          $ref: '#/components/schemas/CheckoutBreakdown'
        reused:
          type: boolean
          nullable: true

    SubscriptionCheckoutResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/SubscriptionCheckoutData'

    CheckoutPaymentSummary:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
          enum: [moyasar]
        type:
          type: string
          enum: [subscription_activation]
        status:
          type: string
          enum: [initiated, paid, failed, canceled, expired, refunded]
        amount:
          type: number
        currency:
          type: string
        providerInvoiceId:
          type: string
          nullable: true
        providerPaymentId:
          type: string
          nullable: true
        applied:
          type: boolean
        paidAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    ProviderInvoiceStatus:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          nullable: true
        amount:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
        url:
          type: string
        updatedAt:
          type: string
          format: date-time
          nullable: true
        attemptsCount:
          type: integer
          minimum: 0

    SubscriptionCheckoutStatusData:
      type: object
      properties:
        draftId:
          type: string
        subscriptionId:
          type: string
          nullable: true
        checkoutStatus:
          type: string
          enum: [pending_payment, completed, failed, canceled, expired]
        paymentStatus:
          type: string
          nullable: true
          enum: [initiated, paid, failed, canceled, expired, refunded]
        isFinal:
          type: boolean
        paymentId:
          type: string
          nullable: true
        payment_url:
          type: string
        providerInvoiceId:
          type: string
          nullable: true
        providerPaymentId:
          type: string
          nullable: true
        totals:
          allOf:
            - $ref: '#/components/schemas/CheckoutBreakdown'
          nullable: true
        failureReason:
          type: string
        completedAt:
          type: string
          format: date-time
          nullable: true
        failedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
        checkedProvider:
          type: boolean
        synchronized:
          type: boolean
        payment:
          allOf:
            - $ref: '#/components/schemas/CheckoutPaymentSummary'
          nullable: true
        providerInvoice:
          allOf:
            - $ref: '#/components/schemas/ProviderInvoiceStatus'
          nullable: true

    SubscriptionCheckoutStatusResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/SubscriptionCheckoutStatusData'

    ConsumePremiumSelectionRequest:
      type: object
      required: [baseSlotKey, premiumMealId]
      properties:
        dayId:
          type: string
        date:
          type: string
          pattern: '^\\d{4}-\\d{2}-\\d{2}$'
        baseSlotKey:
          type: string
        premiumMealId:
          type: string

    ConsumePremiumSelectionResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            subscriptionId:
              type: string
            premiumMealId:
              type: string
            remainingQtyTotal:
              type: integer

    RefundPremiumSelectionRequest:
      type: object
      required: [baseSlotKey]
      properties:
        dayId:
          type: string
        date:
          type: string
          pattern: '^\\d{4}-\\d{2}-\\d{2}$'
        baseSlotKey:
          type: string

    ConsumeAddonSelectionRequest:
      type: object
      required: [addonId, qty]
      properties:
        dayId:
          type: string
        date:
          type: string
          pattern: '^\\d{4}-\\d{2}-\\d{2}$'
        addonId:
          type: string
        qty:
          type: integer
          minimum: 1

    ConsumeAddonSelectionResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            subscriptionId:
              type: string
            addonId:
              type: string
            remainingQtyTotal:
              type: integer

    RefundAddonSelectionRequest:
      type: object
      required: [addonId]
      properties:
        dayId:
          type: string
        date:
          type: string
          pattern: '^\\d{4}-\\d{2}-\\d{2}$'
        addonId:
          type: string

    PremiumTopupRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PremiumItemInput'
        successUrl:
          type: string
        backUrl:
          type: string
      description: Payment is initialized now; wallet credits are applied only after paid webhook.

    AddonTopupRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AddonItemInput'
        successUrl:
          type: string
        backUrl:
          type: string
      description: Payment is initialized now; wallet credits are applied only after paid webhook.

    TopupInitResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            payment_url:
              type: string
            invoice_id:
              type: string
            payment_id:
              type: string
            totalHalala:
              type: integer
              nullable: true

    WalletHistoryEntry:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
          enum: [topup_payment, wallet_selection]
        direction:
          type: string
          enum: [credit, debit]
        walletType:
          type: string
          enum: [premium, addon]
        status:
          type: string
        paymentId:
          type: string
          nullable: true
        providerInvoiceId:
          type: string
          nullable: true
        providerPaymentId:
          type: string
          nullable: true
        itemId:
          type: string
          nullable: true
        name:
          type: string
        qty:
          type: integer
        unitAmountHalala:
          type: integer
        totalAmountHalala:
          type: integer
        currency:
          type: string
        applied:
          type: boolean
        date:
          type: string
          nullable: true
        dayId:
          type: string
          nullable: true
        occurredAt:
          type: string
          format: date-time
          nullable: true

    WalletHistoryResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            subscriptionId:
              type: string
            entries:
              type: array
              items:
                $ref: '#/components/schemas/WalletHistoryEntry'

    WalletTopupStatusItem:
      type: object
      properties:
        id:
          type: string
        walletType:
          type: string
          enum: [premium, addon]
        itemId:
          type: string
          nullable: true
        name:
          type: string
        qty:
          type: integer
        unitAmountHalala:
          type: integer
        totalAmountHalala:
          type: integer
        currency:
          type: string

    WalletTopupStatusResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            subscriptionId:
              type: string
            paymentId:
              type: string
            walletType:
              type: string
              enum: [premium, addon]
            paymentStatus:
              type: string
              enum: [initiated, paid, failed, canceled, expired, refunded]
            isFinal:
              type: boolean
            amount:
              type: integer
            currency:
              type: string
            applied:
              type: boolean
            providerInvoiceId:
              type: string
              nullable: true
            providerPaymentId:
              type: string
              nullable: true
            paidAt:
              type: string
              format: date-time
              nullable: true
            createdAt:
              type: string
              format: date-time
              nullable: true
            updatedAt:
              type: string
              format: date-time
              nullable: true
            checkedProvider:
              type: boolean
            synchronized:
              type: boolean
            items:
              type: array
              items:
                $ref: '#/components/schemas/WalletTopupStatusItem'
            payment:
              allOf:
