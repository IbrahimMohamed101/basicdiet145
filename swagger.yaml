      deprecated: true
      description: |
        Deprecated compatibility endpoint.
        Use `/api/subscriptions/{id}/premium-credits/topup` for all new integrations.
        Removal is planned no earlier than `2026-06-30`.

        Creates Moyasar invoice/payment for premium credits.
        Follow with `GET /api/subscriptions/{id}/wallet/topups/{paymentId}/status` or
        `POST /api/subscriptions/{id}/wallet/topups/{paymentId}/verify` after redirect when needed.
        Compatibility endpoint:
        - if body contains `items[]`, behaves like `/api/subscriptions/{id}/premium-credits/topup`
        - otherwise uses legacy `count`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                count:
                  type: integer
                  minimum: 1
                items:
                  type: array
                  items:
                    type: object
                    required: [premiumMealId, qty]
                    properties:
                      premiumMealId:
                        type: string
                      qty:
                        type: integer
                        minimum: 1
                successUrl:
                  type: string
                backUrl:
                  type: string
      responses:
        '200':
          description: Invoice created.
          headers:
            Deprecation:
              schema:
                type: string
                example: "true"
              description: Always `true` for this legacy endpoint.
            Sunset:
              schema:
                type: string
                example: "Tue, 30 Jun 2026 23:59:59 GMT"
              description: Planned removal date for the legacy endpoint.
            Link:
              schema:
                type: string
                example: '</api/subscriptions/65f1000a1f1f1f1f1f1f1001/premium-credits/topup>; rel="successor-version"'
              description: Successor endpoint for new clients.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      payment_url:
                        type: string
                      invoice_id:
                        type: string
                      payment_id:
                        type: string
                      totalHalala:
                        type: integer
                        nullable: true
              example:
                ok: true
                data:
                  payment_url: https://mysr.co/invoice/abc
                  invoice_id: iv_abc
                  payment_id: 65f2b6a0be3f7e2ea1234abc
        '400':
