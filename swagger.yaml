  /api/admin/plans:
    get:
      tags: [Admin (Dashboard), Plans]
      summary: List plans (admin)
      description: |
        Returns plans with nested grams/meals options, including inactive entries.
        Supports lightweight list-screen helpers without extra endpoints:
        - `search` or `q`: fuzzy search by plan id, Arabic/English name, days count, grams, or meals per day
        - `status` or `isActive`: `active`, `inactive`, or `all`
        The response keeps `data` as the list and adds `summary` + `meta` for dashboard cards and UI state.
      security:
        - dashboardBearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Search term. Alias of `q`.
        - in: query
          name: q
          schema:
            type: string
          description: Search term. Alias of `search`.
        - in: query
          name: status
          schema:
            type: string
            enum: [active, inactive, all]
          description: Filter plans by active state. Alias of `isActive`.
        - in: query
          name: isActive
          schema:
            type: string
            enum: [true, false, 1, 0, active, inactive, all]
          description: Backward-friendly alias of `status`.
      responses:
        '200':
          description: Plan list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Plan'
                  summary:
                    type: object
                    properties:
                      totalPlans:
                        type: integer
                      activePlans:
                        type: integer
                      inactivePlans:
                        type: integer
                      averageDaysCount:
                        type: number
                  meta:
                    type: object
                    properties:
                      q:
                        type: string
                      status:
                        type: string
                        enum: [active, inactive, all]
                      totalCount:
                        type: integer
                      filteredCount:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '400':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Admin (Dashboard), Plans]
      summary: Create plan
      description: |
        Admin-only.
        Creates a nested plan (`daysCount -> gramsOptions -> mealsOptions`).
        Validation notes:
        - all prices are integer halala values (`priceHalala`, `compareAtHalala`)
        - currency must be `SAR`
      security:
        - dashboardBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanCreateRequest'
            example:
              name:
                ar: "26 يوم"
                en: "26 Days"
              daysCount: 26
              currency: SAR
              sortOrder: 1
              isActive: true
              skipAllowanceCompensatedDays: 3
              freezePolicy:
                enabled: true
                maxDays: 31
                maxTimes: 1
              gramsOptions:
                - grams: 100
                  sortOrder: 0
                  isActive: true
                  mealsOptions:
                    - mealsPerDay: 1
                      sortOrder: 0
                      isActive: true
                      priceHalala: 259900
                      compareAtHalala: 289900
                    - mealsPerDay: 2
                      sortOrder: 1
                      isActive: true
                      priceHalala: 310000
                      compareAtHalala: 300000
      responses:
        '201':
          description: Plan created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: string
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                ok: false
                error:
                  code: VALIDATION_ERROR
                  message: Invalid plan payload
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

