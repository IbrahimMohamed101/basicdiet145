    post:
      tags: [Admin (Dashboard), Plans]
      summary: Create plan
      description: |
        Admin-only.
        Creates a nested plan (`daysCount -> gramsOptions -> mealsOptions`).
        Validation notes:
        - all prices are integer halala values (`priceHalala`, `compareAtHalala`)
        - currency must be `SAR`
      security:
        - dashboardBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanCreateRequest'
            example:
              name:
                ar: "26 يوم"
                en: "26 Days"
              daysCount: 26
              currency: SAR
              sortOrder: 1
              isActive: true
              skipAllowanceCompensatedDays: 3
              freezePolicy:
                enabled: true
                maxDays: 31
                maxTimes: 1
              gramsOptions:
                - grams: 100
                  sortOrder: 0
                  isActive: true
                  mealsOptions:
                    - mealsPerDay: 1
                      sortOrder: 0
                      isActive: true
                      priceHalala: 259900
                      compareAtHalala: 289900
                    - mealsPerDay: 2
                      sortOrder: 1
                      isActive: true
                      priceHalala: 310000
                      compareAtHalala: 300000
      responses:
        '201':
          description: Plan created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: string
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                ok: false
                error:
                  code: VALIDATION_ERROR
                  message: Invalid plan payload
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

