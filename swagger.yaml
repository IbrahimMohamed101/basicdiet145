openapi: 3.0.3
info:
  title: basicdiet145 Backend API
  version: 1.0.0
  description: |
    Code-inspected OpenAPI spec for the Node.js + Express + MongoDB backend.

    Authentication details:
    - `bearerAuth` is JWT (`Authorization: Bearer <token>`).
    - App tokens are minted by OTP/app auth endpoints and include `tokenType: app_access`.
    - Dashboard/admin/kitchen/courier endpoints require JWTs with role claims (`admin`, `kitchen`, `courier`) accepted by the same middleware.
    - In development only, `DEV_AUTH_BYPASS=true` allows a static token (`DEV_STATIC_TOKEN`) mapped to configured user/role.

    Localization:
    - Some endpoints resolve multilingual fields using `Accept-Language`.
    - Supported resolved languages are `ar` and `en`.
    - Fallback order at runtime: requested language -> other supported language -> empty string.

servers:
  - url: http://localhost:{port}
    description: Local development server
    variables:
      port:
        default: "3000"

tags:
  - name: System
    description: Health and documentation endpoints.
  - name: Auth (App)
    description: OTP and app registration/authentication.
  - name: Auth (Dashboard)
    description: No dedicated dashboard auth routes are wired in this codebase.
  - name: Users
    description: User and dashboard-user related endpoints.
  - name: Meals / Menu
    description: Meals, salad ingredients, and custom salad pricing.
  - name: Plans
    description: Subscription plan endpoints.
  - name: Orders
    description: One-time order lifecycle endpoints.
  - name: Deliveries / Courier
    description: Courier and delivery operations.
  - name: Kitchen
    description: Kitchen operations and transitions.
  - name: Subscriptions
    description: Subscription lifecycle and day operations.
  - name: Webhooks
    description: External webhook ingestion.
  - name: Admin (Dashboard)
    description: Admin settings and dashboard management endpoints.
  - name: Notifications
    description: Notification-log endpoints.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT signed with `JWT_SECRET`.
        App tokens include `tokenType=app_access` and `role=client`.
        Dashboard endpoints require role claims (`admin`, `kitchen`, `courier`) validated by `roleMiddleware`.
        DEV-only bypass: if `DEV_AUTH_BYPASS=true`, exact token match against `DEV_STATIC_TOKEN` is accepted.

  parameters:
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      description: Preferred language. Runtime resolves to `ar` or `en`; unknown values fall back to `ar`.
      schema:
        type: string
        example: en
    PlanId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Plan Mongo ObjectId.
    SubscriptionId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId.
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId.
    DeliveryId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId.
    IngredientId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId.
    KsaDate:
      name: date
      in: path
      required: true
      schema:
        type: string
        pattern: '^\\d{4}-\\d{2}-\\d{2}$'
      description: KSA date string in `YYYY-MM-DD` format.
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: INVALID
              message: Invalid input
    Unauthorized:
      description: Missing or invalid token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: UNAUTHORIZED
              message: Missing token
    Forbidden:
      description: Authenticated but insufficient role/permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: FORBIDDEN
              message: Insufficient permissions
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: NOT_FOUND
              message: Resource not found
    Conflict:
      description: Resource state conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: LOCKED
              message: Day is locked
    Unprocessable:
      description: Unprocessable entity / business rule violation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: SUB_INACTIVE
              message: Subscription not active
    TooManyRequests:
      description: Rate limit or OTP cooldown exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: RATE_LIMIT
              message: Too many requests
    Internal:
      description: Internal error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: INTERNAL
              message: Unexpected error

  schemas:
    ErrorObject:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    ErrorResponse:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          $ref: '#/components/schemas/ErrorObject'

    LocalizedText:
      type: object
      properties:
        ar:
          type: string
        en:
          type: string
      additionalProperties: false

    Address:
      type: object
      properties:
        line1:
          type: string
        line2:
          type: string
        city:
          type: string
        notes:
          type: string

    PaginationMeta:
      type: object
      required:
        - page
        - limit
        - total
        - totalPages
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    User:
      type: object
      properties:
        _id:
          type: string
        phone:
          type: string
        name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        role:
          type: string
          enum: [client, admin, kitchen, courier]
        isActive:
          type: boolean
        fcmTokens:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AppUser:
      type: object
      properties:
        _id:
          type: string
        fullName:
          type: string
          nullable: true
        phone:
          type: string
        email:
          type: string
          nullable: true
        role:
          type: string
          enum: [app_user]
        fcmTokens:
          type: array
          items:
            type: string
        coreUserId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DashboardUser:
      type: object
      properties:
        _id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, kitchen, courier]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuthUserProfile:
      type: object
      required:
        - id
        - phone
        - role
      properties:
        id:
          type: string
        fullName:
          type: string
          nullable: true
        phone:
          type: string
        email:
          type: string
          nullable: true
        role:
          type: string
          enum: [client]
        createdAt:
          type: string
          format: date-time

    Plan:
      type: object
      properties:
        _id:
          type: string
        name:
          $ref: '#/components/schemas/LocalizedText'
        daysCount:
          type: integer
        mealsPerDay:
          type: integer
        grams:
          type: integer
        price:
          type: number
        skipAllowance:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PlanResolved:
      allOf:
        - $ref: '#/components/schemas/Plan'
        - type: object
          properties:
            name:
              type: string

    Meal:
      type: object
      properties:
        _id:
          type: string
        name:
          $ref: '#/components/schemas/LocalizedText'
        type:
          type: string
          enum: [regular, premium]
        isActive:
          type: boolean

    Addon:
      type: object
      properties:
        _id:
          type: string
        name:
          $ref: '#/components/schemas/LocalizedText'
        price:
          type: number
        type:
          type: string
          enum: [subscription, one_time]
        isActive:
          type: boolean

    SaladIngredient:
      type: object
      properties:
        _id:
          type: string
        name:
          $ref: '#/components/schemas/LocalizedText'
        price:
          type: number
        calories:
          type: number
          nullable: true
        maxQuantity:
          type: number
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SaladIngredientResolved:
      allOf:
        - $ref: '#/components/schemas/SaladIngredient'
        - type: object
          properties:
            name:
              type: string

    CustomSaladItem:
      type: object
      properties:
        ingredientId:
          type: string
        name_en:
          type: string
        name_ar:
          type: string
        unitPriceSar:
          type: number
        unitPrice:
          type: number
          description: Minor units (halalas)
        quantity:
          type: number
        calories:
          type: number
          nullable: true

    CustomSaladSnapshot:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CustomSaladItem'
        basePriceSar:
          type: number
        basePrice:
          type: number
          description: Minor units (halalas)
        totalPriceSar:
          type: number
        totalPrice:
          type: number
          description: Minor units (halalas)
        currency:
          type: string
          example: SAR

    OrderItem:
      type: object
      properties:
        mealId:
          type: string
        name:
          type: string
        type:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
          description: Minor units (halalas)

    OrderPricing:
      type: object
      properties:
        unitPrice:
          type: number
        premiumUnitPrice:
          type: number
        quantity:
          type: number
        subtotal:
          type: number
        deliveryFee:
          type: number
        total:
          type: number
        currency:
          type: string

    Order:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        status:
          type: string
          enum: [created, confirmed, preparing, out_for_delivery, ready_for_pickup, fulfilled, canceled]
        deliveryMode:
          type: string
          enum: [delivery, pickup]
        deliveryDate:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        customSalads:
          type: array
          items:
            $ref: '#/components/schemas/CustomSaladSnapshot'
        pricing:
          $ref: '#/components/schemas/OrderPricing'
        deliveryAddress:
          $ref: '#/components/schemas/Address'
        deliveryWindow:
          type: string
          nullable: true
        paymentStatus:
          type: string
          enum: [initiated, paid, failed, canceled, expired, refunded]
        paymentId:
          type: string
          nullable: true
        providerInvoiceId:
          type: string
          nullable: true
        providerPaymentId:
          type: string
          nullable: true
        confirmedAt:
          type: string
          format: date-time
          nullable: true
        fulfilledAt:
          type: string
          format: date-time
          nullable: true
        canceledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Delivery:
      type: object
      properties:
        _id:
          type: string
        subscriptionId:
          type: string
        dayId:
          type: string
        courierId:
          type: string
          nullable: true
        status:
          type: string
          enum: [scheduled, out_for_delivery, delivered, canceled, cancelled]
        address:
          $ref: '#/components/schemas/Address'
        window:
          type: string
          nullable: true
        etaAt:
          type: string
          format: date-time
          nullable: true
        arrivingSoonReminderSentAt:
          type: string
          format: date-time
          nullable: true
        deliveredNotificationSentAt:
          type: string
          format: date-time
          nullable: true
        deliveredAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SubscriptionAddonSnapshot:
      type: object
      properties:
        addonId:
          type: string
        name:
          type: string
        price:
          type: number
        type:
          type: string

    Subscription:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        planId:
          type: string
        status:
          type: string
          enum: [pending_payment, active, expired]
        startDate:
          type: string
          format: date-time
          nullable: true
        endDate:
          type: string
          format: date-time
          nullable: true
        validityEndDate:
          type: string
          format: date-time
          nullable: true
        totalMeals:
          type: number
        remainingMeals:
          type: number
        premiumRemaining:
          type: number
        premiumPrice:
          type: number
        addonSubscriptions:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionAddonSnapshot'
        deliveryMode:
          type: string
          enum: [delivery, pickup]
        deliveryAddress:
          $ref: '#/components/schemas/Address'
        deliveryWindow:
          type: string
          nullable: true
        skippedCount:
          type: number
        expiryReminder3dSentAt:
          type: string
          format: date-time
          nullable: true
        expiryReminder24hSentAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SubscriptionDay:
      type: object
      properties:
        _id:
          type: string
        subscriptionId:
          type: string
        date:
          type: string
        status:
          type: string
          enum: [open, locked, in_preparation, out_for_delivery, ready_for_pickup, fulfilled, skipped]
        selections:
          type: array
          items:
            type: string
        premiumSelections:
          type: array
          items:
            type: string
        addonsOneTime:
          type: array
          items:
            type: string
        assignedByKitchen:
          type: boolean
        pickupRequested:
          type: boolean
        creditsDeducted:
          type: boolean
        deliveryAddressOverride:
          $ref: '#/components/schemas/Address'
        deliveryWindowOverride:
          type: string
          nullable: true
        customSalads:
          type: array
          items:
            $ref: '#/components/schemas/CustomSaladSnapshot'
        lockedSnapshot:
          type: object
          additionalProperties: true
          nullable: true
        fulfilledSnapshot:
          type: object
          additionalProperties: true
          nullable: true
        lockedAt:
          type: string
          format: date-time
          nullable: true
        fulfilledAt:
          type: string
          format: date-time
          nullable: true
        mealReminderSentAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Payment:
      type: object
      properties:
        _id:
          type: string
        provider:
          type: string
          enum: [moyasar]
        type:
          type: string
          enum: [premium_topup, one_time_addon, subscription_activation, one_time_order, custom_salad_day, custom_salad_order]
        status:
          type: string
          enum: [initiated, paid, failed, canceled, expired, refunded]
        amount:
          type: number
          description: Minor units (halalas)
        currency:
          type: string
        userId:
          type: string
          nullable: true
        subscriptionId:
          type: string
          nullable: true
        orderId:
          type: string
          nullable: true
        providerInvoiceId:
          type: string
          nullable: true
        providerPaymentId:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        applied:
          type: boolean
        paidAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NotificationLog:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
          nullable: true
        type:
          type: string
          nullable: true
        dedupeKey:
          type: string
          nullable: true
        entityType:
          type: string
          nullable: true
        entityId:
          type: string
          nullable: true
        title:
          type: string
        body:
          type: string
        data:
          type: object
          additionalProperties: true
        scheduledFor:
          type: string
          format: date-time
          nullable: true
        sentAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [processing, sent, failed, no_tokens]
        error:
          type: string
          nullable: true
        successCount:
          type: number
        failureCount:
          type: number
        errorCodes:
          type: array
          items:
            type: string
        retryCount:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ActivityLog:
      type: object
      properties:
        _id:
          type: string
        entityType:
          type: string
        entityId:
          type: string
        action:
          type: string
        byUserId:
          type: string
          nullable: true
        byRole:
          type: string
          nullable: true
        meta:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SettingsMap:
      type: object
      additionalProperties: true
      example:
        cutoff_time: "00:00"
        delivery_windows:
          - "08:00-11:00"
          - "12:00-15:00"
        skip_allowance: 3
        premium_price: 20
        one_time_meal_price: 25
        one_time_premium_price: 25
        one_time_delivery_fee: 0
        custom_salad_base_price: 0

paths:
  /:
    get:
      tags: [System]
      summary: Root health endpoint
      description: Simple deployment smoke-test endpoint.
      responses:
        '200':
          description: Service is running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
              example:
                ok: true
                message: basicdiet145 backend is running

  /health:
    get:
      tags: [System]
      summary: Health check with DB status
      description: Returns API status and Mongo connectivity state.
      responses:
        '200':
          description: API and DB are healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  db:
                    type: object
                    additionalProperties: true
              example:
                ok: true
                db:
                  state: up
        '503':
          description: Database unavailable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  db:
                    type: object
                    additionalProperties: true

  /api-docs:
    get:
      tags: [System]
      summary: Swagger UI
      description: Serves Swagger UI configured to load `/api-docs/swagger.yaml`.
      responses:
        '200':
          description: HTML page.
          content:
            text/html:
              schema:
                type: string

  /api-docs/swagger.yaml:
    get:
      tags: [System]
      summary: Raw Swagger YAML
      description: Serves the OpenAPI spec file used by Swagger UI.
      responses:
        '200':
          description: YAML document.
          content:
            text/yaml:
              schema:
                type: string

  /api/settings:
    get:
      tags: [System]
      summary: Get public runtime settings
      description: Returns settings map with defaults when keys are missing.
      responses:
        '200':
          description: Settings map.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/SettingsMap'

  /api/webhooks/moyasar:
    post:
      tags: [Webhooks]
      summary: Moyasar payment webhook
      description: |
        Public webhook endpoint.

        Security behavior in code:
        - No signature header verification is implemented.
        - If `MOYASAR_WEBHOOK_SECRET` is set, request body field `secret_token` must match.

        Idempotency behavior:
        - Payment records are deduplicated by unique indexes on `(provider, providerInvoiceId)` and `(provider, providerPaymentId)`.
        - Application side-effects are guarded by `Payment.applied` and an atomic claim update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  example: payment_paid
                event:
                  type: string
                secret_token:
                  type: string
                data:
                  type: object
                  properties:
                    id:
                      type: string
                    invoice_id:
                      type: string
                    status:
                      type: string
                    amount:
                      type: number
                    currency:
                      type: string
                    metadata:
                      type: object
                      additionalProperties: true
                payment:
                  type: object
                  additionalProperties: true
            example:
              type: payment_paid
              secret_token: your-shared-secret
              data:
                id: pay_abc123
                invoice_id: inv_abc123
                status: paid
                amount: 5000
                currency: SAR
                metadata:
                  type: one_time_order
                  orderId: 65f0f01f1f1f1f1f1f1f1f1f
                  userId: 65f0f01f1f1f1f1f1f1f1f20
      responses:
        '200':
          description: Webhook accepted/processed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
              example:
                ok: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'

  /api/auth/otp/request:
    post:
      tags: [Auth (App)]
      summary: Request OTP over WhatsApp
      description: Rate-limited endpoint that sends OTP to `phoneE164`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneE164]
              properties:
                phoneE164:
                  type: string
                  example: "+966501234567"
      responses:
        '200':
          description: OTP sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
              example:
                ok: true
        '400':
          description: Invalid phone input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidPhone:
                  value:
                    ok: false
                    error:
                      code: INVALID_PHONE
                      message: phoneE164 must be a valid E.164 phone number
        '429':
          description: OTP cooldown or rate-limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                cooldown:
                  value:
                    ok: false
                    error:
                      code: OTP_COOLDOWN
                      message: Please wait 20s before requesting a new OTP
                      details:
                        cooldownSecondsRemaining: 20
                rateLimit:
                  value:
                    ok: false
                    error:
                      code: RATE_LIMIT
                      message: Too many OTP requests
        '500':
          $ref: '#/components/responses/Internal'

