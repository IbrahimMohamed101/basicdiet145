  /api/subscriptions/quote:
    post:
      tags: [Subscriptions]
      summary: Quote subscription checkout totals
      description: |
        Computes pricing server-side only. Client-provided totals or delivery fee are never trusted.

        Pricing model:
        - `basePlanPriceHalala` from selected active plan option (`planId + grams + mealsPerDay`)
        - `premiumTotalHalala` from active premium meals
        - `addonsTotalHalala` from active addons
        - `deliveryFeeHalala` from server settings (`subscription_delivery_fee_halala`)
        - optional `vatHalala` from `vat_percentage` setting
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionQuoteRequest'
            example:
              planId: 65f1000a1f1f1f1f1f1f1001
              grams: 100
              mealsPerDay: 2
              startDate: "2026-03-10"
              delivery:
                type: delivery
                address:
                  city: Riyadh
                  district: Al Olaya
                  line1: Street 10
                slot:
                  type: delivery
                  window: "12:00-15:00"
                  slotId: "slot_1"
              premiumItems:
                - premiumMealId: 65f2000a1f1f1f1f1f1f2001
                  qty: 2
              addons:
                - addonId: 65f2000a1f1f1f1f1f1f3001
                  qty: 1
      responses:
        '200':
          description: Quote breakdown.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionQuoteResponse'
              example:
                ok: true
                data:
                  breakdown:
                    basePlanPriceHalala: 259900
                    premiumTotalHalala: 3000
                    addonsTotalHalala: 1400
                    deliveryFeeHalala: 1000
                    vatHalala: 0
                    totalHalala: 265300
                    currency: SAR
                  totalSar: 2653
        '400':
          description: Validation/selection/configuration errors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validationError:
                  value:
                    ok: false
                    error:
                      code: VALIDATION_ERROR
                      message: Server delivery fee configuration is missing
                invalidSelection:
                  value:
                    ok: false
                    error:
                      code: INVALID
                      message: Selected mealsPerDay option is not available
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

