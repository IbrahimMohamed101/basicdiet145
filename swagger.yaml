  /api/admin/overview:
    get:
      tags: [Admin (Dashboard)]
      summary: Get dashboard home overview
      description: |
        Returns a single payload for the main admin home screen, including top-level stats,
        recent subscriptions, and recent one-time orders.
      security:
        - dashboardBearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          description: Number of recent subscriptions and orders to return per section. Default `5`, max `20`.
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
      responses:
        '200':
          description: Dashboard overview payload.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      today:
                        type: string
                        example: '2026-03-11'
                      stats:
                        type: object
                        properties:
                          activeSubscriptions:
                            type: integer
                          deliveriesToday:
                            type: integer
                          pendingOrders:
                            type: integer
                          appUsers:
                            type: integer
                      recentSubscriptions:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            userName:
                              type: string
                              nullable: true
                            planName:
                              type: string
                              nullable: true
                            status:
                              type: string
                            startDate:
                              type: string
                              nullable: true
                            amount:
                              type: number
                            amountDisplay:
                              type: string
                      recentOrders:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            displayId:
                              type: string
                            userName:
                              type: string
                              nullable: true
                            itemsSummary:
                              type: string
                              nullable: true
                            status:
                              type: string
                            date:
                              type: string
                              nullable: true
                            amount:
                              type: number
                            amountDisplay:
                              type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

