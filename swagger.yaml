  /api/subscriptions/checkout:
    post:
      tags: [Subscriptions]
      summary: Checkout subscription
      description: |
        Initializes a checkout draft and payment invoice. Does **not** create a subscription yet.
        Subscription and wallet credits are created **ONLY** by webhook when payment status becomes `paid`.

        Safety rules:
        - idempotency key is required (header `Idempotency-Key` or `X-Idempotency-Key`, or `body.idempotencyKey`)
        - totals are recomputed server-side from current plan/menu/settings
        - system currency is SAR only
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Required unless provided via `X-Idempotency-Key` header or `body.idempotencyKey`.
        - name: X-Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Alias for `Idempotency-Key`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionCheckoutRequest'
      responses:
        '201':
          description: Draft + initiated payment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionCheckoutResponse'
              example:
                ok: true
                data:
                  subscriptionId: null
                  draftId: 65f1b6a0be3f7e2ea1234567
                  paymentId: 65f1b6a0be3f7e2ea1234568
                  payment_url: https://mysr.co/invoice/abc
                  totals:
                    basePlanPriceHalala: 259900
                    premiumTotalHalala: 3000
                    addonsTotalHalala: 1400
                    deliveryFeeHalala: 1000
                    vatHalala: 0
                    totalHalala: 265300
                    currency: SAR
        '200':
          description: Existing draft/payment reused for the same idempotency key or pending identical hash.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionCheckoutResponse'
              example:
                ok: true
                data:
                  subscriptionId: null
                  draftId: 65f1b6a0be3f7e2ea1234567
                  paymentId: 65f1b6a0be3f7e2ea1234568
                  payment_url: https://mysr.co/invoice/abc
                  totals:
                    totalHalala: 265300
                    currency: SAR
                  reused: true
        '400':
          description: Validation error (including missing idempotency key).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingIdempotency:
                  value:
                    ok: false
                    error:
                      code: VALIDATION_ERROR
                      message: idempotencyKey is required (Idempotency-Key header, X-Idempotency-Key header, or body.idempotencyKey)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Idempotency conflict or checkout still initializing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                inProgress:
                  value:
                    ok: false
                    error:
                      code: CHECKOUT_IN_PROGRESS
                      message: Checkout initialization is still in progress. Retry with the same idempotency key.
                      details:
                        draftId: 65f1b6a0be3f7e2ea1234567
                conflict:
                  value:
                    ok: false
                    error:
                      code: IDEMPOTENCY_CONFLICT
                      message: idempotencyKey is already used with a different checkout payload
        '429':
          $ref: '#/components/responses/TooManyRequests'

