  /api/subscriptions/quote:
    post:
      tags: [Subscriptions]
      summary: Quote subscription checkout totals
      description: |
        Computes pricing server-side only. Client-provided totals or delivery fee are never trusted.

        Pricing model:
        - `basePlanPriceHalala` from selected active plan option (`planId + grams + mealsPerDay`)
        - `premiumTotalHalala` from active premium meals
        - `addonsTotalHalala` from active recurring add-on ids
        - `deliveryFeeHalala` from server settings (`subscription_delivery_fee_halala`)
        - optional `vatHalala` from `vat_percentage` setting
        - recurring purchase-flow add-ons price as `unitPricePerDay × plan.daysCount`
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionQuoteRequest'
            example:
              planId: 65f1000a1f1f1f1f1f1f1001
              grams: 100
              mealsPerDay: 2
              startDate: "2026-03-10"
              delivery:
                type: delivery
                address:
                  city: Riyadh
                  district: Al Olaya
                  line1: Street 10
                slot:
                  type: delivery
                  window: "12:00-15:00"
                  slotId: "slot_1"
              premiumItems:
                - premiumMealId: 65f2000a1f1f1f1f1f1f2001
                  qty: 2
              addons:
                - 65f2000a1f1f1f1f1f1f3001
      responses:
        '200':
          description: Quote breakdown.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionQuoteResponse'
              example:
                ok: true
                data:
                  breakdown:
                    basePlanPriceHalala: 259900
                    premiumTotalHalala: 3000
                    addonsTotalHalala: 14000
                    deliveryFeeHalala: 1000
                    vatHalala: 0
                    totalHalala: 277900
                    currency: SAR
                  totalSar: 2779
        '400':
          description: Validation/selection/configuration errors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validationError:
                  value:
                    ok: false
                    error:
                      code: VALIDATION_ERROR
                      message: Server delivery fee configuration is missing
                invalidSelection:
                  value:
                    ok: false
                    error:
                      code: INVALID
                      message: Selected mealsPerDay option is not available
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/subscriptions/checkout:
    post:
      tags: [Subscriptions]
      summary: Checkout subscription
      description: |
        Initializes a checkout draft and payment invoice. Does **not** create a subscription yet.
        Subscription and wallet credits are created **ONLY** by webhook when payment status becomes `paid`.
        Use `GET /api/subscriptions/checkout-drafts/{draftId}` to read local checkout state and
        `POST /api/subscriptions/checkout-drafts/{draftId}/verify-payment` to confirm a paid result immediately after redirect.

        Safety rules:
        - idempotency key is required (header `Idempotency-Key` or `X-Idempotency-Key`, or `body.idempotencyKey`)
        - totals are recomputed server-side from current plan/menu/settings
        - system currency is SAR only
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Required unless provided via `X-Idempotency-Key` header or `body.idempotencyKey`.
        - name: X-Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Alias for `Idempotency-Key`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionCheckoutRequest'
            example:
              idempotencyKey: checkout-user-123-20260324-1
              planId: 65f1000a1f1f1f1f1f1f1001
              grams: 100
              mealsPerDay: 2
              startDate: "2026-03-10"
              delivery:
                type: delivery
                address:
                  city: Riyadh
                  district: Al Olaya
                  line1: Street 10
                slot:
                  type: delivery
                  window: "12:00-15:00"
                  slotId: "slot_1"
              premiumItems:
                - premiumMealId: 65f2000a1f1f1f1f1f1f2001
                  qty: 2
              addons:
                - 65f2000a1f1f1f1f1f1f3001
      responses:
        '201':
          description: Draft + initiated payment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionCheckoutResponse'
              example:
                ok: true
                data:
                  subscriptionId: null
                  draftId: 65f1b6a0be3f7e2ea1234567
                  paymentId: 65f1b6a0be3f7e2ea1234568
                  payment_url: https://mysr.co/invoice/abc
                  totals:
                    basePlanPriceHalala: 259900
                    premiumTotalHalala: 3000
                    addonsTotalHalala: 14000
                    deliveryFeeHalala: 1000
                    vatHalala: 0
                    totalHalala: 277900
                    currency: SAR
        '200':
          description: Existing draft/payment reused for the same idempotency key or pending identical hash.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionCheckoutResponse'
              example:
                ok: true
                data:
                  subscriptionId: null
                  draftId: 65f1b6a0be3f7e2ea1234567
                  paymentId: 65f1b6a0be3f7e2ea1234568
                  payment_url: https://mysr.co/invoice/abc
                  totals:
                    totalHalala: 277900
                    currency: SAR
                  reused: true
        '400':
          description: Validation error (including missing idempotency key).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingIdempotency:
                  value:
                    ok: false
                    error:
                      code: VALIDATION_ERROR
                      message: idempotencyKey is required (Idempotency-Key header, X-Idempotency-Key header, or body.idempotencyKey)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Idempotency conflict or checkout still initializing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                inProgress:
                  value:
                    ok: false
                    error:
                      code: CHECKOUT_IN_PROGRESS
                      message: Checkout initialization is still in progress. Retry with the same idempotency key.
                      details:
                        draftId: 65f1b6a0be3f7e2ea1234567
                conflict:
                  value:
                    ok: false
                    error:
                      code: IDEMPOTENCY_CONFLICT
                      message: idempotencyKey is already used with a different checkout payload
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/subscriptions/checkout-drafts/{draftId}:
    get:
      tags: [Subscriptions]
      summary: Get subscription checkout draft status
      description: Returns the server-side state of a subscription checkout draft without contacting the payment provider.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CheckoutDraftId'
      responses:
        '200':
          description: Checkout draft status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionCheckoutStatusResponse'
              example:
                ok: true
                data:
                  draftId: 65f1b6a0be3f7e2ea1234567
                  subscriptionId: null
                  checkoutStatus: pending_payment
                  paymentStatus: initiated
                  isFinal: false
                  paymentId: 65f1b6a0be3f7e2ea1234568
                  payment_url: https://mysr.co/invoice/abc
                  providerInvoiceId: iv_123
                  providerPaymentId: null
                  totals:
                    totalHalala: 265300
                    currency: SAR
                  failureReason: ""
                  completedAt: null
                  failedAt: null
                  checkedProvider: false
                  synchronized: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/subscriptions/checkout-drafts/{draftId}/verify-payment:
    post:
      tags: [Subscriptions]
      summary: Verify subscription checkout payment
      description: |
        Polls Moyasar for the current invoice status and synchronizes local records immediately.
        If the provider reports `paid`, this endpoint finalizes the checkout draft and creates the subscription without waiting for the webhook.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CheckoutDraftId'
      responses:
        '200':
          description: Provider status checked and local state synchronized when possible.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionCheckoutStatusResponse'
              example:
                ok: true
                data:
                  draftId: 65f1b6a0be3f7e2ea1234567
                  subscriptionId: 65f1b6a0be3f7e2ea1234999
                  checkoutStatus: completed
                  paymentStatus: paid
                  isFinal: true
                  paymentId: 65f1b6a0be3f7e2ea1234568
                  payment_url: https://mysr.co/invoice/abc
                  providerInvoiceId: iv_123
                  providerPaymentId: pay_123
                  totals:
                    totalHalala: 265300
                    currency: SAR
                  failureReason: ""
                  completedAt: 2026-03-08T12:00:00.000Z
                  failedAt: null
                  checkedProvider: true
                  synchronized: true
                  providerInvoice:
                    id: iv_123
                    status: paid
                    amount: 265300
                    currency: SAR
                    url: https://mysr.co/invoice/abc
                    updatedAt: 2026-03-08T12:00:00.000Z
                    attemptsCount: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Draft, payment, or provider snapshot conflicts with stored checkout state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'
        '502':
          description: Provider lookup failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                ok: false
                error:
                  code: PAYMENT_PROVIDER_ERROR
                  message: Failed to fetch payment status from provider

