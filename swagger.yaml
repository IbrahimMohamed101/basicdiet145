                    type: boolean
                  idempotent:
                    type: boolean
                    nullable: true
                  data:
                    type: object
                    properties:
                      order:
                        $ref: '#/components/schemas/Order'
                      requestedDeliveryDate:
                        type: string
                      adjustedDeliveryDate:
                        type: string
                      rejected:
                        type: boolean
              example:
                ok: true
                data:
                  order:
                    _id: 65f3b6a0be3f7e2ea12340aa
                    status: canceled
                    deliveryMode: delivery
                    requestedDeliveryDate: "2026-03-01"
                    deliveryDate: "2026-03-02"
                    deliveryDateAdjusted: true
                  requestedDeliveryDate: "2026-03-01"
                  adjustedDeliveryDate: "2026-03-02"
                  rejected: true
