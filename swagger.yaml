    post:
      tags: [Orders]
      summary: Checkout one-time order
      description: Creates order and initiated payment; delivery date may auto-shift if tomorrow cutoff already passed.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deliveryMode]
              properties:
                meals:
                  type: array
                  items:
                    type: object
                    required: [mealId]
                    properties:
                      mealId:
                        type: string
                      quantity:
                        type: integer
                        minimum: 1
                customSalads:
                  type: array
                  items:
                    type: object
                    properties:
                      ingredients:
                        type: array
                        items:
                          type: object
                          properties:
                            ingredientId:
                              type: string
                            quantity:
                              type: integer
                customMeals:
                  type: array
                  items:
                    type: object
                    properties:
                      ingredients:
                        type: array
                        items:
                          type: object
                          properties:
                            ingredientId:
                              type: string
                            quantity:
                              type: integer
                deliveryMode:
                  type: string
                  enum: [delivery, pickup]
                deliveryAddress:
                  $ref: '#/components/schemas/Address'
                deliveryWindow:
                  type: string
                deliveryDate:
                  type: string
                  pattern: '^\\d{4}-\\d{2}-\\d{2}$'
                successUrl:
                  type: string
                  format: uri
                backUrl:
                  type: string
                  format: uri
                idempotencyKey:
                  type: string
                  maxLength: 128
      responses:
        '201':
          description: Order checkout created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      orderId:
                        type: string
                      paymentId:
                        type: string
                        nullable: true
                      requestedDeliveryDate:
                        type: string
                      deliveryDate:
                        type: string
                      dateAdjusted:
                        type: boolean
                      payment_url:
                        type: string
                      invoice_id:
                        type: string
                        nullable: true
                      pricing:
                        $ref: '#/components/schemas/OrderPricing'
              example:
                ok: true
                data:
                  orderId: 65f3b6a0be3f7e2ea12340aa
                  paymentId: 65f3b6a0be3f7e2ea12340ab
                  requestedDeliveryDate: "2026-03-01"
                  deliveryDate: "2026-03-01"
                  dateAdjusted: false
                  payment_url: https://mysr.co/invoice/abc
                  invoice_id: inv_abc123
                  pricing:
                    unitPrice: 2500
                    premiumUnitPrice: 3500
                    quantity: 2
                    subtotal: 5000
                    deliveryFee: 0
                    total: 5000
                    currency: SAR
        '200':
          description: Existing initiated or already-paid checkout reused.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
