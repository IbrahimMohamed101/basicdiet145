  /api/admin/payments/{id}/verify:
    post:
      tags: [Admin (Dashboard), Payments]
      summary: Verify payment with provider
      description: |
        Polls Moyasar for the current invoice status of a specific payment and synchronizes local records immediately.
        If the provider reports `paid`, any pending side effect for the payment type is applied without waiting for the webhook.
      security:
        - dashboardBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Payment checked and synchronized when possible.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      payment:
                        $ref: '#/components/schemas/AdminPayment'
                      providerInvoice:
                        $ref: '#/components/schemas/ProviderInvoiceStatus'
                      checkedProvider:
                        type: boolean
                      synchronized:
                        type: boolean
                      applied:
                        type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
        '502':
          description: Provider lookup failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                ok: false
                error:
                  code: PAYMENT_PROVIDER_ERROR
                  message: Failed to fetch payment status from provider

