paths:
  /:
    get:
      tags: [System]
      summary: Root health endpoint
      description: Simple deployment smoke-test endpoint.
      responses:
        '200':
          description: Service is running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
              example:
                ok: true
                message: basicdiet145 backend is running

  /health:
    get:
      tags: [System]
      summary: Health check with DB status
      description: Returns API status and Mongo connectivity state.
      responses:
        '200':
          description: API and DB are healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  db:
                    type: object
                    additionalProperties: true
              example:
                ok: true
                db:
                  state: up
        '503':
          description: Database unavailable.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  db:
                    type: object
                    additionalProperties: true

  /api-docs:
    get:
      tags: [System]
      summary: Swagger UI
      description: Serves Swagger UI configured to load `/api-docs/swagger.yaml`.
      responses:
        '200':
          description: HTML page.
          content:
            text/html:
              schema:
                type: string

  /api-docs/swagger.yaml:
    get:
      tags: [System]
      summary: Raw Swagger YAML
      description: Serves the OpenAPI spec file used by Swagger UI.
      responses:
        '200':
          description: YAML document.
          content:
            text/yaml:
              schema:
                type: string

  /api/settings:
    get:
      tags: [System]
      summary: Get public runtime settings
      description: Returns settings map with defaults when keys are missing.
      responses:
        '200':
          description: Settings map.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/SettingsMap'

  /api/popular_packages:
    get:
      tags: [Plans]
      summary: Get popular packages
      description: Returns up to three active plans from the database, each mapped to its first active grams option and first active meals option so it can be used directly for subscription checkout.
      responses:
        '200':
          description: Popular packages list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        planId:
                          type: string
                        name:
                          type: string
                        daysCount:
                          type: integer
                          example: 7
                        mealsPerDay:
                          type: integer
                          example: 2
                        grams:
                          type: integer
                          example: 150
                        oldPrice:
                          type: integer
                          example: 280
                        newPrice:
                          type: integer
                          example: 320
                        moneySave:
                          type: number
                          example: 40
                        currency:
                          type: string
                          example: SAR
              example:
                status: true
                data:
                  - id: 65f1000a1f1f1f1f1f1f1001
                    planId: 65f1000a1f1f1f1f1f1f1001
                    name: Basic Plan
                    daysCount: 7
                    mealsPerDay: 2
                    grams: 150
                    oldPrice: 320
                    newPrice: 280
                    moneySave: 40
                    currency: SAR
                  - id: 65f1000a1f1f1f1f1f1f1002
                    planId: 65f1000a1f1f1f1f1f1f1002
                    name: Fit Plan
                    daysCount: 10
                    mealsPerDay: 3
                    grams: 200
                    oldPrice: 450
                    newPrice: 399
                    moneySave: 51
                    currency: SAR
                  - id: 65f1000a1f1f1f1f1f1f1003
                    planId: 65f1000a1f1f1f1f1f1f1003
                    name: Premium Plan
                    daysCount: 20
                    mealsPerDay: 3
                    grams: 250
                    oldPrice: 800
                    newPrice: 720
                    moneySave: 80
                    currency: SAR

  /api/webhooks/moyasar:
    post:
      tags: [Webhooks]
      summary: Moyasar payment webhook
      description: |
        Public webhook endpoint.

        Security behavior in code:
        - `MOYASAR_WEBHOOK_SECRET` is required and request body `secret_token` must match, otherwise `401 UNAUTHORIZED`.
        - Webhook payload identifiers must match stored payment identifiers, amount, and currency (`409 MISMATCH` on any mismatch).

        State machine behavior:
        - Always persists latest recognized payment status (`initiated|paid|failed|canceled|expired|refunded`).
        - Side effects are applied only when status is `paid` and `Payment.applied === false`.
        - Non-paid terminal statuses (`failed|canceled|expired`) update checkout draft status when applicable.

        Idempotency behavior:
        - Duplicate/repeated webhooks are safe.
        - `Payment.applied` is claimed atomically; once applied, webhook returns `{ ok: true }` without re-applying credits/subscription creation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  example: payment_paid
                event:
                  type: string
                secret_token:
                  type: string
                data:
                  type: object
                  properties:
                    id:
                      type: string
                    invoice_id:
                      type: string
                    status:
                      type: string
                      enum: [initiated, paid, failed, canceled, cancelled, expired, refunded]
                    amount:
                      type: number
                    currency:
                      type: string
                    metadata:
                      type: object
                      additionalProperties: true
                payment:
                  type: object
                  additionalProperties: true
            example:
              type: payment_paid
              secret_token: your-shared-secret
              data:
                id: pay_abc123
                invoice_id: inv_abc123
                status: paid
                amount: 5000
                currency: SAR
      responses:
        '200':
          description: Webhook accepted/processed (including duplicate or ignored events).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                    nullable: true
              examples:
                applied:
                  value:
                    ok: true
                ignoredNonPaid:
                  value:
                    ok: true
                    message: Ignored non-paid status
        '400':
          description: Invalid payload (missing payment identifiers).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                ok: false
                error:
                  code: INVALID
                  message: Missing payment identifiers
        '401':
          description: Invalid or missing webhook secret token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                ok: false
                error:
                  code: UNAUTHORIZED
                  message: Invalid webhook token
        '404':
          description: Referenced payment not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                ok: false
                error:
                  code: NOT_FOUND
                  message: Payment not found
        '409':
          description: Payload/payment mismatch (id/invoice/amount/currency).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                ok: false
                error:
                  code: MISMATCH
                  message: Amount mismatch
        '500':
          $ref: '#/components/responses/Internal'

  /api/auth/otp/request:
    post:
      tags: [Auth (App)]
      summary: Request OTP over WhatsApp
      description: Rate-limited endpoint that sends OTP to `phoneE164`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneE164]
              properties:
                phoneE164:
                  type: string
                  example: "+966501234567"
      responses:
        '200':
          description: OTP sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
              example:
                ok: true
        '400':
          description: Invalid phone input.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidPhone:
                  value:
                    ok: false
                    error:
                      code: INVALID_PHONE
                      message: phoneE164 must be a valid E.164 phone number
        '429':
          description: OTP cooldown or rate-limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                cooldown:
                  value:
                    ok: false
                    error:
                      code: OTP_COOLDOWN
                      message: Please wait 20s before requesting a new OTP
                      details:
                        cooldownSecondsRemaining: 20
                rateLimit:
                  value:
                    ok: false
                    error:
                      code: RATE_LIMIT
                      message: Too many OTP requests
        '500':
          $ref: '#/components/responses/Internal'

  /api/auth/otp/verify:
    post:
      tags: [Auth (App)]
      summary: Verify OTP and issue app access token
      description: Verifies OTP and returns JWT (`tokenType=app_access`) plus normalized app user profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneE164, otp]
              properties:
                phoneE164:
                  type: string
                otp:
                  type: string
                  description: 6-digit code
      responses:
        '200':
          description: Verified.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/AuthUserProfile'
              example:
                ok: true
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                user:
                  id: 65f0f01f1f1f1f1f1f1f1f20
                  fullName: null
                  phone: "+966501234567"
                  email: null
                  role: client
                  createdAt: "2026-02-26T07:30:00.000Z"
        '400':
          description: Invalid input or expired/missing OTP.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid OTP.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: OTP attempts exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/Internal'

  /api/auth/device-token:
    post:
      tags: [Auth (App), Users]
      summary: Attach mobile device token to authenticated user
      description: Adds an FCM token to `User.fcmTokens` with `$addToSet` semantics.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token saved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
              example:
                ok: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [Auth (App), Users]
      summary: Remove mobile device token from authenticated user
      description: Removes an FCM token from the authenticated user, typically during logout or device replacement.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token removed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
              example:
                ok: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/dashboard/auth/login:
    post:
      tags: [Auth (Dashboard)]
      summary: Dashboard login with email and password
      description: Returns dashboard access JWT (`tokenType=dashboard_access`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/DashboardUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '423':
          description: Account temporarily locked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /api/dashboard/auth/me:
    get:
      tags: [Auth (Dashboard)]
      summary: Get authenticated dashboard user profile
      security:
        - dashboardBearerAuth: []
      responses:
        '200':
          description: Current dashboard user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/DashboardUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dashboard/auth/logout:
    post:
      tags: [Auth (Dashboard)]
      summary: Dashboard logout
      description: Stateless JWT logout. Server-side token revocation is not implemented.
      security:
        - dashboardBearerAuth: []
      responses:
        '200':
          description: Logged out (no-op for stateless JWT).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
              example:
                ok: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/app/login:
    post:
      tags: [Auth (App)]
      summary: App login step (request OTP)
      description: Requests an OTP for an existing user sign-in flow. The next step is `POST /api/app/verify`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneE164]
              properties:
                phoneE164:
                  type: string
      responses:
        '200':
          description: OTP sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      phoneE164:
                        type: string
                      nextStep:
                        type: string
                        example: verify
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/Internal'

  /api/app/register:
    post:
      tags: [Auth (App)]
      summary: App registration step (request OTP)
      description: Starts a new app-user registration flow, stores the submitted profile data temporarily, and sends an OTP. The next step is `POST /api/app/verify`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, phoneE164]
              properties:
                fullName:
                  type: string
                phoneE164:
                  type: string
                email:
                  type: string
                  nullable: true
      responses:
        '200':
          description: OTP sent for registration verification.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      phoneE164:
                        type: string
                      nextStep:
                        type: string
                        example: verify
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/Internal'

  /api/app/verify:
    post:
      tags: [Auth (App)]
      summary: Verify app OTP and finish sign-in or sign-up
      description: Verifies the OTP and returns an app access token. If the OTP was requested by `/api/app/register`, the pending full name and email are applied before issuing the token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneE164, otp]
              properties:
                phoneE164:
                  type: string
                otp:
                  type: string
                  description: 6-digit code
      responses:
        '200':
          description: Verified.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  token:
                    type: string
                  user:
