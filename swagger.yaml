openapi: 3.0.3
info:
  title: basicdiet145 Backend API
  version: 1.0.0
  description: |
    Code-inspected OpenAPI spec for the Node.js + Express + MongoDB backend.

    Authentication details:
    - `bearerAuth` is JWT for app/mobile users (`Authorization: Bearer <token>`).
    - App tokens are minted by OTP/app auth endpoints and include `tokenType: app_access`.
    - `dashboardBearerAuth` is JWT for dashboard/internal users and includes `tokenType: dashboard_access`.
    - In development only, `DEV_AUTH_BYPASS=true` allows a static token (`DEV_STATIC_TOKEN`) mapped to configured user/role.

    Localization:
    - Some endpoints resolve multilingual fields using `Accept-Language`.
    - Supported resolved languages are `ar` and `en`.
    - Fallback order at runtime: requested language -> other supported language -> empty string.

servers:
  - url: http://localhost:{port}
    description: Local development server
    variables:
      port:
        default: "3000"

tags:
  - name: System
    description: Health and documentation endpoints.
  - name: Auth (App)
    description: OTP and app registration/authentication.
  - name: Auth (Dashboard)
    description: Email/password + JWT auth for internal dashboard users.
  - name: Users
    description: User and dashboard-user related endpoints.
  - name: Meals / Menu
    description: Meals, salad ingredients, and custom salad pricing.
  - name: Plans
    description: Subscription plan endpoints.
  - name: Orders
    description: One-time order lifecycle endpoints.
  - name: Deliveries / Courier
    description: Courier and delivery operations.
  - name: Kitchen
    description: Kitchen operations and transitions.
  - name: Subscriptions
    description: Subscription lifecycle and day operations.
  - name: Webhooks
    description: External webhook ingestion.
  - name: Admin (Dashboard)
    description: Admin settings and dashboard management endpoints.
  - name: Notifications
    description: Notification-log endpoints.
  - name: Menu
    description: Public premium meals and addons menu endpoints.
  - name: Wallet
    description: Premium/addon wallet consumption, refunds, and top-ups.
  - name: Admin
    description: Admin CRUD and controls for premium meals and addons.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        App JWT signed with `JWT_SECRET`.
        App tokens include `tokenType=app_access` and `role=client`.
        DEV-only bypass: if `DEV_AUTH_BYPASS=true`, exact token match against `DEV_STATIC_TOKEN` is accepted.
    dashboardBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Dashboard JWT signed with `DASHBOARD_JWT_SECRET`.
        Dashboard tokens include `tokenType=dashboard_access` and role in `superadmin|admin|kitchen|courier`.

  parameters:
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      description: Preferred language. Runtime resolves to `ar` or `en`; unknown values fall back to `ar`.
      schema:
        type: string
        example: en
    PlanId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Plan Mongo ObjectId.
    SubscriptionId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId.
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId.
    DeliveryId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId.
    IngredientId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Mongo ObjectId.
    KsaDate:
      name: date
      in: path
      required: true
      schema:
        type: string
        pattern: '^\\d{4}-\\d{2}-\\d{2}$'
      description: KSA date string in `YYYY-MM-DD` format.
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: INVALID
              message: Invalid input
    Unauthorized:
      description: Missing or invalid token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: UNAUTHORIZED
              message: Missing token
    Forbidden:
      description: Authenticated but insufficient role/permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: FORBIDDEN
              message: Insufficient permissions
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: NOT_FOUND
              message: Resource not found
    Conflict:
      description: Resource state conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: LOCKED
              message: Day is locked
    Unprocessable:
      description: Unprocessable entity / business rule violation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: SUB_INACTIVE
              message: Subscription not active
    TooManyRequests:
      description: Rate limit or OTP cooldown exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: RATE_LIMIT
              message: Too many requests
    Internal:
      description: Internal error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: INTERNAL
              message: Unexpected error
    ValidationError:
      description: Input validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: VALIDATION_ERROR
              message: Invalid request payload
    LockedConflict:
      description: Day is not open / resource is locked.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: LOCKED
              message: Day is locked
    CheckoutInProgressConflict:
      description: Existing checkout draft is still initializing for the same idempotency scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: CHECKOUT_IN_PROGRESS
              message: Checkout initialization is still in progress. Retry with the same idempotency key.
              details:
                draftId: 65f1b6a0be3f7e2ea1234567
    IdempotencyConflict:
      description: Idempotency key reused with a different payload or finalized status.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: IDEMPOTENCY_CONFLICT
              message: idempotencyKey is already used with a different checkout payload
    DataIntegrityConflict:
      description: Wallet refund/restore integrity violation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: DATA_INTEGRITY_ERROR
              message: Cannot refund premium credits because the original wallet bucket was not found
    InsufficientPremium:
      description: Not enough premium credits available.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: INSUFFICIENT_PREMIUM
              message: Not enough premium credits
    InsufficientAddon:
      description: Not enough addon credits available.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: INSUFFICIENT_ADDON
              message: Not enough addon credits
    MismatchConflict:
      description: Webhook payload does not match stored payment identifiers/amount/currency.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            ok: false
            error:
              code: MISMATCH
              message: Amount mismatch

  schemas:
    ErrorObject:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    ErrorResponse:
      description: |
        Runtime error envelope returned by `errorResponse(...)`.
        Shape in backend responses is `{ ok:false, error:{ code, message, details? } }`.
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum: [false]
        code:
          type: string
          nullable: true
          description: Optional flattened alias for compatibility; canonical value is `error.code`.
        message:
          type: string
          nullable: true
          description: Optional flattened alias for compatibility; canonical value is `error.message`.
        details:
          type: object
          nullable: true
          additionalProperties: true
          description: Optional flattened alias for compatibility; canonical value is `error.details`.
        error:
          $ref: '#/components/schemas/ErrorObject'

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          nullable: true
          description: Optional payload object; shape varies by endpoint.
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
            - type: string
            - type: number
            - type: boolean

    HalalaAmount:
      type: integer
      minimum: 0
      description: Amount in halala (SAR minor units). All pricing is SAR-only.

    LocalizedText:
      type: object
      properties:
        ar:
          type: string
        en:
          type: string
      additionalProperties: false

    Address:
      type: object
      properties:
        line1:
          type: string
        line2:
          type: string
        city:
          type: string
        notes:
          type: string

    DeliverySlotInput:
      type: object
      properties:
        type:
          type: string
          enum: [delivery, pickup]
        window:
          type: string
        slotId:
          type: string

    DeliveryInput:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [delivery, pickup]
        address:
          type: object
          nullable: true
          additionalProperties: true
        slot:
          $ref: '#/components/schemas/DeliverySlotInput'

    PremiumItemInput:
      type: object
      required: [premiumMealId, qty]
      properties:
        premiumMealId:
          type: string
        qty:
          type: integer
          minimum: 1

    AddonItemInput:
      type: object
      required: [addonId, qty]
      properties:
        addonId:
          type: string
        qty:
          type: integer
          minimum: 1

    CheckoutBreakdown:
      type: object
      properties:
        basePlanPriceHalala:
          $ref: '#/components/schemas/HalalaAmount'
        premiumTotalHalala:
          $ref: '#/components/schemas/HalalaAmount'
        addonsTotalHalala:
          $ref: '#/components/schemas/HalalaAmount'
        deliveryFeeHalala:
          $ref: '#/components/schemas/HalalaAmount'
        vatHalala:
          $ref: '#/components/schemas/HalalaAmount'
        totalHalala:
          $ref: '#/components/schemas/HalalaAmount'
        currency:
          type: string
          enum: [SAR]
      description: |
        All prices are in SAR halala integers.
        `deliveryFeeHalala` is determined server-side only.
        If server cannot determine delivery fee, backend returns `400 VALIDATION_ERROR`.

    SubscriptionQuoteRequest:
      type: object
      required: [planId, grams, mealsPerDay, delivery]
      properties:
        planId:
          type: string
        grams:
          type: integer
          minimum: 1
        mealsPerDay:
          type: integer
          minimum: 1
        startDate:
          type: string
          format: date
        delivery:
          $ref: '#/components/schemas/DeliveryInput'
        premiumItems:
          type: array
          items:
            $ref: '#/components/schemas/PremiumItemInput'
        addons:
          type: array
          items:
            $ref: '#/components/schemas/AddonItemInput'
      description: Quote input. Totals are always recomputed server-side.

    SubscriptionQuoteResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            breakdown:
              $ref: '#/components/schemas/CheckoutBreakdown'
            totalSar:
              type: number

    SubscriptionCheckoutRequest:
      type: object
      required: [planId, grams, mealsPerDay, delivery]
      properties:
        planId:
          type: string
        grams:
          type: integer
          minimum: 1
        mealsPerDay:
          type: integer
          minimum: 1
        startDate:
          type: string
          format: date
        idempotencyKey:
          type: string
          description: Optional body key; header keys are also accepted.
        delivery:
          $ref: '#/components/schemas/DeliveryInput'
        successUrl:
          type: string
        backUrl:
          type: string
        premiumItems:
          type: array
          items:
            $ref: '#/components/schemas/PremiumItemInput'
        addons:
          type: array
          items:
            $ref: '#/components/schemas/AddonItemInput'
      description: |
        Idempotency key is required from either:
        - `Idempotency-Key` header
        - `X-Idempotency-Key` header
        - `body.idempotencyKey`

    SubscriptionCheckoutData:
      type: object
      properties:
        subscriptionId:
          type: string
          nullable: true
          description: Always `null` during checkout init. Created only after paid webhook.
        draftId:
          type: string
        paymentId:
          type: string
          nullable: true
        payment_url:
          type: string
        totals:
          $ref: '#/components/schemas/CheckoutBreakdown'
        reused:
          type: boolean
          nullable: true

    SubscriptionCheckoutResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/SubscriptionCheckoutData'

    ConsumePremiumSelectionRequest:
      type: object
      required: [baseSlotKey, premiumMealId]
      properties:
        dayId:
          type: string
        date:
          type: string
          pattern: '^\\d{4}-\\d{2}-\\d{2}$'
        baseSlotKey:
          type: string
        premiumMealId:
          type: string

    ConsumePremiumSelectionResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            subscriptionId:
              type: string
            premiumMealId:
              type: string
            remainingQtyTotal:
              type: integer

    RefundPremiumSelectionRequest:
      type: object
      required: [baseSlotKey]
      properties:
        dayId:
          type: string
        date:
          type: string
          pattern: '^\\d{4}-\\d{2}-\\d{2}$'
        baseSlotKey:
          type: string

    ConsumeAddonSelectionRequest:
      type: object
      required: [addonId, qty]
      properties:
        dayId:
          type: string
        date:
          type: string
          pattern: '^\\d{4}-\\d{2}-\\d{2}$'
        addonId:
          type: string
        qty:
          type: integer
          minimum: 1

    ConsumeAddonSelectionResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            subscriptionId:
              type: string
            addonId:
              type: string
            remainingQtyTotal:
              type: integer

    RefundAddonSelectionRequest:
      type: object
      required: [addonId]
      properties:
        dayId:
          type: string
        date:
          type: string
          pattern: '^\\d{4}-\\d{2}-\\d{2}$'
        addonId:
          type: string

    PremiumTopupRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PremiumItemInput'
        successUrl:
          type: string
        backUrl:
          type: string
      description: Payment is initialized now; wallet credits are applied only after paid webhook.

    AddonTopupRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AddonItemInput'
        successUrl:
          type: string
        backUrl:
          type: string
      description: Payment is initialized now; wallet credits are applied only after paid webhook.

    TopupInitResponse:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            payment_url:
              type: string
            invoice_id:
              type: string
            payment_id:
              type: string
            totalHalala:
              type: integer
              nullable: true

    PaginationMeta:
      type: object
      required:
        - page
        - limit
        - total
        - totalPages
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    User:
      type: object
      properties:
        _id:
          type: string
        phone:
          type: string
        name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        role:
          type: string
          enum: [client, admin, kitchen, courier]
        isActive:
          type: boolean
        fcmTokens:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AppUser:
      type: object
      properties:
        _id:
          type: string
        fullName:
          type: string
          nullable: true
        phone:
          type: string
        email:
          type: string
          nullable: true
        role:
          type: string
          enum: [app_user]
        fcmTokens:
          type: array
          items:
            type: string
        coreUserId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DashboardUser:
      type: object
      properties:
        _id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [superadmin, admin, kitchen, courier]
        isActive:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        failedAttempts:
          type: integer
        lockUntil:
          type: string
          format: date-time
          nullable: true
        passwordChangedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuthUserProfile:
      type: object
      required:
        - id
        - phone
        - role
      properties:
        id:
          type: string
        fullName:
          type: string
          nullable: true
        phone:
          type: string
        email:
          type: string
          nullable: true
        role:
          type: string
          enum: [client]
        createdAt:
          type: string
          format: date-time

    PlanFreezePolicy:
      type: object
      properties:
        enabled:
          type: boolean
        maxDays:
          type: integer
        maxTimes:
          type: integer

    PlanMealsOption:
      type: object
      description: Public meals option shape returned by `/api/plans` endpoints.
      properties:
        mealsPerDay:
          type: integer
        priceHalala:
          $ref: '#/components/schemas/HalalaAmount'
        compareAtHalala:
          $ref: '#/components/schemas/HalalaAmount'
        priceSar:
          type: number
          description: "priceHalala / 100"
        compareAtSar:
          type: number
          description: "compareAtHalala / 100"
      required: [mealsPerDay, priceHalala, compareAtHalala, priceSar, compareAtSar]

    PlanGramsOption:
      type: object
      description: Public grams option shape returned by `/api/plans` endpoints.
      properties:
        grams:
          type: integer
        mealsOptions:
          type: array
          items:
            $ref: '#/components/schemas/PlanMealsOption'
      required: [grams, mealsOptions]

    PlanCreateMealsOption:
      type: object
      description: Admin create/update meals option payload.
      required: [mealsPerDay, priceHalala, compareAtHalala]
      properties:
        mealsPerDay:
          type: integer
          minimum: 1
        sortOrder:
          type: integer
          minimum: 0
        isActive:
          type: boolean
          default: true
        priceHalala:
          $ref: '#/components/schemas/HalalaAmount'
        compareAtHalala:
          $ref: '#/components/schemas/HalalaAmount'

    PlanCreateGramsOption:
      type: object
      description: Admin create/update grams option payload.
      required: [grams, mealsOptions]
      properties:
        grams:
          type: integer
          minimum: 1
        sortOrder:
          type: integer
          minimum: 0
        isActive:
          type: boolean
          default: true
        mealsOptions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PlanCreateMealsOption'

    PlanCreateRequest:
      type: object
      description: |
        Admin plan create payload.
        - Currency is system currency and must be `SAR`.
        - All prices are integers in halala.
      required: [name, daysCount, gramsOptions]
      properties:
        name:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/LocalizedText'
        daysCount:
          type: integer
          minimum: 1
        currency:
          type: string
          enum: [SAR]
          default: SAR
        sortOrder:
          type: integer
          minimum: 0
        isActive:
          type: boolean
          default: true
        skipAllowanceCompensatedDays:
          type: integer
          minimum: 0
        freezePolicy:
          $ref: '#/components/schemas/PlanFreezePolicy'
        gramsOptions:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PlanCreateGramsOption'

    PlanPublic:
      type: object
      description: |
        Public plan shape returned by authenticated client endpoints.
        Only active plans/options are included by runtime filtering.
      properties:
        id:
          type: string
        name:
          type: string
          description: Localized resolved name from `Accept-Language` (ar/en, fallback ar).
        daysCount:
          type: integer
        currency:
          type: string
          enum: [SAR]
          example: SAR
        isActive:
          type: boolean
        skipAllowanceCompensatedDays:
          type: integer
        freezePolicy:
          $ref: '#/components/schemas/PlanFreezePolicy'
        gramsOptions:
          type: array
          items:
            $ref: '#/components/schemas/PlanGramsOption'
      required:
        [id, name, daysCount, currency, isActive, skipAllowanceCompensatedDays, freezePolicy, gramsOptions]

    Plan:
      type: object
      properties:
        _id:
          type: string
        name:
          $ref: '#/components/schemas/LocalizedText'
        daysCount:
          type: integer
        currency:
          type: string
          example: SAR
        gramsOptions:
          type: array
          items:
            $ref: '#/components/schemas/PlanCreateGramsOption'
        skipAllowanceCompensatedDays:
          type: integer
        freezePolicy:
          $ref: '#/components/schemas/PlanFreezePolicy'
        isActive:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PlanResolvedMealsOption:
      allOf:
        - $ref: '#/components/schemas/PlanMealsOption'

    PlanResolvedGramsOption:
      allOf:
        - $ref: '#/components/schemas/PlanGramsOption'

    PlanResolved:
      allOf:
        - $ref: '#/components/schemas/PlanPublic'

    Meal:
      type: object
      properties:
        _id:
          type: string
        name:
          $ref: '#/components/schemas/LocalizedText'
        type:
          type: string
          enum: [regular, premium]
        isActive:
          type: boolean

    PremiumMeal:
      type: object
      description: Public menu shape (localized fields already resolved to strings).
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        extraFeeHalala:
          $ref: '#/components/schemas/HalalaAmount'
        extraFeeSar:
          type: number
