  /api/admin/subscriptions:
    get:
      tags: [Admin (Dashboard), Subscriptions]
      summary: List subscriptions
      description: |
        Returns subscriptions across all app users, newest first.
        Supports server-side search, status filtering, start-date range filtering, and pagination.
      security:
        - dashboardBearerAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search by user name, phone, email, plan name, subscription ObjectId, or displayId like `SUB-ABC123`.
        - in: query
          name: status
          schema:
            type: string
            enum: [all, active, pending, pending_payment, expired, canceled, ended]
          description: Filter by subscription status. `pending` is treated as `pending_payment`.
        - in: query
          name: from
          schema:
            type: string
            format: date
          description: Filter by `startDate` from this date inclusive.
        - in: query
          name: to
          schema:
            type: string
            format: date
          description: Filter by `startDate` until this date inclusive.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
          description: Pagination page number.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
          description: Pagination page size.
      responses:
        '200':
          description: Subscriptions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminSubscription'
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
                  filters:
                    type: object
                    properties:
                      q:
                        type: string
                        nullable: true
                      status:
                        type: string
                        nullable: true
                      from:
                        type: string
                        nullable: true
                      to:
                        type: string
                        nullable: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Admin (Dashboard), Subscriptions]
      summary: Create subscription from dashboard
      description: Creates an active subscription directly for an app user using a valid plan/grams/meals selection.
      security:
        - dashboardBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, planId, grams, mealsPerDay, startDate]
              properties:
                userId:
                  type: string
                planId:
                  type: string
                grams:
                  type: integer
                mealsPerDay:
                  type: integer
                startDate:
                  type: string
                deliveryMode:
                  type: string
                  enum: [delivery, pickup]
                deliveryAddress:
                  type: object
                deliveryWindow:
                  type: string
                premiumItems:
                  type: array
                  items:
                    $ref: '#/components/schemas/PremiumItemInput'
                addons:
                  type: array
                  items:
                    $ref: '#/components/schemas/SubscriptionAddonSelectionId'
      responses:
        '201':
          description: Created subscription.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/subscriptions/summary:
    get:
      tags: [Admin (Dashboard), Subscriptions]
      summary: Get subscriptions summary cards
      description: |
        Returns top-card summary values for the subscriptions screen.
        Supports `q`, `from`, and `to`. If `status` is provided, it is echoed back and `selectedStatusCount`
        is returned, while the per-status cards still represent the broader filtered result set.
      security:
        - dashboardBearerAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [all, active, pending, pending_payment, expired, canceled, ended]
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Subscription summary cards.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    properties:
                      filters:
                        type: object
                      summary:
                        type: object
                        properties:
                          totalSubscriptions:
                            type: integer
                          activeSubscriptions:
                            type: integer
                          pendingSubscriptions:
                            type: integer
                          expiredSubscriptions:
                            type: integer
                          canceledSubscriptions:
                            type: integer
                          endedSubscriptions:
                            type: integer
                          selectedStatusCount:
                            type: integer
                            nullable: true
                          totalRemainingMeals:
                            type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

