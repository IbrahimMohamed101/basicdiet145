      description: |
        Requires auth.
        Returns active plans only.
        Currency in response is always `SAR` (system currency). If non-SAR plan currency exists in database, checkout validation rejects it server-side.
        Each plan includes active grams options and active meals options only, sorted by:
        - plans: `sortOrder ASC`, then `createdAt DESC`
        - grams options: `sortOrder ASC`, then `grams ASC`
        - meals options: `sortOrder ASC`, then `mealsPerDay ASC`
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: Plan list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlanPublic'
              example:
                ok: true
                data:
                  - id: 65f1000a1f1f1f1f1f1f1001
                    name: 26 Days
                    daysCount: 26
                    currency: SAR
                    isActive: true
                    skipAllowanceCompensatedDays: 3
                    freezePolicy:
                      enabled: true
                      maxDays: 31
                      maxTimes: 1
                    gramsOptions:
                      - grams: 100
                        mealsOptions:
                          - mealsPerDay: 1
                            priceHalala: 259900
                            compareAtHalala: 289900
                            priceSar: 2599
                            compareAtSar: 2899
        '401':
          $ref: '#/components/responses/Unauthorized'

