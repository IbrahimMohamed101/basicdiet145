  /subscriptions/{id}/operations-meta:
    get:
      tags: [Operations]
      summary: Get subscription operations metadata
      description: |
        Returns action availability, policy metadata, and usage counters for client subscription operations.
        This endpoint supports Manage Subscription, Freeze, Skip, Delivery Settings, and capability gating in the mobile UI.
      security:
        - AppBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      responses:
        '200':
          description: Operations metadata returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                ok: true
                data:
                  subscriptionId: "65f000000000000000000200"
                  statusContext:
                    storedStatus: active
                    effectiveStatus: active
                    derivedEffectiveStatus: false
                  operations:
                    cancel:
                      supported: true
                      canSubmit: true
                      reasonCode: null
                      allowedStoredStatuses: [active, pending_payment]
                      decisionBasis: stored_status
                    freeze:
                      supported: true
                      canSubmit: true
                      reasonCode: null
                      policy:
                        enabled: true
                        maxDays: 31
                        maxTimes: 1
                      usage:
                        frozenDaysUsed: 3
                        frozenDaysRemaining: 28
                        frozenBlocksUsed: 1
                        frozenBlocksRemaining: 0
                    skip:
                      supported: true
                      canSubmit: true
                      reasonCode: null
                      policy:
                        allowanceScope: plan_policy_snapshot
                        enabled: true
                        maxDays: 5
                        compensationMode: validity_extension
                      usage:
                        usedDays: 2
                        remainingDays: 3
                    delivery:
                      supported: true
                      canSubmit: true
                      reasonCode: null
                      currentMode: delivery
                      modeChangeSupported: false
                      optionsEndpoint: /api/subscriptions/delivery-options
                    paymentMethods:
                      supported: false
                      canManage: false
                      reasonCode: PROVIDER_TOKENIZATION_UNAVAILABLE
                      provider: moyasar
                      mode: invoice_only
        '400':
          description: INVALID_ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: FORBIDDEN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: NOT_FOUND
          content:
            application/json:
