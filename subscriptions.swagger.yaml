openapi: 3.0.3
info:
  title: Subscriptions API
  version: "1.0.0"
  description: |
    Subscriptions-focused API specification for the BasicDiet backend.

    This document covers:
    - App / mobile subscription endpoints under `/api/subscriptions/*`
    - Admin / dashboard subscription endpoints under `/api/admin/*`
    - Dashboard aliases under `/api/dashboard/*`

    Authentication:
    - `GET /subscriptions/menu` is public.
    - All other `/subscriptions/*` endpoints require an App bearer token.
    - All `/admin/*` and `/dashboard/*` endpoints require a Dashboard bearer token.

    Localization:
    - Pass `?lang=en` or `?lang=ar`
    - Or send `Accept-Language: en|ar`
    - Precedence: query string > header > fallback
    - Fallback language: `ar`

    Response envelope:
    - Most endpoints return `{ "ok": true, "data": ... }`
    - Errors return `{ "ok": false, "error": { "code": "...", "message": "..." } }`
    - A few legacy or development-only routes may return a `message` field instead of a full `data` object

    Important frontend rules:
    - Never use localized `*Label` fields for business logic
    - Always use machine fields such as `status`, `paymentStatus`, `walletType`, `source`, and `error.code`
    - Always call the relevant `verify-payment` endpoint after payment-provider redirects when such an endpoint exists
    - Always send an `idempotencyKey` for checkout creation and reuse it on safe checkout retries
    - Do not assume every payment-creation endpoint uses the same idempotency contract unless explicitly documented
servers:
  - url: http://localhost:3000/api
    description: Local
  - url: https://your-api-domain.com/api
    description: Production
tags:
  - name: Menu
  - name: Checkout
  - name: Subscriptions
  - name: Timeline & Days
  - name: Day Planning
  - name: Premium & Payments
  - name: Operations
  - name: Admin - Upload
  - name: Admin - Subscriptions
components:
  securitySchemes:
    AppBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: App user bearer token
    DashboardBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Dashboard bearer token
  parameters:
    LangQuery:
      name: lang
      in: query
      required: false
      schema:
        type: string
        enum: [ar, en]
      description: Optional language override. Takes precedence over `Accept-Language`.
    SubscriptionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        example: "65f000000000000000000200"
    DateParam:
      name: date
      in: path
      required: true
      schema:
        type: string
        format: date
        example: "2026-03-26"
    DraftId:
      name: draftId
      in: path
      required: true
      schema:
        type: string
        example: "65f000000000000000000100"
    PaymentId:
      name: paymentId
      in: path
      required: true
      schema:
        type: string
        example: "65f000000000000000000501"
  schemas:
    SuccessEnvelope:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        data:
          type: object
      required: [ok]
    ErrorEnvelope:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: INVALID
            message:
              type: string
              example: Localized human-readable message
            details:
              type: object
              additionalProperties: true
          required: [code, message]
      required: [ok, error]
    DeliveryAddress:
      type: object
      properties:
        line1:
          type: string
          example: King Fahd Road
        line2:
          type: string
          example: Building 78
        city:
          type: string
          example: Riyadh
        district:
          type: string
          example: Al Malqa
        street:
          type: string
          example: King Fahd Road
        building:
          type: string
          example: "78"
        apartment:
          type: string
          example: "5"
        lat:
          type: number
          example: 24.7136
        lng:
          type: number
          example: 46.6753
        notes:
          type: string
          example: Leave at the door
    DeliverySlot:
      type: object
      properties:
        type:
          type: string
          example: delivery
        window:
          type: string
          example: "09:00 - 12:00"
        slotId:
          type: string
          example: ""
    DeliveryPayload:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [delivery, pickup]
        zoneId:
          type: string
        zoneName:
          type: string
        address:
          $ref: '#/components/schemas/DeliveryAddress'
        slot:
          $ref: '#/components/schemas/DeliverySlot'
        pickupLocationId:
          type: string
    DeliveryArea:
      type: object
      properties:
        id:
          type: string
        zoneId:
          type: string
        name:
          type: string
          example: Al Malqa
        label:
          type: string
          example: Al Malqa
        feeHalala:
          type: integer
          example: 1500
        feeSar:
          type: number
          example: 15
        feeLabel:
          type: string
          example: 15 SAR
        isActive:
          type: boolean
        availability:
          type: string
          enum: [available, unavailable]
        availabilityLabel:
          type: string
          example: Available
    QuoteRequestBody:
      type: object
      required: [planId, grams, mealsPerDay, delivery]
      properties:
        planId:
          type: string
          example: "65f000000000000000000001"
        grams:
          type: integer
          example: 1200
        mealsPerDay:
          type: integer
          example: 3
        startDate:
          type: string
          format: date
        premiumCount:
          type: integer
        premiumItems:
          type: array
          items:
            type: object
            required: [premiumMealId, qty]
            properties:
              premiumMealId:
                type: string
              qty:
                type: integer
                minimum: 1
        addons:
          type: array
          items:
            type: string
          description: |
            Recurring purchase-flow add-ons are sent as selected ids only.
            Each selected id implies qty = 1 per day across the full subscription duration.
        delivery:
          $ref: '#/components/schemas/DeliveryPayload'
    RenewRequestBody:
      type: object
      properties:
        planId:
          type: string
        grams:
          type: integer
        mealsPerDay:
          type: integer
        startDate:
          type: string
          format: date
        premiumItems:
          type: array
          items:
            type: object
            required: [premiumMealId, qty]
            properties:
              premiumMealId:
                type: string
              qty:
                type: integer
                minimum: 1
        addons:
          type: array
          items:
            type: string
          description: |
            Recurring purchase-flow add-ons are sent as selected ids only.
            Each selected id implies qty = 1 per day across the full subscription duration.
        delivery:
          $ref: '#/components/schemas/DeliveryPayload'
        idempotencyKey:
          type: string
        successUrl:
          type: string
        backUrl:
          type: string
    PriceTotals:
      type: object
      properties:
        basePlanPriceHalala:
          type: integer
          example: 180000
        premiumTotalHalala:
          type: integer
          example: 4000
        addonsTotalHalala:
          type: integer
          example: 1500
        deliveryFeeHalala:
          type: integer
          example: 1000
        vatHalala:
          type: integer
          example: 27975
        totalHalala:
          type: integer
          example: 214475
        currency:
          type: string
          example: SAR
    CloudinaryUploadResponse:
      type: object
      properties:
        url:
          type: string
          description: Always normalized to the secure Cloudinary URL
        secureUrl:
          type: string
          description: Kept for compatibility and matches `url`
        publicId:
          type: string
        resourceType:
          type: string
          example: image
    DaySelectionRequest:
      type: object
      properties:
        selections:
          type: array
          items:
            type: string
        premiumSelections:
          type: array
          items:
            type: string
        oneTimeAddonSelections:
          type: array
          items:
            type: string
        addonsOneTime:
          type: array
          items:
            type: object
            additionalProperties: true
    TimelineDay:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2026-03-21"
        status:
          type: string
          enum: [planned, locked, delivered, frozen, skipped, extension]
        statusLabel:
          type: string
          example: Planned
        source:
          type: string
          enum: [base, freeze_compensation, skip_compensation]
        sourceLabel:
          type: string
          example: Base
        locked:
          type: boolean
        isExtension:
          type: boolean
        meals:
          type: object
          properties:
            selected:
              type: integer
              example: 3
            required:
              type: integer
              example: 3
            isSatisfied:
              type: boolean
              example: true
    SubscriptionTimeline:
      type: object
      properties:
        subscriptionId:
          type: string
        validity:
          type: object
          properties:
            startDate:
              type: string
              format: date
            endDate:
              type: string
              format: date
            validityEndDate:
              type: string
              format: date
            compensationDays:
              type: integer
            freezeCompensationDays:
              type: integer
            skipCompensationDays:
              type: integer
        days:
          type: array
          items:
            $ref: '#/components/schemas/TimelineDay'
    SubscriptionTimelineResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SubscriptionTimeline'
paths:
  /subscriptions/menu:
    get:
      tags: [Menu]
      summary: Get subscription menu
      description: |
        Public catalog endpoint used to build the subscription purchase UI.
        Meal objects inside `regularMeals` and `premiumMeals` include nutrition fields:
        `proteinGrams`, `carbGrams`, and `fatGrams`.
      parameters:
        - $ref: '#/components/parameters/LangQuery'
      responses:
        '200':
          description: Subscription catalog returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                ok: true
                data:
                  currency: SAR
                  regularMeals:
                    - id: 65f000000000000000000301
                      name: Grilled Chicken
                      description: Included regular meal
                      imageUrl: https://cdn.example.com/chicken.jpg
                      category: Chicken
                      categoryKey: chicken
                      proteinGrams: 33
                      carbGrams: 37
                      fatGrams: 19
                      type: regular
                      pricingModel: included
                      priceHalala: 0
                      priceSar: 0
                      currency: SAR
                  premiumMeals:
                    - id: 65f000000000000000000020
                      name: Steak
                      description: Premium upgrade
                      imageUrl: https://cdn.example.com/steak.jpg
                      proteinGrams: 33
                      carbGrams: 37
                      fatGrams: 19
                      type: premium
                      pricingModel: extra_fee
                      priceHalala: 1500
                      priceSar: 15
                      extraFeeHalala: 1500
                      extraFeeSar: 15
                      currency: SAR
                  delivery:
                    methods:
                      - id: delivery
                        type: delivery
                        title: Home Delivery
                        subtitle: Get your meals delivered to your doorstep
                        pricingMode: zone_based
                        feeHalala: 0
                        feeSar: 0
                        feeLabel: Depends on area
                        helperText: Delivery fee depends on your area
                        areaSelectionRequired: true
                        requiresAddress: true
                        slots:
                          - id: delivery_09:00_-_12:00
                            type: delivery
                            window: "09:00 - 12:00"
                            label: 9:00 AM - 12:00 PM
                      - id: pickup
                        type: pickup
                        title: Pickup
                        subtitle: Pick up your order from an available location
                        feeHalala: 0
                        feeSar: 0
                        feeLabel: Free
                        requiresAddress: false
                        slots: []
                    areas:
                      - id: 65f000000000000000000040
                        zoneId: 65f000000000000000000040
                        name: Al Malqa
                        label: Al Malqa
                        feeHalala: 1500
                        feeSar: 15
                        feeLabel: 15 SAR
                        isActive: true
                        availability: available
                        availabilityLabel: Available
                    pickupLocations:
                      - id: pickup-1
                        name: Main Branch
                        label: Main Branch
                    defaults:
                      type: delivery
                      slotId: delivery_09:00_-_12:00
                      window: "09:00 - 12:00"
                      zoneId: ""
                      areaId: ""
                      pickupLocationId: pickup-1
  /subscriptions/delivery-options:
    get:
      tags: [Menu]
      summary: Get delivery and pickup options
      description: Public catalog endpoint used by checkout and subscription delivery settings screens.
      parameters:
        - $ref: '#/components/parameters/LangQuery'
      responses:
        '200':
          description: Delivery catalog returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
  /subscriptions:
    get:
      tags: [Subscriptions]
      summary: List current user subscriptions
      security:
        - AppBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LangQuery'
      responses:
        '200':
          description: Subscriptions returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
  /subscriptions/payment-methods:
    get:
      tags: [Premium & Payments]
      summary: Get app payment methods capability
      description: |
        Returns the current app-facing payment methods capability.
        The current implementation is read-only and reports that saved payment methods management is unsupported.
      security:
        - AppBearerAuth: []
      responses:
        '200':
          description: Payment methods capability returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                ok: true
                data:
                  supported: false
                  canManage: false
                  provider: moyasar
                  mode: invoice_only
                  reasonCode: PROVIDER_TOKENIZATION_UNAVAILABLE
                  methods: []
  /subscriptions/quote:
    post:
      tags: [Checkout]
      summary: Quote subscription checkout
      description: Calculates the subscription price before checkout creation.
      security:
        - AppBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LangQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequestBody'
            example:
              planId: "65f000000000000000000001"
              grams: 1200
              mealsPerDay: 3
              startDate: "2026-03-25"
              premiumItems:
                - premiumMealId: "65f000000000000000000020"
                  qty: 2
              addons:
                - "65f000000000000000000030"
              delivery:
                type: delivery
                zoneId: "65f000000000000000000040"
                address:
                  city: Riyadh
                  district: Al Malqa
                  street: Tahlia Street
                  building: "42"
                  apartment: "5"
                  notes: Leave at the door
                  lat: 24.7136
                  lng: 46.6753
                slot:
                  type: delivery
                  window: "09:00 - 12:00"
                  slotId: ""
      responses:
        '200':
          description: Quote calculated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: VALIDATION_ERROR or INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /subscriptions/checkout:
    post:
      tags: [Checkout]
      summary: Create checkout draft
      description: |
        Creates a checkout draft and payment intent.
        Send `idempotencyKey` through `Idempotency-Key`, `X-Idempotency-Key`, or `body.idempotencyKey`.
      security:
        - AppBearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/QuoteRequestBody'
                - type: object
                  properties:
                    idempotencyKey:
                      type: string
                    successUrl:
                      type: string
                    backUrl:
                      type: string
            example:
              idempotencyKey: "checkout-user-123-20260324-1"
              planId: "65f000000000000000000001"
              grams: 1200
              mealsPerDay: 3
              startDate: "2026-03-25"
              premiumItems:
                - premiumMealId: "65f000000000000000000020"
                  qty: 2
              addons:
                - "65f000000000000000000030"
              delivery:
                type: delivery
                zoneId: "65f000000000000000000040"
                address:
                  city: Riyadh
                  district: Al Malqa
                  street: Tahlia Street
                  building: "42"
                  apartment: "5"
                  notes: Leave at the door
                slot:
                  type: delivery
                  window: "09:00 - 12:00"
                  slotId: ""
              successUrl: "https://app.example.com/payments/success"
              backUrl: "https://app.example.com/payments/cancel"
      responses:
        '201':
          description: Checkout draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '200':
          description: Existing reusable draft returned for the same idempotency key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: VALIDATION_ERROR or INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: IDEMPOTENCY_CONFLICT or CHECKOUT_IN_PROGRESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /subscriptions/checkout-drafts/{draftId}:
    get:
      tags: [Checkout]
      summary: Get checkout draft status
      security:
        - AppBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DraftId'
        - $ref: '#/components/parameters/LangQuery'
      responses:
        '200':
          description: Draft status returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: INVALID_ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /subscriptions/checkout-drafts/{draftId}/verify-payment:
    post:
      tags: [Checkout]
      summary: Verify checkout draft payment
      description: Always call this after payment-provider redirects for subscription checkout.
      security:
        - AppBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DraftId'
      responses:
        '200':
          description: Payment verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: INVALID_ID or INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: CHECKOUT_IN_PROGRESS
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: CONFIG
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '502':
          description: PAYMENT_PROVIDER_ERROR
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /subscriptions/{id}/activate:
    post:
      tags: [Checkout]
      summary: Development-only activate route
      description: Present only when `NODE_ENV !== production`.
      security:
        - AppBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      responses:
        '200':
          description: Development response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
                required: [ok]
  /subscriptions/{id}/renewal-seed:
    get:
      tags: [Subscriptions]
      summary: Get renewal seed
      security:
        - AppBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
        - $ref: '#/components/parameters/LangQuery'
      responses:
        '200':
          description: Renewal seed returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: INVALID_ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: FORBIDDEN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: RENEWAL_UNAVAILABLE
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /subscriptions/{id}/renew:
    post:
      tags: [Subscriptions]
      summary: Renew subscription
      description: |
        Starts a renewal checkout flow from the current subscription.
        Use `idempotencyKey` for safe retries.
      security:
        - AppBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenewRequestBody'
            example:
              planId: "65f000000000000000000001"
              grams: 1200
              mealsPerDay: 3
              startDate: "2026-03-25"
              premiumItems:
                - premiumMealId: "65f000000000000000000020"
                  qty: 2
              addons:
                - "65f000000000000000000030"
              delivery:
                type: delivery
                zoneId: "65f000000000000000000040"
                address:
                  label: Home
                slot:
                  type: delivery
                  window: "09:00 - 12:00"
              idempotencyKey: "renewal-user123-sub456"
      responses:
        '201':
          description: Renewal checkout created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '200':
          description: Existing reusable checkout returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: INVALID_ID or INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: FORBIDDEN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: IDEMPOTENCY_CONFLICT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: RENEWAL_PREMATURE or RENEWAL_UNAVAILABLE
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /subscriptions/{id}:
    get:
      tags: [Subscriptions]
      summary: Get subscription by id
      security:
        - AppBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
        - $ref: '#/components/parameters/LangQuery'
      responses:
        '200':
          description: Subscription returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: INVALID_ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: FORBIDDEN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /subscriptions/{id}/cancel:
    post:
      tags: [Operations]
      summary: Cancel subscription
      description: |
        Client-facing cancel endpoint with idempotent semantics.
        Repeating the request for an already canceled subscription returns `200` with `idempotent: true`.
      security:
        - AppBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      responses:
        '200':
          description: Subscription canceled or already canceled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      idempotent:
                        type: boolean
                        description: Present when the subscription was already canceled and the request was treated idempotently.
        '400':
