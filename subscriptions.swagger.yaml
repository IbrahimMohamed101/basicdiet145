  /subscriptions/{id}/delivery:
    put:
      tags: [Day Planning]
      summary: Update subscription delivery defaults
      description: |
        Updates the default delivery or pickup details for a subscription.
        Legacy top-level fields `deliveryAddress`, `deliveryWindow`, and `deliveryZoneId` remain supported.
        The newer nested `delivery` object is also accepted.
        Cross-mode changes are currently not supported for active subscriptions.
      security:
        - AppBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  properties:
                    deliveryAddress:
                      $ref: '#/components/schemas/DeliveryAddress'
                    deliveryWindow:
                      type: string
                    deliveryZoneId:
                      type: string
                      nullable: true
                - type: object
                  required: [delivery]
                  properties:
                    delivery:
                      $ref: '#/components/schemas/DeliveryPayload'
            examples:
              deliveryModeLegacy:
                summary: Legacy delivery defaults update
                value:
                  deliveryAddress:
                    city: Dubai
                    district: Dubai Marina
                    street: Street 1
                    building: "12"
                    apartment: "4B"
                    notes: Leave at reception
                  deliveryWindow: "08:00 - 10:00"
                  deliveryZoneId: "65f000000000000000000040"
              pickupModeNested:
                summary: Pickup defaults update
                value:
                  delivery:
                    type: pickup
                    pickupLocationId: pickup-1
      responses:
        '200':
          description: Delivery defaults updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: INVALID or LOCKED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: FORBIDDEN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: SUB_INACTIVE, SUB_EXPIRED, or DELIVERY_MODE_CHANGE_UNSUPPORTED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
