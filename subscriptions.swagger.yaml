  /subscriptions/{id}/skip-range:
    post:
      tags: [Operations]
      summary: Apply limited compensated skip to a date range
      description: |
        Evaluates each requested date, applies skips to eligible days only, and stops naturally at the remaining plan allowance.
        The endpoint supports partial execution and returns a detailed summary.
      security:
        - AppBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [startDate]
              properties:
                startDate:
                  type: string
                  format: date
                days:
                  type: integer
                  description: Legacy range size. Keep sending this for backward compatibility if your client already uses it.
                endDate:
                  type: string
                  format: date
                  description: Inclusive end date for the skip range. The backend computes `days` from `startDate..endDate`.
              description: Either `days` or `endDate` is required. If both are provided, they must describe the same inclusive range.
            examples:
              usingDays:
                summary: Legacy request using days
                value:
                  startDate: "2026-04-05"
                  days: 3
              usingEndDate:
                summary: Preferred request using inclusive endDate
                value:
                  startDate: "2026-04-05"
                  endDate: "2026-04-07"
      responses:
        '200':
          description: Range processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              example:
                ok: true
                data:
                  requestedRange:
                    startDate: "2026-04-10"
                    endDate: "2026-04-14"
                    days: 5
                  requestedDays: 5
                  appliedDays: 3
                  remainingSkipDays: 0
                  compensatedDaysAdded: 3
                  message: Only 3 days applied due to plan limit
                  appliedDates:
                    - "2026-04-10"
                    - "2026-04-11"
                    - "2026-04-12"
                  alreadySkipped: []
                  rejected:
                    - date: "2026-04-13"
                      reason: FROZEN
                    - date: "2026-04-14"
                      reason: PLAN_LIMIT_REACHED
        '400':
          description: INVALID_DATE or INVALID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: FORBIDDEN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: NOT_FOUND
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: SUB_INACTIVE, SUB_EXPIRED, or SKIP_DISABLED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
