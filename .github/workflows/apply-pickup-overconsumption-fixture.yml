name: Apply pickup over-consumption fixture

on:
  push:
    branches:
      - agent/dynamic-direct-meal-catalog-safe
    paths:
      - .github/workflows/apply-pickup-overconsumption-fixture.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dynamic-direct-meal-catalog-safe
          fetch-depth: 0
      - name: Apply exact pickup fixture and self-delete
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          target = Path("tests/subscriptionBalancePolicy.test.js")
          text = target.read_text(encoding="utf-8")
          old_call = '''      await recordCashierConsumption({\n        phone: sub1Phone,\n        subscriptionId: sub1._id,\n        mealCount: 50,\n        actor: { actorId: sub1._id, actorType: "admin" },\n      });\n'''
          new_call = '''      await recordCashierConsumption({\n        phone: sub2Phone,\n        subscriptionId: sub2._id,\n        mealCount: 50,\n        actor: { actorId: sub2._id, actorType: "admin" },\n      });\n'''
          old_assert = '''    const sub1AfterFailedCashier = await Subscription.findById(sub1._id).lean();\n    assert.strictEqual(sub1AfterFailedCashier.remainingMeals, 19, "Failed over-consumption must not change remainingMeals");\n'''
          new_assert = '''    const sub2AfterFailedCashier = await Subscription.findById(sub2._id).lean();\n    assert.strictEqual(sub2AfterFailedCashier.remainingMeals, 28, "Failed over-consumption must not change remainingMeals");\n'''
          if text.count(old_call) != 1 or text.count(old_assert) != 1:
              raise SystemExit("Expected over-consumption fixture blocks exactly once")
          text = text.replace(old_call, new_call, 1).replace(old_assert, new_assert, 1)
          target.write_text(text, encoding="utf-8")
          Path(".github/workflows/apply-pickup-overconsumption-fixture.yml").unlink()
          PY
      - name: Commit fixture correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/subscriptionBalancePolicy.test.js .github/workflows/apply-pickup-overconsumption-fixture.yml
          git diff --cached --check
          git commit -m "Test over-consumption on pickup subscription"
          git push origin HEAD:agent/dynamic-direct-meal-catalog-safe
