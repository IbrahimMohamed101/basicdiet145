name: Patch checkout integration expectation

on:
  push:
    branches:
      - agent/final-delivery-readiness
    paths:
      - .github/workflows/patch-checkout-test.yml

permissions:
  contents: write

jobs:
  patch-checkout-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/final-delivery-readiness
          fetch-depth: 0

      - name: Patch explicit first-day pickup override
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/checkout.integration.test.js')
          text = path.read_text()
          old = """      delivery: {
        ...buildBaseSubscriptionPayload().delivery,
        address: {
"""
          new = """      delivery: {
        ...buildBaseSubscriptionPayload().delivery,
        firstDayFulfillmentOverride: {
          type: 'pickup',
          pickupLocationId: 'test_pickup_location',
        },
        address: {
"""
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'Expected exactly one checkout scenario to patch, found {count}')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/checkout.integration.test.js
          git commit -m "test(checkout): require explicit same-day pickup override"
          git push origin HEAD:agent/final-delivery-readiness
