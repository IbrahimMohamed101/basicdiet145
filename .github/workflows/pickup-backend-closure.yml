name: Pickup backend closure

on:
  pull_request:
    paths:
      - "src/app.js"
      - "src/models/SubscriptionPickupRequest.js"
      - "src/services/installPickup*.js"
      - "src/services/subscription/pickup*.js"
      - "src/services/subscription/subscriptionPickup*.js"
      - "src/utils/pickupErrorResponseLocalization.js"
      - "src/utils/subscriptionBilingualResponse.js"
      - "tests/pickup*.test.js"
      - "scripts/diagnose-pickup-entitlements.js"
      - "scripts/run-pickup-backend-closure-tests.sh"
      - "scripts/test-pickup-api-local.js"
      - "package.json"
  push:
    branches:
      - main
    paths:
      - "src/app.js"
      - "src/models/SubscriptionPickupRequest.js"
      - "src/services/installPickup*.js"
      - "src/services/subscription/pickup*.js"
      - "src/services/subscription/subscriptionPickup*.js"
      - "src/utils/pickupErrorResponseLocalization.js"
      - "src/utils/subscriptionBilingualResponse.js"
      - "tests/pickup*.test.js"
      - "scripts/diagnose-pickup-entitlements.js"
      - "scripts/run-pickup-backend-closure-tests.sh"
      - "scripts/test-pickup-api-local.js"
      - "package.json"

jobs:
  pickup-closure:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent
      - name: Startup installer contract
        run: node tests/pickupEntitlementInstaller.test.js
      - name: Active claim availability
        run: node tests/pickupActiveClaimAvailability.test.js
      - name: Linked allocation policy
        run: node tests/pickupEntitlementLinkPolicy.test.js
      - name: Availability entitlement parity
        run: node tests/pickupAvailabilityEntitlementParity.test.js
      - name: Entitlement lifecycle integration
        id: lifecycle
        shell: bash
        run: |
          set +e
          node tests/pickupEntitlementLifecycle.integration.test.js > pickup-lifecycle.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload lifecycle diagnostics
        if: steps.lifecycle.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: pickup-lifecycle-diagnostics
          path: pickup-lifecycle.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail on lifecycle integration error
        if: steps.lifecycle.outputs.status != '0'
        run: |
          cat pickup-lifecycle.log
          exit 1
      - name: Canonical ObjectId regression
        run: node tests/pickupCanonicalObjectId.test.js
      - name: Bilingual pickup contracts
        run: npm run test:subscription-bilingual
      - name: Localized pickup errors
        run: node tests/pickupErrorResponseLocalization.test.js
      - name: Backend validation
        id: backend_validation
        shell: bash
        run: |
          set +e
          npm run validate:backend > backend-validation.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload backend validation diagnostics
        if: steps.backend_validation.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: pickup-backend-validation-diagnostics
          path: backend-validation.log
          if-no-files-found: error
          retention-days: 3
      - name: Fail on backend validation error
        if: steps.backend_validation.outputs.status != '0'
        run: |
          tail -n 250 backend-validation.log
          exit 1
