name: Pickup backend closure

on:
  pull_request:
    paths:
      - "src/app.js"
      - "src/models/SubscriptionPickupRequest.js"
      - "src/services/installPickup*.js"
      - "src/services/subscription/pickup*.js"
      - "src/services/subscription/subscriptionPickup*.js"
      - "src/utils/pickupErrorResponseLocalization.js"
      - "src/utils/subscriptionBilingualResponse.js"
      - "tests/pickup*.test.js"
      - "tests/cases/pickup*.js"
      - "scripts/diagnose-pickup-entitlements.js"
      - "scripts/run-pickup-backend-closure-tests.sh"
      - "scripts/test-pickup-api-local.js"
      - "package.json"
  push:
    branches:
      - main
    paths:
      - "src/app.js"
      - "src/models/SubscriptionPickupRequest.js"
      - "src/services/installPickup*.js"
      - "src/services/subscription/pickup*.js"
      - "src/services/subscription/subscriptionPickup*.js"
      - "src/utils/pickupErrorResponseLocalization.js"
      - "src/utils/subscriptionBilingualResponse.js"
      - "tests/pickup*.test.js"
      - "tests/cases/pickup*.js"
      - "scripts/diagnose-pickup-entitlements.js"
      - "scripts/run-pickup-backend-closure-tests.sh"
      - "scripts/test-pickup-api-local.js"
      - "package.json"

jobs:
  pickup-closure:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent
      - name: Pickup backend closure suite
        run: bash scripts/run-pickup-backend-closure-tests.sh
      - name: App startup smoke test
        run: node -e "const { createApp } = require('./src/app'); const app = createApp(); if (!app) process.exit(1); console.log('app startup smoke passed')"
