permissions:
  contents: read
  statuses: write

jobs:
  pickup-closure:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=pending \
            -f context=pickup-backend-closure \
            -f description="Pickup backend closure is running" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent
      - name: Pickup backend closure suite
        shell: bash
        run: |
          set -o pipefail
          bash scripts/run-pickup-backend-closure-tests.sh 2>&1 | tee pickup-closure.log
      - name: Upload closure log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pickup-closure-log
          path: pickup-closure.log
          if-no-files-found: ignore
          retention-days: 7
      - name: App startup smoke test
        run: node -e "const { createApp } = require('./src/app'); const app = createApp(); if (!app) process.exit(1); console.log('app startup smoke passed')"
      - name: Publish final status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          state=success
          description="Pickup backend closure passed"
          if [ "${{ job.status }}" != "success" ]; then
            state=failure
            description="Pickup backend closure failed"
          fi
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state="$state" \
            -f context=pickup-backend-closure \
            -f description="$description" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
