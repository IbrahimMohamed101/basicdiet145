name: Fix pickup canonical operations contract

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-pickup-canonical-ops.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Patch canonical pickup flow
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"missing patch target in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1))

          # 1) Canonicalize Flutter pickup availability before selection/snapshot creation.
          path = "src/services/subscription/subscriptionPickupSlotService.js"
          replace_once(
              path,
              'const { buildDayCommercialState, evaluateAddonChoicePayment } = require("./subscriptionDayCommercialStateService");\n',
              'const { buildDayCommercialState, evaluateAddonChoicePayment } = require("./subscriptionDayCommercialStateService");\nconst { canonicalItemType, normalizeAvailability } = require("./pickupCanonicalPresentationService");\n'
          )
          replace_once(
              path,
              '''function resolveCatalogProduct(slot = {}, catalogMaps = {}) {
            return getFromMap(catalogMaps.productById, slot.productId)
              || getFromMap(catalogMaps.productByKey, slot.productKey)
              || null;
          }''',
              '''function resolveCatalogProduct(slot = {}, catalogMaps = {}) {
            return getFromMap(catalogMaps.productById, slot.productId || slot.sandwichId)
              || getFromMap(catalogMaps.productByKey, slot.productKey || slot.sandwichKey)
              || getFromMap(catalogMaps.sandwichById, slot.sandwichId || slot.productId)
              || getFromMap(catalogMaps.sandwichByKey, slot.sandwichKey || slot.productKey)
              || null;
          }'''
          )
          replace_once(
              path,
              '''    id: stringifyId(slot.productId || product.id || product._id || kitchen.productId || (productDoc && productDoc._id)),
              key: slot.productKey || product.key || kitchen.productKey || (productDoc && productDoc.key) || null,
              name,
              description,''',
              '''    id: stringifyId(slot.productId || slot.sandwichId || product.id || product._id || kitchen.productId || (productDoc && productDoc._id)),
              key: slot.productKey || slot.sandwichKey || product.key || kitchen.productKey || (productDoc && productDoc.key) || null,
              itemType: (productDoc && productDoc.itemType) || product.itemType || null,
              cardVariant: (productDoc && productDoc.ui && productDoc.ui.cardVariant) || product.cardVariant || null,
              name,
              description,'''
          )
          replace_once(
              path,
              '''function itemTypeForSelectionType(selectionType, isPremium = false) {
            const type = String(selectionType || "").trim();
            if (type === "premium_large_salad") return "large_salad";
            if (type === "sandwich") return "sandwich";
            if (type === "premium_meal" || isPremium) return "premium_meal";
            if (type === "standard_meal" || type === "basic_meal") return "meal";
            if (type === "protein" || type === "protein_extra") return "protein_extra";
            if (type === "addon") return "addon";
            return "unknown";
          }''',
              '''function itemTypeForSelectionType(selectionType, isPremium = false, source = {}) {
            return canonicalItemType({
              ...source,
              selectionType,
              isPremium,
            });
          }'''
          )
          replace_once(
              path,
              'const itemType = itemTypeForSelectionType(slot.selectionType, slot.isPremium);',
              'const itemType = itemTypeForSelectionType(slot.selectionType, slot.isPremium, slot);'
          )
          replace_once(
              path,
              '''  return {
                date: resolvedDay ? resolvedDay.date : null,
                subscriptionDayId: resolvedDay && resolvedDay._id ? String(resolvedDay._id) : null,
                paymentReason: addonPaymentReason || resolveCanonicalPaymentReason(resolvedDay, subscription),
                paymentRequirement: commercialState.paymentRequirement,
                commercialState: commercialState.commercialState,
                addonCategoryAllowances,
                addonSubscriptionAllowances,
                slots,
                dayAddons,
                availableAddonChoices,
                addonSummary: {
                  ...buildAddonSummary(dayAddons),
                  availableChoiceCount: availableAddonChoices.length,
                  categoryAllowances: addonCategoryAllowances,
                  subscriptionAllowances: addonSubscriptionAllowances,
                },
                pickupItems,
                sections,
                availableSlotIds: slots.filter((slot) => slot.available).map((slot) => slot.slotId),
                unavailableSlotIds: slots.filter((slot) => !slot.available).map((slot) => slot.slotId),
              };''',
              '''  return normalizeAvailability({
                date: resolvedDay ? resolvedDay.date : null,
                subscriptionDayId: resolvedDay && resolvedDay._id ? String(resolvedDay._id) : null,
                paymentReason: addonPaymentReason || resolveCanonicalPaymentReason(resolvedDay, subscription),
                paymentRequirement: commercialState.paymentRequirement,
                commercialState: commercialState.commercialState,
                addonCategoryAllowances,
                addonSubscriptionAllowances,
                slots,
                dayAddons,
                availableAddonChoices,
                addonSummary: {
                  ...buildAddonSummary(dayAddons),
                  availableChoiceCount: availableAddonChoices.length,
                  categoryAllowances: addonCategoryAllowances,
                  subscriptionAllowances: addonSubscriptionAllowances,
                },
                pickupItems,
                sections,
                availableSlotIds: slots.filter((slot) => slot.available).map((slot) => slot.slotId),
                unavailableSlotIds: slots.filter((slot) => !slot.available).map((slot) => slot.slotId),
              }, resolvedDay);'''
          )
          replace_once(
              path,
              '''    selectedMealSlotIds: normalizedIds.filter((id) => {
                    const item = byId.get(id);
                    return item && item.slotId && ["meal", "premium_meal", "large_salad", "sandwich"].includes(item.itemType);
                  }),
                  mealCreditCount: normalizedIds.filter((id) => {
                    const item = byId.get(id);
                    return item && ["meal", "premium_meal"].includes(item.itemType);
                  }).length,''',
              '''    selectedMealSlotIds: normalizedIds.filter((id) => {
                    const item = byId.get(id);
                    return item && item.slotId && ["meal", "premium_meal", "large_salad", "sandwich"].includes(canonicalItemType(item));
                  }),
                  mealCreditCount: normalizedIds.filter((id) => {
                    const item = byId.get(id);
                    return item && ["meal", "premium_meal", "large_salad", "sandwich"].includes(canonicalItemType(item));
                  }).length,'''
          )

          # 2) Resolve products persisted through sandwichId/sandwichKey in the client catalog map.
          path = "src/services/subscription/subscriptionPickupRequestClientService.js"
          replace_once(
              path,
              '''    addSetValue(productIds, slot && slot.productId);
                  addSetValue(productKeys, slot && slot.productKey);''',
              '''    addSetValue(productIds, slot && (slot.productId || slot.sandwichId));
                  addSetValue(productKeys, slot && (slot.productKey || slot.sandwichKey));'''
          )
          replace_once(
              path,
              '''    addSetValue(proteinIds, meal && meal.proteinId);
                  addSetValue(proteinKeys, meal && meal.premiumKey);
                  addSetValue(carbIds, meal && meal.carbId);''',
              '''    addSetValue(proteinIds, meal && meal.proteinId);
                  addSetValue(proteinKeys, meal && meal.premiumKey);
                  addSetValue(carbIds, meal && meal.carbId);
                  addSetValue(productIds, meal && (meal.productId || meal.sandwichId));
                  addSetValue(productKeys, meal && (meal.productKey || meal.sandwichKey));'''
          )

          # 3) Hydrate direct products and selected protein/carb options in canonical kitchen payloads.
          path = "src/services/dashboard/opsPayloadService.js"
          replace_once(
              path,
              '''      slot.productId
                    || product.id''',
              '''      slot.productId
                    || slot.sandwichId
                    || product.id'''
          )
          replace_once(
              path,
              '''  const initialProductKey = slot.productKey
                || product.key''',
              '''  const initialProductKey = slot.productKey
                || slot.sandwichKey
                || product.key'''
          )
          replace_once(
              path,
              '''  const resolvedProductDoc = productDoc || (slot.selectionType === "sandwich" ? sandwichDoc : null);''',
              '''  const resolvedProductDoc = productDoc || sandwichDoc || null;'''
          )
          replace_once(
              path,
              '''  const selectedProteinId = premiumSalad && selectedProteinOption
                ? selectedProteinOption.optionId
                : null;
              const selectedProteinKey = premiumSalad && selectedProteinOption
                ? selectedProteinOption.optionKey
                : null;''',
              '''  const selectedProteinId = selectedProteinOption
                ? selectedProteinOption.optionId
                : null;
              const selectedProteinKey = selectedProteinOption
                ? selectedProteinOption.optionKey
                : null;'''
          )
          replace_once(
              path,
              '''  const carbSelections = Array.isArray(slot.carbSelections)
                ? slot.carbSelections
                : (Array.isArray(slot.carbs)
                  ? slot.carbs
                  : (slot.carbId ? [{ carbId: slot.carbId, grams: null }] : []));''',
              '''  const legacyCarbSelections = Array.isArray(slot.carbSelections)
                ? slot.carbSelections
                : (Array.isArray(slot.carbs)
                  ? slot.carbs
                  : (slot.carbId ? [{ carbId: slot.carbId, grams: null }] : []));
              const selectedCarbOptions = selectedOptions.filter((option) => (
                canonicalSelectedOptionGroupKey(option) === "carbs"
                  || canonicalSelectedOptionGroupKey(option) === "carb"
              ));
              const carbSelections = legacyCarbSelections.length > 0
                ? legacyCarbSelections
                : selectedCarbOptions.map((option) => ({
                  carbId: option.optionId,
                  key: option.optionKey,
                  name: option.nameI18n || option.name,
                  grams: option.grams,
                }));'''
          )
          replace_once(
              path,
              '''      case "sandwich": return { ar: "ساندويتش", en: "Sandwich" };
                    case "chef_choice": return { ar: "اختيار الشيف", en: "Chef Choice" };''',
              '''      case "sandwich": return { ar: "ساندويتش", en: "Sandwich" };
                    case "full_meal_product": return { ar: "منتج وجبة كامل", en: "Full Meal Product" };
                    case "chef_choice": return { ar: "اختيار الشيف", en: "Chef Choice" };'''
          )
          replace_once(
              path,
              '''    productName: localizedName(productNameSource, lang),
                productNameI18n: productNameSource ? localizedNameObject(productNameSource, productKey || sandwichId || "") : undefined,''',
              '''    productName: localizedName(productNameSource, lang),
                productNameI18n: productNameSource ? localizedNameObject(productNameSource, productKey || sandwichId || "") : undefined,
                productItemType: resolvedProductDoc && resolvedProductDoc.itemType ? resolvedProductDoc.itemType : null,
                productCardVariant: resolvedProductDoc && resolvedProductDoc.ui ? resolvedProductDoc.ui.cardVariant || null : null,'''
          )

          # 4) Load the product card variant required to distinguish sandwiches from generic full-meal products.
          path = "src/services/dashboard/kitchenCatalogService.js"
          text = Path(path).read_text()
          text = text.replace('.select("_id key name imageUrl priceHalala itemType")', '.select("_id key name imageUrl priceHalala itemType ui.cardVariant")')
          Path(path).write_text(text)

          # 5) Canonicalize every kitchen card after the legacy projection is built.
          path = "src/services/dashboard/kitchenProjectionService.js"
          replace_once(
              path,
              '"use strict";\n',
              '"use strict";\n\nconst { normalizeKitchenCard } = require("../subscription/pickupCanonicalPresentationService");\n'
          )
          replace_once(
              path,
              '''function buildKitchenProjection(kitchenDetails = {}) {
            return {
              kitchenProjectionVersion: "v1",
              kitchenCards: (Array.isArray(kitchenDetails.mealSlots) ? kitchenDetails.mealSlots : [])
                .map((slot, index) => buildKitchenCard(slot, index)),
              kitchenAddonGroups: buildKitchenAddonGroups(kitchenDetails.addons),
            };
          }''',
              '''function buildKitchenProjection(kitchenDetails = {}) {
            const slots = Array.isArray(kitchenDetails.mealSlots) ? kitchenDetails.mealSlots : [];
            return {
              kitchenProjectionVersion: "v1",
              kitchenCards: slots
                .map((slot, index) => buildKitchenCard(slot, index))
                .map((card, index) => normalizeKitchenCard(card, slots[index] || {})),
              kitchenAddonGroups: buildKitchenAddonGroups(kitchenDetails.addons),
            };
          }'''
          )

          # 6) Build pickup-request operations data from the canonical snapshot or original SubscriptionDay.
          path = "src/services/dashboard/dashboardDtoService.js"
          replace_once(
              path,
              'const { DEFAULT_PICKUP_LOCATION } = require("../../constants/defaultPickupLocation");\n',
              'const { DEFAULT_PICKUP_LOCATION } = require("../../constants/defaultPickupLocation");\nconst { buildCanonicalKitchenDetails } = require("../subscription/pickupCanonicalPresentationService");\n'
          )
          replace_once(
              path,
              'function mapSubscriptionPickupRequestToDTO(pickupRequest, subscription, user, role, lang, catalogMaps = {}) {',
              'function mapSubscriptionPickupRequestToDTO(pickupRequest, subscription, user, role, lang, catalogMaps = {}, sourceDay = null) {'
          )
          marker = '  const dto = {\n    source: "subscription_pickup_request",'
          replacement = '''  const pickupKitchenDetails = buildCanonicalKitchenDetails({
            pickupRequest,
            sourceDay,
            subscription: subscription || {},
            lang,
            catalogMaps,
            buildKitchenDetailsPayload,
          });

          const dto = {
            source: "subscription_pickup_request",'''
          replace_once(path, marker, replacement)
          p = Path(path)
          text = p.read_text()
          start = text.index('    kitchenDetails: pickupRequest.snapshot\n')
          end_marker = '      : buildKitchenDetailsPayload({}, subscription || {}, lang, catalogMaps),\n'
          end = text.index(end_marker, start) + len(end_marker)
          text = text[:start] + '    kitchenDetails: pickupKitchenDetails,\n' + text[end:]
          p.write_text(text)

          # 7) Pass the source SubscriptionDay into pickup-request mapping for old and new requests.
          path = "src/controllers/dashboard/opsBoardController.js"
          replace_once(
              path,
              'function mapPickupRequest(pickupRequest, subscription, user, lang, role, catalogMaps = {}) {',
              'function mapPickupRequest(pickupRequest, subscription, user, lang, role, catalogMaps = {}, sourceDay = null) {'
          )
          replace_once(
              path,
              '''    lang,
                    catalogMaps
                  );''',
              '''    lang,
                    catalogMaps,
                    sourceDay
                  );'''
          )
          replace_once(
              path,
              '''  const catalogMaps = await buildKitchenCatalogMaps([...filteredByMethod, ...filteredOrderItems, ...pickupRequests]);
              items = filteredByMethod.map((day) => mapDay(''',
              '''  const catalogMaps = await buildKitchenCatalogMaps([...filteredByMethod, ...filteredOrderItems, ...pickupRequests]);
              const sourceDayById = new Map(filteredByMethod.map((day) => [String(day._id), day]));
              const sourceDayBySubscriptionDate = new Map(filteredByMethod.map((day) => [
                `${String(day.subscriptionId && day.subscriptionId._id || day.subscriptionId)}:${day.date}`,
                day,
              ]));
              items = filteredByMethod.map((day) => mapDay('''
          )
          replace_once(
              path,
              '''        role,
                      catalogMaps
                    );''',
              '''        role,
                      catalogMaps,
                      sourceDayById.get(String(pickupRequest.subscriptionDayId || ""))
                        || sourceDayBySubscriptionDate.get(`${String(subscription._id || subscription)}:${pickupRequest.date}`)
                        || null
                    );'''
          )

          # 8) Keep the alternate ops read service aligned with the same source-day fallback.
          path = "src/services/dashboard/opsReadService.js"
          replace_once(
              path,
              '''  const pickupRequestDTOs = pickupRequests.map((pickupRequest) => {
                const sub = subMap.get(String(pickupRequest.subscriptionId));''',
              '''  const sourceDayById = new Map(days.map((day) => [String(day._id), day]));
              const sourceDayBySubscriptionDate = new Map(days.map((day) => [`${String(day.subscriptionId)}:${day.date}`, day]));
              const pickupRequestDTOs = pickupRequests.map((pickupRequest) => {
                const sub = subMap.get(String(pickupRequest.subscriptionId));'''
          )
          replace_once(
              path,
              '''      lang,
                    catalogMaps
                  );''',
              '''      lang,
                    catalogMaps,
                    sourceDayById.get(String(pickupRequest.subscriptionDayId || ""))
                      || sourceDayBySubscriptionDate.get(`${String(pickupRequest.subscriptionId)}:${pickupRequest.date}`)
                      || null
                  );'''
          )
          replace_once(
              path,
              '''    const [sub, rawUser] = await Promise.all([
                    Subscription.findById(pickupRequest.subscriptionId).populate("planId", "_id key name daysCount durationDays").lean(),
                    User.findById(pickupRequest.userId).lean(),
                  ]);''',
              '''    const [sub, rawUser, sourceDay] = await Promise.all([
                    Subscription.findById(pickupRequest.subscriptionId).populate("planId", "_id key name daysCount durationDays").lean(),
                    User.findById(pickupRequest.userId).lean(),
                    pickupRequest.subscriptionDayId
                      ? SubscriptionDay.findById(pickupRequest.subscriptionDayId).lean()
                      : SubscriptionDay.findOne({ subscriptionId: pickupRequest.subscriptionId, date: pickupRequest.date }).lean(),
                  ]);'''
          )
          replace_once(
              path,
              '''    const catalogMaps = await buildKitchenCatalogMaps([pickupRequest]);
                  const dto = dashboardDtoService.mapSubscriptionPickupRequestToDTO(pickupRequest, sub || {}, user, role, lang, catalogMaps);''',
              '''    const catalogMaps = await buildKitchenCatalogMaps([pickupRequest, sourceDay].filter(Boolean));
                  const dto = dashboardDtoService.mapSubscriptionPickupRequestToDTO(pickupRequest, sub || {}, user, role, lang, catalogMaps, sourceDay);'''
          )

          # 9) Let canonical card normalization inspect product classification metadata.
          path = "src/services/subscription/pickupCanonicalPresentationService.js"
          replace_once(
              path,
              '''      name: card.components && card.components.product && card.components.product.nameI18n,
                },''',
              '''      name: card.components && card.components.product && card.components.product.nameI18n,
                  itemType: slot.productItemType || null,
                  cardVariant: slot.productCardVariant || null,
                },'''
          )

          test = r'''"use strict";

          const assert = require("assert");
          const dashboardDtoService = require("../src/services/dashboard/dashboardDtoService");
          const { normalizeAvailability } = require("../src/services/subscription/pickupCanonicalPresentationService");

          function mapBy(rows) {
            return new Map(rows.map((row) => [String(row._id), row]));
          }

          function run() {
            const ids = {
              sandwich: "507f1f77bcf86cd799439011",
              protein: "507f1f77bcf86cd799439012",
              carb: "507f1f77bcf86cd799439013",
              addon: "507f1f77bcf86cd799439014",
            };
            const sourceDay = {
              _id: "507f1f77bcf86cd799439020",
              subscriptionId: "507f1f77bcf86cd799439021",
              date: "2026-07-21",
              status: "open",
              mealSlots: [
                {
                  slotIndex: 1,
                  slotKey: "slot_1",
                  status: "complete",
                  selectionType: "full_meal_product",
                  sandwichId: ids.sandwich,
                },
                {
                  slotIndex: 2,
                  slotKey: "slot_2",
                  status: "complete",
                  selectionType: "standard_meal",
                  selectedOptions: [
                    { optionId: ids.protein, optionKey: "eggs", groupKey: "protein", name: { ar: "بيض", en: "Eggs" } },
                    { optionId: ids.carb, optionKey: "rice", groupKey: "carbs", name: { ar: "أرز", en: "Rice" } },
                  ],
                },
              ],
              addonSelections: [],
            };
            const availability = normalizeAvailability({
              slots: [
                {
                  slotId: "slot_1", slotKey: "slot_1", slotIndex: 1, selectionType: "full_meal_product", available: true,
                  product: { id: ids.sandwich, key: "fajita_sourdough", itemType: "sourdough", name: { ar: "فاهيتا", en: "Fajita" } },
                  meal: { title: { ar: "وجبة عادية", en: "Standard meal" } }, options: [], display: {},
                },
                {
                  slotId: "slot_2", slotKey: "slot_2", slotIndex: 2, selectionType: "standard_meal", available: true,
                  product: { name: { ar: "وجبة عادية", en: "Standard meal" } },
                  meal: { title: { ar: "وجبة عادية", en: "Standard meal" } },
                  options: [
                    { id: ids.protein, key: "eggs", groupKey: "protein", name: { ar: "بيض", en: "Eggs" } },
                    { id: ids.carb, key: "rice", groupKey: "carbs", name: { ar: "أرز", en: "Rice" } },
                  ], display: {},
                },
              ],
              pickupItems: [], dayAddons: [], availableAddonChoices: [], sections: [],
            }, sourceDay);
            assert.strictEqual(availability.slots[0].display.titleAr, "ساندوتش فاهيتا");
            assert.strictEqual(availability.slots[0].display.titleEn, "Fajita Sandwich");
            assert.strictEqual(availability.slots[1].display.titleAr, "بيض + أرز");
            assert.strictEqual(availability.slots[1].display.titleEn, "Eggs + Rice");

            const selectedItems = [
              {
                itemId: "slot_1", slotId: "slot_1", slotKey: "slot_1", slotIndex: 1,
                itemType: "sandwich", selectionType: "full_meal_product", quantity: 1,
                product: { id: ids.sandwich, key: "fajita_sourdough", itemType: "sourdough", name: { ar: "فاهيتا", en: "Fajita" } },
                components: [], display: { titleAr: "ساندوتش فاهيتا", titleEn: "Fajita Sandwich" },
              },
              {
                itemId: "slot_2", slotId: "slot_2", slotKey: "slot_2", slotIndex: 2,
                itemType: "meal", selectionType: "standard_meal", quantity: 1,
                product: { name: { ar: "وجبة عادية", en: "Standard meal" } },
                components: [
                  { id: ids.protein, key: "eggs", type: "protein", groupKey: "protein", name: { ar: "بيض", en: "Eggs" } },
                  { id: ids.carb, key: "rice", type: "carb", groupKey: "carbs", name: { ar: "أرز", en: "Rice" } },
                ], display: { titleAr: "بيض + أرز", titleEn: "Eggs + Rice" },
              },
              {
                itemId: "addon_1", itemType: "addon", selectionType: "addon", quantity: 1,
                product: { id: ids.addon, key: "chocolate_ice_cream", name: { ar: "آيس كريم شوكولاتة", en: "Chocolate Ice Cream" } },
                components: [], display: { titleAr: "آيس كريم شوكولاتة", titleEn: "Chocolate Ice Cream" },
              },
            ];
            const pickupRequest = {
              _id: "507f1f77bcf86cd799439030",
              subscriptionId: sourceDay.subscriptionId,
              subscriptionDayId: sourceDay._id,
              userId: "507f1f77bcf86cd799439031",
              date: sourceDay.date,
              mealCount: 2,
              status: "in_preparation",
              creditsReserved: true,
              selectedMealSlotIds: ["slot_1", "slot_2"],
              selectedPickupItemIds: ["slot_1", "slot_2", "addon_1"],
              selectedPickupItems: selectedItems,
              snapshot: { mealSlots: [], selectedPickupItems: selectedItems, addons: [] },
              createdAt: new Date(), updatedAt: new Date(),
            };
            const catalogMaps = {
              productById: mapBy([{ _id: ids.sandwich, key: "fajita_sourdough", itemType: "sourdough", ui: { cardVariant: "standard" }, name: { ar: "فاهيتا", en: "Fajita" } }]),
              productByKey: new Map(), sandwichById: new Map(), sandwichByKey: new Map(),
              proteinById: mapBy([{ _id: ids.protein, key: "eggs", name: { ar: "بيض", en: "Eggs" } }]),
              proteinByKey: new Map(), carbById: mapBy([{ _id: ids.carb, key: "rice", name: { ar: "أرز", en: "Rice" } }]),
              carbByKey: new Map(), optionById: new Map(), optionByKey: new Map(), saladItemById: new Map(), saladItemByKey: new Map(), addonById: new Map(), addonByKey: new Map(), addonPlanById: new Map(),
            };
            const dto = dashboardDtoService.mapSubscriptionPickupRequestToDTO(
              pickupRequest,
              { _id: sourceDay.subscriptionId, remainingMeals: 30, totalMeals: 52 },
              { _id: pickupRequest.userId, name: "Test", phone: "+966500000000" },
              "admin",
              "ar",
              catalogMaps,
              sourceDay
            );
            assert.strictEqual(dto.kitchenCards.length, 2);
            assert.strictEqual(dto.kitchenCards[0].type, "sandwich");
            assert.strictEqual(dto.kitchenCards[0].title, "ساندوتش فاهيتا");
            assert.strictEqual(dto.kitchenCards[0].titleI18n.en, "Fajita Sandwich");
            assert.notStrictEqual(dto.kitchenCards[0].components.product.id, "slot_1");
