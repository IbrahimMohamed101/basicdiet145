name: Verify canonical pickup contract

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: |
          node -c src/services/subscription/pickupCanonicalPresentationService.js
          node -c src/services/installPickupCanonicalContract.js
          node -c src/services/installSubscriptionDayFullMealCompatibility.js
          NODE_ENV=test node tests/subscriptionPickupDisplayNames.test.js
          NODE_ENV=test node tests/subscriptionBilingualResponse.test.js
          NODE_ENV=test node tests/opsPayloadService.test.js
