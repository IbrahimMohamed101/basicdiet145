name: Subscription Entitlement Focused Test

on:
  push:
    branches: [main]
    paths:
      - "src/models/Subscription.js"
      - "src/models/SubscriptionDay.js"
      - "src/models/SubscriptionPickupRequest.js"
      - "src/services/subscription/**"
      - "src/services/fulfillmentService.js"
      - "src/services/dashboard/opsTransitionService.js"
      - "tests/subscriptionMealEntitlementLifecycle.test.js"
      - "tests/subscriptionEntitlementReservationRecovery.test.js"
      - "tests/subscriptionPaymentInitiationReservationCleanup.test.js"
      - "tests/subscriptionPremiumPickupSingleDebit.test.js"
      - ".github/workflows/subscription-entitlement-focused.yml"
  pull_request:
    paths:
      - "src/models/Subscription.js"
      - "src/models/SubscriptionDay.js"
      - "src/models/SubscriptionPickupRequest.js"
      - "src/services/subscription/**"
      - "src/services/fulfillmentService.js"
      - "src/services/dashboard/opsTransitionService.js"
      - "tests/subscriptionMealEntitlementLifecycle.test.js"
      - "tests/subscriptionEntitlementReservationRecovery.test.js"
      - "tests/subscriptionPaymentInitiationReservationCleanup.test.js"
      - "tests/subscriptionPremiumPickupSingleDebit.test.js"
      - ".github/workflows/subscription-entitlement-focused.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-entitlement-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run focused lifecycle tests
        env:
          NODE_ENV: test
        run: |
          node tests/subscriptionMealEntitlementLifecycle.test.js
          node tests/subscriptionEntitlementReservationRecovery.test.js
          node tests/subscriptionPaymentInitiationReservationCleanup.test.js
          node tests/subscriptionPremiumPickupSingleDebit.test.js
