name: Subscription Canceled Visibility Test

on:
  push:
    branches: [main]
    paths:
      - "src/app.js"
      - "src/middleware/clientSubscriptionVisibility.js"
      - "tests/subscriptionCanceledResponseVisibility.test.js"
      - ".github/workflows/subscription-canceled-visibility.yml"
  pull_request:
    paths:
      - "src/app.js"
      - "src/middleware/clientSubscriptionVisibility.js"
      - "tests/subscriptionCanceledResponseVisibility.test.js"
      - ".github/workflows/subscription-canceled-visibility.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  subscription-canceled-visibility:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check app syntax
        run: node --check src/app.js
      - name: Run canceled subscription visibility regression
        run: node tests/subscriptionCanceledResponseVisibility.test.js
