name: Mobile home product key compatibility

on:
  pull_request:
    paths:
      - "src/middleware/mobileHomeProductKeyCompatibility.js"
      - "src/routes/orders.js"
      - "tests/mobileHomeProductKeyCompatibility.test.js"
      - ".github/workflows/mobile-home-product-key-compatibility.yml"
  push:
    branches: [main]
    paths:
      - "src/middleware/mobileHomeProductKeyCompatibility.js"
      - "src/routes/orders.js"
      - "tests/mobileHomeProductKeyCompatibility.test.js"
      - ".github/workflows/mobile-home-product-key-compatibility.yml"

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Validate syntax
        run: |
          node --check src/middleware/mobileHomeProductKeyCompatibility.js
          node --check src/routes/orders.js
          node --check tests/mobileHomeProductKeyCompatibility.test.js

      - name: Verify mobile Home product aliases
        run: node tests/mobileHomeProductKeyCompatibility.test.js

      - name: Verify existing one-time menu contract
        run: npm run test:one-time-menu
