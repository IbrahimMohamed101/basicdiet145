name: Temporary diagnose backend contracts

on:
  pull_request:
    branches:
      - main

jobs:
  diagnose:
    if: github.head_ref == 'agent/fix-backend-contract-tests'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-backend-contract-tests
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Print concise integration failures
        shell: bash
        run: |
          set +e
          npm run test:integration > /tmp/integration.log 2>&1
          code=$?
          echo "--- concise integration failures ---"
          grep -E "❌|RESULTS:|AssertionError|Error:|failed" /tmp/integration.log | tail -120 || true
          echo "--- end concise integration failures ---"
          exit $code
