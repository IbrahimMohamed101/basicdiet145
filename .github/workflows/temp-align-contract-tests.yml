name: Temporary backend contract alignment

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  align:
    if: github.head_ref == 'agent/fix-backend-contract-tests'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-backend-contract-tests
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: node scripts/align-current-contract-tests-v2.js
      - run: npm run test:integration
      - run: npm run validate:backend
      - run: npm run test:meal-builder-dashboard-mobile-parity
      - run: npm run test:mobile-contracts

      - name: Commit corrected backend tests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/mealPlanner.integration.test.js tests/oneTimeMenuCatalog.test.js tests/mealBuilderDashboardMobileParity.test.js
          git commit -m "fix: align backend tests with canonical contracts"
          git push origin HEAD:agent/fix-backend-contract-tests
