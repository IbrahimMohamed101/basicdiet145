name: Fix generic Meal Builder products

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-generic-meal-builder-products.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch canonical standalone-product classification
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"Expected source block not found in {path}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          classifier = "src/services/catalog/mealProductClassificationService.js"
          replace_once(
              classifier,
              '''const NON_MEAL_ITEM_TYPES = new Set([\n  "addon",\n  "subscription_addon",\n]);''',
              '''const NON_MEAL_ITEM_TYPES = new Set([\n  "addon",\n  "subscription_addon",\n]);\nconst BUILDER_ITEM_TYPES = new Set([\n  "basic_meal",\n  "custom_meal",\n  "meal_builder",\n]);'''
          )
          replace_once(
              classifier,
              '''  const itemType = productItemType(product);\n  const cardVariant = productCardVariant(product);\n  const sandwich =\n    itemType === "cold_sandwich" || SANDWICH_CARD_VARIANTS.has(cardVariant);\n  const fullMeal =\n    !sandwich &&\n    (itemType === "full_meal_product" ||\n      FULL_MEAL_CARD_VARIANTS.has(cardVariant));\n  const nonMeal =\n    NON_MEAL_ITEM_TYPES.has(itemType) || NON_MEAL_CARD_VARIANTS.has(cardVariant);\n  const directCompatible = !nonMeal && (sandwich || fullMeal);\n  const composedCompatible =\n    !nonMeal &&\n    !directCompatible &&\n    (Boolean(hasBuilderRelations) ||\n      product.isCustomizable === true ||\n      BUILDER_CARD_VARIANTS.has(cardVariant));''',
              '''  const itemType = productItemType(product);\n  const cardVariant = productCardVariant(product);\n  const explicitSandwich =\n    itemType === "cold_sandwich" ||\n    itemType === "sourdough" ||\n    itemType.includes("sandwich") ||\n    itemType.includes("sourdough") ||\n    SANDWICH_CARD_VARIANTS.has(cardVariant);\n  const explicitFullMeal =\n    itemType === "full_meal_product" ||\n    FULL_MEAL_CARD_VARIANTS.has(cardVariant);\n  const nonMeal =\n    NON_MEAL_ITEM_TYPES.has(itemType) || NON_MEAL_CARD_VARIANTS.has(cardVariant);\n  const builderPreferred =\n    !nonMeal &&\n    !explicitSandwich &&\n    !explicitFullMeal &&\n    (BUILDER_ITEM_TYPES.has(itemType) ||\n      Boolean(hasBuilderRelations) ||\n      product.isCustomizable === true ||\n      BUILDER_CARD_VARIANTS.has(cardVariant));\n  const genericStandalone =\n    !nonMeal &&\n    !explicitSandwich &&\n    !explicitFullMeal &&\n    !builderPreferred;\n  const sandwich = explicitSandwich;\n  const fullMeal = !sandwich && (explicitFullMeal || genericStandalone);\n  const directCompatible = !nonMeal && (sandwich || fullMeal);\n  const composedCompatible = builderPreferred;'''
          )
          replace_once(
              classifier,
              '''  BUILDER_CARD_VARIANTS,\n  DIRECT_PRODUCT_CARD_VARIANTS,''',
              '''  BUILDER_CARD_VARIANTS,\n  BUILDER_ITEM_TYPES,\n  DIRECT_PRODUCT_CARD_VARIANTS,'''
          )

          catalog = "src/services/subscription/dashboardMealBuilderCatalogService.js"
          replace_once(
              catalog,
              '''const {\n  isCatalogItemUsable,\n  loadCatalogItemsByIdForDocs,\n} = require("../catalog/catalogAvailabilityService");''',
              '''const {\n  isCatalogItemUsable,\n  loadCatalogItemsByIdForDocs,\n} = require("../catalog/catalogAvailabilityService");\nconst {\n  buildMealPlannerClassification,\n} = require("../catalog/mealProductClassificationService");'''
          )
          catalog_path = Path(catalog)
          catalog_text = catalog_path.read_text(encoding="utf-8")
          start = catalog_text.index("function classifyProduct({ product, optionGroups, status }) {")
          end = catalog_text.index("\nfunction serializeOptionNode", start)
          catalog_path.write_text(
              catalog_text[:start]
              + '''function classifyProduct({ product, optionGroups, status }) {\n  return buildMealPlannerClassification({\n    product,\n    optionGroups,\n    status,\n  });\n}\n'''
              + catalog_text[end:],
              encoding="utf-8",
          )

          config = "src/services/subscription/mealBuilderConfigService.js"
          replace_once(
              config,
              '''const {\n  hasFlutterPrimaryMealPickerContent,\n  summarizeFlutterPrimaryMealPickerContent,\n} = require("../catalog/plannerCatalogContentValidator");''',
              '''const {\n  hasFlutterPrimaryMealPickerContent,\n  summarizeFlutterPrimaryMealPickerContent,\n} = require("../catalog/plannerCatalogContentValidator");\nconst {\n  classifyMealProduct,\n} = require("../catalog/mealProductClassificationService");'''
          )
          replace_once(
              config,
              '''  if (requireSandwich) {\n    const validItemTypes = ["cold_sandwich", "full_meal_product"];\n    if (!validItemTypes.includes(String(product.itemType || ""))) {\n      reasonCodes.push("SANDWICH_ITEM_TYPE_MISMATCH");\n      errors.push(statusIssue("error", "SANDWICH_ITEM_TYPE_MISMATCH", "Sandwich/standalone product must use itemType=cold_sandwich or full_meal_product"));\n    }\n  }''',
              '''  if (requireSandwich) {\n    const productId = String(product._id);\n    const productGroupRelations = (docs.groupRelations || []).filter(\n      (relation) => String(relation.productId) === productId\n    );\n    const classification = classifyMealProduct(product, {\n      hasBuilderRelations: productGroupRelations.length > 0,\n      hasActiveBuilderRelations: productGroupRelations.some(relationReady),\n    });\n    if (!classification.directCompatible) {\n      reasonCodes.push("SANDWICH_ITEM_TYPE_MISMATCH");\n      errors.push(\n        statusIssue(\n          "error",\n          "SANDWICH_ITEM_TYPE_MISMATCH",\n          "Product is not compatible with a standalone Meal Planner card"\n        )\n      );\n    }\n  }'''
          )
          replace_once(
              config,
              '''    ? await MenuProduct.find({ categoryId: category._id, itemType: "cold_sandwich" }).sort({ sortOrder: 1, createdAt: -1 }).lean()''',
              '''    ? await MenuProduct.find({ categoryId: category._id }).sort({ sortOrder: 1, createdAt: -1 }).lean()'''
          )

          compatibility = "src/services/subscription/dashboardMealPlannerCompatibilityService.js"
          replace_once(
              compatibility,
              '''const {\n  isLinkedDocGloballyAvailable,\n  loadCatalogItemsByIdForDocs,\n} = require("../catalog/catalogAvailabilityService");''',
              '''const {\n  isLinkedDocGloballyAvailable,\n  loadCatalogItemsByIdForDocs,\n} = require("../catalog/catalogAvailabilityService");\nconst {\n  directSelectionType: classifyDirectSelectionType,\n  isProductionDirectProduct,\n} = require("../catalog/mealProductClassificationService");'''
          )
          replace_once(
              compatibility,
              '''function directSelectionType(product = {}) {\n  return product.itemType === "cold_sandwich"\n    ? "sandwich"\n    : "full_meal_product";\n}''',
              '''function directSelectionType(product = {}) {\n  return classifyDirectSelectionType(product) || "full_meal_product";\n}'''
          )
          replace_once(
              compatibility,
              '''async function loadDirectProducts() {\n  const products = await MenuProduct.find({\n    itemType: { $in: DIRECT_PRODUCT_ITEM_TYPES },\n  })\n    .sort({ sortOrder: 1, createdAt: -1 })\n    .lean();\n  const catalogItemsById = await loadCatalogItemsByIdForDocs(products);\n  return { products, catalogItemsById };\n}''',
              '''async function loadDirectProducts() {\n  const allProducts = await MenuProduct.find({})\n    .sort({ sortOrder: 1, createdAt: -1 })\n    .lean();\n  const products = allProducts.filter(isProductionDirectProduct);\n  const catalogItemsById = await loadCatalogItemsByIdForDocs(products);\n  return { products, catalogItemsById };\n}'''
          )
          replace_once(
              compatibility,
              '''  const invalidTypeProducts = products\n    .filter((product) => !DIRECT_PRODUCT_ITEM_TYPES.includes(product.itemType))\n    .map((product) => ({ id: String(product._id), itemType: product.itemType }));''',
              '''  const invalidTypeProducts = products\n    .filter((product) => !isProductionDirectProduct(product))\n    .map((product) => ({\n      id: String(product._id),\n      key: product.key || "",\n      itemType: product.itemType || "",\n      cardVariant: String(product?.ui?.cardVariant || ""),\n    }));'''
          )
          PY

      - name: Syntax check
        run: |
          node --check src/services/catalog/mealProductClassificationService.js
          node --check src/services/subscription/dashboardMealBuilderCatalogService.js
          node --check src/services/subscription/mealBuilderConfigService.js
          node --check src/services/subscription/dashboardMealPlannerCompatibilityService.js

      - name: Commit fix
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-generic-meal-builder-products.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/services/catalog/mealProductClassificationService.js \
            src/services/subscription/dashboardMealBuilderCatalogService.js \
            src/services/subscription/mealBuilderConfigService.js \
            src/services/subscription/dashboardMealPlannerCompatibilityService.js \
            .github/workflows/fix-generic-meal-builder-products.yml
          git diff --cached --check
          git commit -m "fix(meal-builder): accept generic standalone products"
          git push origin HEAD:main
