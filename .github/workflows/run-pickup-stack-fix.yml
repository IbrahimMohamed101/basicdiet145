name: Run pickup stack hardening

on:
  push:
    branches:
      - main
    paths:
      - .github/pickup-stack-fix-trigger

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Extract and apply the reviewed patch
        shell: bash
        run: |
          awk '
            /python3 <<'"'"'PY'"'"'/ { capture=1; next }
            capture && /^          PY$/ { capture=0; exit }
            capture { sub(/^          /, ""); print }
          ' .github/workflows/fix-pickup-stack-overflow.yml > /tmp/apply_pickup_fix.py
          test -s /tmp/apply_pickup_fix.py
          python3 /tmp/apply_pickup_fix.py

      - name: Run pickup regression tests
        run: |
          NODE_ENV=test node tests/pickupStackOverflowRegression.test.js
          NODE_ENV=test node tests/pickupCanonicalObjectId.test.js
          npm run test:subscription-bilingual

      - name: Commit hardened pickup flow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/services/subscription/pickupCanonicalPresentationService.js \
                  src/services/installPickupCanonicalContract.js \
                  src/utils/subscriptionBilingualResponse.js \
                  tests/pickupStackOverflowRegression.test.js
          git commit -m "fix(pickup): eliminate ObjectId and response traversal recursion"
          git push origin main
