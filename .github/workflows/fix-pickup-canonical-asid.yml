name: Fix pickup canonical ObjectId conversion

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-pickup-canonical-asid.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Replace recursive ObjectId conversion
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('src/services/installPickupCanonicalContract.js')
          text = path.read_text()
          old = '''function asId(value) {
            if (value === undefined || value === null || value === "") return null;
            if (value && typeof value === "object" && value._id) return asId(value._id);
            const text = clean(value);
            return text || null;
          }'''
          new = '''function asId(value) {
            if (value === undefined || value === null || value === "") return null;

            if (value && typeof value === "object") {
              if (typeof value.toHexString === "function") {
                try {
                  const hex = clean(value.toHexString());
                  if (hex) return hex;
                } catch (_err) {
                  // Fall through to nested-id/string handling.
                }
              }

              let nestedId;
              try {
                nestedId = value._id;
              } catch (_err) {
                nestedId = null;
              }
              if (nestedId !== undefined && nestedId !== null && nestedId !== value) {
                return asId(nestedId);
              }
            }

            const text = clean(value);
            return text || null;
          }'''
          if old not in text:
              raise SystemExit('recursive asId patch target not found')
          path.write_text(text.replace(old, new, 1))

          test_path = Path('tests/pickupCanonicalContractObjectId.test.js')
          test_path.write_text('''"use strict";\n\nprocess.env.NODE_ENV = "test";\n\nconst assert = require("assert");\nconst mongoose = require("mongoose");\nconst { sourceSlotToKitchenSlot } = require("../src/services/installPickupCanonicalContract");\n\nfunction run() {\n  const productId = new mongoose.Types.ObjectId();\n  const sandwichId = new mongoose.Types.ObjectId();\n\n  assert.doesNotThrow(() => sourceSlotToKitchenSlot({\n    slotIndex: 1,\n    slotKey: "slot_1",\n    selectionType: "full_meal_product",\n    productId,\n    sandwichId,\n    productNameI18n: { ar: "ساندوتش دجاج", en: "Chicken Sandwich" },\n  }, 0, {}));\n\n  const kitchenSlot = sourceSlotToKitchenSlot({\n    slotIndex: 1,\n    slotKey: "slot_1",\n    selectionType: "full_meal_product",\n    productId,\n    productNameI18n: { ar: "ساندوتش دجاج", en: "Chicken Sandwich" },\n  }, 0, {});\n\n  assert.strictEqual(kitchenSlot.productId, productId.toHexString());\n  console.log("pickup canonical ObjectId conversion checks passed");\n}\n\nrun();\n''')
          PY

      - name: Run focused regressions
        run: |
          node tests/pickupCanonicalContractObjectId.test.js
          NODE_ENV=test node tests/pickupProductNameResponse.test.js
          NODE_ENV=test node tests/subscriptionPickupDisplayNames.test.js

      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/services/installPickupCanonicalContract.js tests/pickupCanonicalContractObjectId.test.js
          git commit -m "fix(pickup): stop canonical ObjectId recursion"
          git push
