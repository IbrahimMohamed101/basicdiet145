name: Apply Kitchen Premium Salad Snapshot Fix

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/apply-kitchen-premium-salad-snapshot-fix.py"
      - "scripts/apply-kitchen-premium-salad-protein-priority.py"
      - "scripts/apply-kitchen-premium-salad-regression-hardening.py"
      - "tests/kitchenPremiumSaladProjectionFallback.test.js"
      - "scripts/run-premium-meal-backend-lifecycle.sh"

permissions:
  contents: write

jobs:
  apply-and-test:
    if: github.head_ref == 'fix/kitchen-premium-salad-canonical-snapshot'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/kitchen-premium-salad-canonical-snapshot
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply scoped backend patch
        run: |
          python3 scripts/apply-kitchen-premium-salad-snapshot-fix.py
          python3 scripts/apply-kitchen-premium-salad-protein-priority.py
          python3 scripts/apply-kitchen-premium-salad-regression-hardening.py
      - name: Validate JavaScript syntax
        run: |
          node --check src/services/dashboard/opsPayloadService.js
          node --check src/services/dashboard/kitchenProjectionService.js
          node --check tests/kitchenPremiumSaladProjectionFallback.test.js
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run focused kitchen regression
        env:
          NODE_ENV: test
        run: node tests/kitchenPremiumSaladProjectionFallback.test.js
      - name: Commit generated backend changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/services/dashboard/opsPayloadService.js src/services/dashboard/kitchenProjectionService.js tests/kitchenPremiumSaladProjectionFallback.test.js
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "Backend source already contains the verified patch"
          else
            git commit -m "fix(kitchen): project canonical premium salad snapshot"
            git push origin HEAD:fix/kitchen-premium-salad-canonical-snapshot
          fi
