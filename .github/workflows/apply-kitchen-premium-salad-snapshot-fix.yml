name: Verify Kitchen Premium Salad Snapshot Fix

on:
  pull_request:
    branches: [main]
    paths:
      - "src/services/dashboard/kitchenProjectionService.js"
      - "src/services/dashboard/opsPayloadService.js"
      - "tests/kitchenPremiumSaladProjectionFallback.test.js"
      - "scripts/run-premium-meal-backend-lifecycle.sh"

permissions:
  contents: read

jobs:
  focused-test:
    if: github.head_ref == 'fix/kitchen-premium-salad-canonical-snapshot'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/kitchen-premium-salad-canonical-snapshot
          fetch-depth: 1
      - name: Validate JavaScript syntax
        run: |
          node --check src/services/dashboard/opsPayloadService.js
          node --check src/services/dashboard/kitchenProjectionService.js
          node --check tests/kitchenPremiumSaladProjectionFallback.test.js
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run focused kitchen regression
        env:
          NODE_ENV: test
        run: node tests/kitchenPremiumSaladProjectionFallback.test.js
