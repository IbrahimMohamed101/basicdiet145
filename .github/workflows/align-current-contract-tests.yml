name: Align current backend contracts

on:
  push:
    branches:
      - agent/fix-backend-contract-tests
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  align-and-verify:
    if: github.event_name == 'push' && github.event.head_commit.message != 'fix: align backend tests with canonical contracts'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-backend-contract-tests
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: node scripts/align-current-contract-tests-v3.js
      - run: echo "branch trigger only; main workflow performs persisted verification"
