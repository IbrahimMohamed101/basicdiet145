name: Fix direct full meal first save

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-direct-full-meal-first-save.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Patch SubscriptionDay direct-product persistence contract
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path("src/models/SubscriptionDay.js")
          text = path.read_text(encoding="utf-8")

          old_enum = 'enum: ["standard_meal", "premium_meal", "premium_large_salad", "sandwich"],'
          new_enum = 'enum: ["standard_meal", "premium_meal", "premium_large_salad", "sandwich", "full_meal_product"],'
          count = text.count(old_enum)
          if count != 2:
              raise SystemExit(f"Expected exactly 2 selectionType enum blocks, found {count}")
          text = text.replace(old_enum, new_enum)

          old_materialized = 'sandwichId: { type: mongoose.Schema.Types.ObjectId, ref: "Meal", default: null },\n    proteinId:'
          new_materialized = 'sandwichId: { type: mongoose.Schema.Types.ObjectId, ref: "Meal", default: null },\n    productId: { type: mongoose.Schema.Types.ObjectId, ref: "MenuProduct", default: null },\n    proteinId:'
          if old_materialized not in text:
              raise SystemExit("Expected MaterializedMealSchema sandwichId block not found")
          text = text.replace(old_materialized, new_materialized, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Add first-save regression test
        shell: bash
        run: |
          cat > tests/subscriptionDayDirectFullMealSchema.test.js <<'EOF'
          process.env.NODE_ENV = "test";

          const assert = require("assert");
          const mongoose = require("mongoose");
          const SubscriptionDay = require("../src/models/SubscriptionDay");

          async function run() {
            const subscriptionId = new mongoose.Types.ObjectId();
            const productId = new mongoose.Types.ObjectId();

            const day = new SubscriptionDay({
              subscriptionId,
              date: "2026-07-22",
              status: "open",
              plannerState: "draft",
              mealSlots: [
                {
                  slotIndex: 1,
                  slotKey: "slot_1",
                  status: "complete",
                  selectionType: "full_meal_product",
                  productId,
                  sandwichId: productId,
                  carbs: [],
                },
              ],
              materializedMeals: [
                {
                  slotKey: "slot_1",
                  selectionType: "full_meal_product",
                  productId,
                  sandwichId: productId,
                  operationalSku: `full_meal:${productId}`,
                },
              ],
            });

            await day.validate();
            const stored = day.toObject();
            assert.strictEqual(stored.mealSlots[0].selectionType, "full_meal_product");
            assert.strictEqual(String(stored.mealSlots[0].productId), String(productId));
            assert.strictEqual(stored.materializedMeals[0].selectionType, "full_meal_product");
            assert.strictEqual(String(stored.materializedMeals[0].productId), String(productId));

            console.log("subscriptionDayDirectFullMealSchema.test.js passed");
          }

          run().catch((error) => {
            console.error(error && error.stack ? error.stack : error);
            process.exitCode = 1;
          });
          EOF
          sed -i 's/^          //' tests/subscriptionDayDirectFullMealSchema.test.js

      - name: Validate direct full-meal persistence fix
        run: |
          node --check src/models/SubscriptionDay.js
          node --check tests/subscriptionDayDirectFullMealSchema.test.js
          node tests/subscriptionDayDirectFullMealSchema.test.js
          node tests/meal_planner_types.test.js
          git diff --check

      - name: Commit fix
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-direct-full-meal-first-save.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/models/SubscriptionDay.js \
            tests/subscriptionDayDirectFullMealSchema.test.js \
            .github/workflows/fix-direct-full-meal-first-save.yml
          git diff --cached --check
          git commit -m "fix(planner): persist direct full-meal selections on first save"
          git push origin HEAD:main
