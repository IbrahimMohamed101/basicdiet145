name: Isolated final backend gate

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/isolated-final-backend-gate.yml"

permissions:
  contents: read

concurrency:
  group: isolated-final-backend-${{ github.event.pull_request.number }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate backend syntax and composition
        run: npm run validate:backend

      - name: Run final release gates
        id: final_release_gates
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run test:release-gates 2>&1 | tee release-gates.log

      - name: Upload final release gate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: isolated-final-release-gates-log
          path: release-gates.log
          if-no-files-found: error

      - name: Enforce final release gate result
        if: steps.final_release_gates.outcome == 'failure'
        run: exit 1
