name: Isolated final backend gate

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/isolated-final-backend-gate.yml"

permissions:
  contents: read

concurrency:
  group: isolated-final-backend-${{ github.event.pull_request.number }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate backend syntax and composition
        run: npm run validate:backend

      - name: Run final release gates
        run: npm run test:release-gates
