name: Apply canonical insufficient balance code

on:
  push:
    branches:
      - agent/dynamic-direct-meal-catalog-safe
    paths:
      - .github/workflows/apply-canonical-insufficient-code-fixture.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dynamic-direct-meal-catalog-safe
          fetch-depth: 0
      - name: Apply exact canonical code assertion and self-delete
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          target = Path("tests/subscriptionBalancePolicy.test.js")
          text = target.read_text(encoding="utf-8")
          old = '      assert.strictEqual(err.code, "INSUFFICIENT_CREDITS", "Cannot consume more than available");\n'
          new = '      assert.strictEqual(err.code, "INSUFFICIENT_REMAINING_MEALS", "Cannot consume more than available");\n'
          if text.count(old) != 1:
              raise SystemExit("Expected legacy insufficient balance assertion exactly once")
          target.write_text(text.replace(old, new, 1), encoding="utf-8")
          Path(".github/workflows/apply-canonical-insufficient-code-fixture.yml").unlink()
          PY
      - name: Commit canonical assertion
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/subscriptionBalancePolicy.test.js .github/workflows/apply-canonical-insufficient-code-fixture.yml
          git diff --cached --check
          git commit -m "Expect canonical insufficient remaining meals code"
          git push origin HEAD:agent/dynamic-direct-meal-catalog-safe
