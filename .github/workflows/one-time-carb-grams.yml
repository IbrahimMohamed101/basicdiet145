name: One-time carb grams

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/routes/index.js"
      - "src/services/installOneTimeCarbGramContract.js"
      - "tests/oneTimeCarbGramContract.test.js"
      - ".github/workflows/one-time-carb-grams.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      MONGOMS_VERSION: 7.0.14
      DASHBOARD_JWT_SECRET: one-time-carb-dashboard-secret
      JWT_SECRET: one-time-carb-app-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Verify one-time carb gram response and pricing
        run: node tests/oneTimeCarbGramContract.test.js
