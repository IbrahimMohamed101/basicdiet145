name: Apply Railway dashboard CORS fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-railway-dashboard-cors.yml

permissions:
  contents: write

jobs:
  fix-cors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Add Railway dashboard origin and regression test
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          origin = "https://clientdashbourd-production.up.railway.app"

          app_path = Path("src/app.js")
          app_text = app_path.read_text(encoding="utf-8")
          if origin not in app_text:
              needle = '    "https://basicdiet145.onrender.com",\n'
              replacement = needle + f'    "{origin}",\n'
              if needle not in app_text:
                  raise SystemExit("Could not locate the default CORS origin list")
              app_text = app_text.replace(needle, replacement, 1)
              app_path.write_text(app_text, encoding="utf-8")

          test_path = Path("tests/corsPreflight.test.js")
          test_text = test_path.read_text(encoding="utf-8")
          test_name = "allows Railway production dashboard origin by default"
          if test_name not in test_text:
              marker = '  await test("allows comma-separated configured dashboard origins", async () => {\n'
              block = f'''  await test("{test_name}", async () => {{
            const app = createApp();
            const res = await request(app)
              .options("/api/dashboard/auth/me")
              .set("Origin", "{origin}")
              .set("Access-Control-Request-Method", "GET")
              .set("Access-Control-Request-Headers", "authorization,content-type");

            assert.strictEqual(res.status, 204);
            assert.strictEqual(
              res.headers["access-control-allow-origin"],
              "{origin}"
            );
            assert.strictEqual(res.headers["access-control-allow-credentials"], "true");
          }});

          '''
              if marker not in test_text:
                  raise SystemExit("Could not locate the CORS test insertion point")
              test_text = test_text.replace(marker, block + marker, 1)
              test_path.write_text(test_text, encoding="utf-8")
          PY

      - name: Run CORS regression tests
        run: node tests/corsPreflight.test.js

      - name: Commit fix and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-railway-dashboard-cors.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app.js tests/corsPreflight.test.js .github/workflows/fix-railway-dashboard-cors.yml
          git diff --cached --check
          git commit -m "fix(cors): allow Railway production dashboard"
          git push origin HEAD:main
