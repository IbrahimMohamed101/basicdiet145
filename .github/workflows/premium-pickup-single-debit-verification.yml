name: Premium Pickup Single Debit Verification

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/patchPremiumPickupSingleDebit.py"
      - "src/services/subscription/subscriptionPickupRequestBalanceService.js"
      - "tests/subscriptionPremiumPickupSingleDebit.test.js"
      - ".github/workflows/subscription-entitlement-focused.yml"
      - ".github/workflows/premium-pickup-single-debit-verification.yml"

permissions:
  contents: write
  pull-requests: read

jobs:
  patch-and-test:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/premium-pickup-single-debit'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply focused patch
        run: |
          if [ -f scripts/patchPremiumPickupSingleDebit.py ]; then
            python3 scripts/patchPremiumPickupSingleDebit.py
            rm scripts/patchPremiumPickupSingleDebit.py
          fi

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run focused entitlement tests
        env:
          NODE_ENV: test
        run: |
          node tests/subscriptionPremiumPickupSingleDebit.test.js
          node tests/subscriptionMealEntitlementLifecycle.test.js
          node tests/subscriptionEntitlementReservationRecovery.test.js
          node tests/subscriptionPaymentInitiationReservationCleanup.test.js

      - name: Commit verified fix to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/services/subscription/subscriptionPickupRequestBalanceService.js \
                  tests/subscriptionPremiumPickupSingleDebit.test.js \
                  .github/workflows/subscription-entitlement-focused.yml \
                  scripts/patchPremiumPickupSingleDebit.py
          if ! git diff --cached --quiet; then
            git commit -m "fix(subscription): reuse premium day reservation for pickup"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
