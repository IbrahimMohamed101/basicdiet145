name: Meal Builder option groups

on:
  pull_request:
    paths:
      - "src/controllers/dashboard/mealBuilderController.js"
      - "src/services/subscription/dashboardMealBuilderAuthoringCatalogService.js"
      - "src/services/subscription/dashboardMealBuilderAuthoringContractService.js"
      - "src/services/subscription/dashboardMealPlannerCardFacadeService.js"
      - "src/services/subscription/dashboardMealPlannerCanonicalService.js"
      - "tests/dashboardMealBuilderAuthoringCatalog.test.js"
      - "tests/dashboardMealBuilderOptionFamilyLifecycle.test.js"
      - "tests/mealPlannerCardLifecycle.test.js"
      - "tests/dashboardMealPlannerProductionProducts.test.js"
      - "tests/dashboardMealBuilderFullMealEndToEnd.test.js"
      - ".github/workflows/meal-builder-option-groups.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Authoritative authoring catalog
            command: NODE_ENV=test node tests/dashboardMealBuilderAuthoringCatalog.test.js
          - name: Option-family card lifecycle
            command: NODE_ENV=test node tests/dashboardMealBuilderOptionFamilyLifecycle.test.js
          - name: Dashboard compatibility
            command: NODE_ENV=test node tests/mealPlannerDashboardCompatibility.test.js
          - name: Card lifecycle
            command: NODE_ENV=test node tests/mealPlannerCardLifecycle.test.js
          - name: Production product compatibility
            command: NODE_ENV=test node tests/dashboardMealPlannerProductionProducts.test.js
          - name: Complete catalog
            command: NODE_ENV=test node tests/dashboardMealBuilderCompleteCatalog.test.js
          - name: Full meal product contract
            command: NODE_ENV=test node tests/mealPlannerFullMealProductContract.test.js
          - name: Compatible default seed
            command: NODE_ENV=test node tests/dashboardMealBuilderCompatibleDefaultSeed.test.js
          - name: Sandwich card end to end
            command: NODE_ENV=test node tests/dashboardMealBuilderSandwichCardEndToEnd.test.js
          - name: Existing option catalog closure
            command: NODE_ENV=test node tests/dashboardMealBuilderOptionCatalogClosure.test.js
          - name: Full meal end to end
            command: NODE_ENV=test node tests/dashboardMealBuilderFullMealEndToEnd.test.js
          - name: Flutter card policy
            command: NODE_ENV=test node tests/dashboardMealPlannerFlutterCardPolicy.test.js
          - name: Two-type policy
            command: NODE_ENV=test node tests/dashboardMealPlannerTwoTypePolicy.test.js
          - name: Dashboard mobile parity
            command: npm run test:meal-builder-dashboard-mobile-parity
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.name }}
        run: ${{ matrix.command }}
