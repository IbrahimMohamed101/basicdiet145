name: Apply comprehensive Meal Builder source kind fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-meal-builder-source-kind-core.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Patch source kind normalization at every write boundary
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f"Expected snippet not found in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1))

          config = "src/services/subscription/mealBuilderConfigService.js"
          replace_once(
              config,
              'const { pickLang } = require("../../utils/i18n");\n',
              'const { pickLang } = require("../../utils/i18n");\nconst { canonicalSourceKind } = require("./mealBuilderSourceKindCompatibility");\n',
          )
          replace_once(
              config,
              '''  if (!normalized.sourceKind && sourceKind) {
              if (sourceKind === "premium_mixed") normalized.sourceKind = "premium_visual";
              else if (sourceKind === "option_family") normalized.sourceKind = "visual_family";
              else if (sourceKind === "option_group") normalized.sourceKind = "visual_family";
              else if (sourceKind === "product_category" || sourceKind === "product_list") normalized.sourceKind = "product_list";
            }

            if (source.displayCategoryKey && !normalized.metadata?.proteinFamilyKey) {''',
              '''  if (!normalized.sourceKind && sourceKind) {
              if (sourceKind === "premium_mixed") normalized.sourceKind = "premium_visual";
              else if (sourceKind === "option_family") normalized.sourceKind = "visual_family";
              else if (sourceKind === "option_group") normalized.sourceKind = "visual_family";
              else if (sourceKind === "product_category" || sourceKind === "product_list") normalized.sourceKind = "product_list";
            }

            // Normalize both persisted top-level values and nested Dashboard aliases.
            // This is the central boundary used by create, patch, add, remove, replace,
            // validate, and publish flows, so a valid historical card cannot block an
            // unrelated card mutation merely because it uses a UI alias.
            normalized.sourceKind = canonicalSourceKind(
              normalized.sourceKind || sourceKind
            );

            if (source.displayCategoryKey && !normalized.metadata?.proteinFamilyKey) {''',
          )

          for service in [
              "src/services/subscription/dashboardMealPlannerCompatibilityService.js",
              "src/services/subscription/dashboardMealPlannerCardFacadeService.js",
          ]:
              replace_once(
                  service,
                  'const baseService = require("./mealBuilderConfigService");\n' if "Compatibility" in service else 'const compatibilityService = require("./dashboardMealPlannerCompatibilityService");\n',
                  ('const baseService = require("./mealBuilderConfigService");\n'
                   'const { canonicalSourceKind } = require("./mealBuilderSourceKindCompatibility");\n')
                  if "Compatibility" in service else
                  ('const compatibilityService = require("./dashboardMealPlannerCompatibilityService");\n'
                   'const { canonicalSourceKind } = require("./mealBuilderSourceKindCompatibility");\n'),
              )
              replace_once(
                  service,
                  '    sourceKind: section.sourceKind || "",\n',
                  '    sourceKind: canonicalSourceKind(\n      section.sourceKind || section.source?.kind || ""\n    ),\n',
              )

          test_path = Path("tests/mealBuilderSourceKindCore.test.js")
          test_path.write_text(r'''process.env.NODE_ENV = "test";

const assert = require("assert");
const mealBuilderConfigService = require("../src/services/subscription/mealBuilderConfigService");

const PRODUCT_ID = "507f1f77bcf86cd799439011";
const PRODUCT_ID_2 = "507f1f77bcf86cd799439012";
const CONTEXT_ID = "507f1f77bcf86cd799439013";
const GROUP_ID = "507f1f77bcf86cd799439014";
const OPTION_ID = "507f1f77bcf86cd799439015";

function baseSection(overrides = {}) {
  return {
    key: "card_key",
    sectionType: "product_list",
    sourceKind: "product_list",
    titleOverride: { ar: "بطاقة", en: "Card" },
    selectedProductIds: [PRODUCT_ID],
    selectedOptionIds: [],
    includeMode: "selected",
    selectionType: "full_meal_product",
    sortOrder: 10,
    required: false,
    minSelections: 0,
    maxSelections: 1,
    multiSelect: false,
    visible: true,
    availableFor: ["subscription"],
    ...overrides,
  };
}

function testCoreNormalizerAcceptsEveryDashboardShape() {
  const sections = mealBuilderConfigService.normalizeSections([
    baseSection({ key: "direct", sourceKind: "direct_product" }),
    baseSection({
      key: "nested_menu_product",
      sourceKind: "",
      source: { kind: "menu_product" },
      selectedProductIds: [PRODUCT_ID_2],
    }),
    baseSection({
      key: "options",
      sectionType: "option_group",
      sourceKind: "option_family",
      productContextId: CONTEXT_ID,
      sourceGroupId: GROUP_ID,
      selectedProductIds: [],
      selectedOptionIds: [OPTION_ID],
      selectionType: "standard_meal",
    }),
  ]);

  assert.strictEqual(sections[0].sourceKind, "product_list");
  assert.strictEqual(sections[1].sourceKind, "product_list");
  assert.strictEqual(sections[2].sourceKind, "visual_family");
}

function testMixedDraftNoLongerBlocksUnrelatedMutation() {
  const normalized = mealBuilderConfigService.normalizeSections([
    baseSection({ key: "sandwiches", sourceKind: "direct_products" }),
    baseSection({
      key: "protein",
      sectionType: "option_group",
      sourceKind: "protein_family",
      productContextId: CONTEXT_ID,
      sourceGroupId: GROUP_ID,
      selectedProductIds: [],
      selectedOptionIds: [OPTION_ID],
      selectionType: "standard_meal",
      sortOrder: 20,
    }),
  ]);

  assert.deepStrictEqual(
    normalized.map((section) => section.sourceKind),
    ["product_list", "visual_family"]
  );
}

function testUnknownSourceKindStillFailsClosed() {
  assert.throws(
    () => mealBuilderConfigService.normalizeSections([
      baseSection({ sourceKind: "truly_unknown_source" }),
    ]),
    (error) => error && error.code === "MEAL_BUILDER_INVALID_SOURCE_KIND"
  );
}

function run() {
  testCoreNormalizerAcceptsEveryDashboardShape();
  testMixedDraftNoLongerBlocksUnrelatedMutation();
  testUnknownSourceKindStillFailsClosed();
  console.log("meal builder core sourceKind normalization checks passed");
}

run();
''')

          Path(".github/workflows/fix-meal-builder-source-kind-core.yml").unlink()
          PY

      - name: Validate syntax and source kind tests
        run: |
          node --check src/services/subscription/mealBuilderSourceKindCompatibility.js
          node --check src/services/subscription/mealBuilderConfigService.js
          node --check src/services/subscription/dashboardMealPlannerCompatibilityService.js
          node --check src/services/subscription/dashboardMealPlannerCardFacadeService.js
          node tests/mealBuilderSourceKindCompatibility.test.js
          node tests/mealBuilderSourceKindCore.test.js

      - name: Commit fix to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(meal-builder): canonicalize source kinds across card mutations"
          git push origin HEAD:main
