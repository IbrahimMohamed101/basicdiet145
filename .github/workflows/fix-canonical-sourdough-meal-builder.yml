name: Fix canonical sourdough Meal Builder

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-canonical-sourdough-meal-builder.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Patch canonical direct-product authority
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path("src/services/subscription/dashboardMealPlannerCanonicalService.js")
          text = path.read_text(encoding="utf-8")

          def replace_once(old, new):
              global text
              if old not in text:
                  raise SystemExit(f"Expected source block not found:\n{old[:500]}")
              text = text.replace(old, new, 1)

          replace_once(
              '''const {
  isLinkedDocGloballyAvailable,
  loadCatalogItemsByIdForDocs,
} = require("../catalog/catalogAvailabilityService");''',
              '''const {
  isLinkedDocGloballyAvailable,
  loadCatalogItemsByIdForDocs,
} = require("../catalog/catalogAvailabilityService");
const {
  directSelectionType: classifyDirectSelectionType,
  isProductionDirectProduct,
} = require("../catalog/mealProductClassificationService");'''
          )

          replace_once(
              '''function directCatalogCompatible(product = {}) {
  return explicitDirectCompatible(product);
}

function explicitDirectCompatible(product = {}) {
  const itemType = String(product.itemType || "").trim().toLowerCase();
  const variant = productCardVariant(product);
  if (DIRECT_ITEM_TYPES.has(itemType)) return true;
  return itemType === "product" && !NON_DIRECT_CARD_VARIANTS.has(variant);
}''',
              '''function directCatalogCompatible(product = {}) {
  return isProductionDirectProduct(product);
}

function explicitDirectCompatible(product = {}) {
  return isProductionDirectProduct(product);
}'''
          )

          replace_once(
              '''        deprecatedSelectionType:
          productCardVariant(product) === "sandwich_card" ||
          product.itemType === "cold_sandwich"
            ? "sandwich"
            : null,''',
              '''        deprecatedSelectionType:
          classifyDirectSelectionType(product) === "sandwich"
            ? "sandwich"
            : null,'''
          )

          replace_once(
              '''    const requiresExplicitType = requestedProducts.some(
      (product) => !DIRECT_ITEM_TYPES.has(String(product.itemType || "").trim().toLowerCase())
    );''',
              '''    const requiresExplicitType = requestedProducts.some(
      (product) => !explicitDirectCompatible(product)
    );'''
          )

          path.write_text(text, encoding="utf-8")
          PY

      - name: Add canonical regression test
        shell: bash
        run: |
          cat > tests/dashboardMealPlannerCanonicalGenericProducts.test.js <<'EOF'
          process.env.NODE_ENV = "test";
          process.env.JWT_SECRET = process.env.JWT_SECRET || "test-only-jwt-key-0000000000000000";
          process.env.DASHBOARD_JWT_SECRET =
            process.env.DASHBOARD_JWT_SECRET || "test-only-dashboard-key-000000000";

          const assert = require("assert");
          const mongoose = require("mongoose");
          const { MongoMemoryServer } = require("mongodb-memory-server");
          const request = require("supertest");

          const { createApp } = require("../src/app");
          const { dashboardAuth } = require("./helpers/dashboardAuthHelper");
          const MenuCategory = require("../src/models/MenuCategory");
          const MenuProduct = require("../src/models/MenuProduct");

          let mongoServer;

          async function connect() {
            mongoServer = await MongoMemoryServer.create();
            const uri = mongoServer.getUri(`canonical_generic_products_${Date.now()}`);
            process.env.MONGO_URI = uri;
            process.env.MONGODB_URI = uri;
            await mongoose.connect(uri, { serverSelectionTimeoutMS: 10000 });
          }

          async function disconnect() {
            if (mongoose.connection.readyState !== 0) await mongoose.disconnect();
            if (mongoServer) await mongoServer.stop();
          }

          function expectStatus(response, expected, label) {
            assert.strictEqual(
              response.status,
              expected,
              `${label}: expected ${expected}, got ${response.status} ${JSON.stringify(response.body)}`
            );
          }

          async function run() {
            await connect();
            try {
              const now = new Date();
              const category = await MenuCategory.create({
                key: "canonical_generic_products",
                name: { ar: "منتجات مباشرة", en: "Direct products" },
                publishedAt: now,
              });
              const [baseMeal, sourdough, addon] = await MenuProduct.insertMany([
                {
                  categoryId: category._id,
                  key: "ready_base_meal",
                  name: { ar: "وجبة جاهزة", en: "Ready base meal" },
                  itemType: "full_meal_product",
                  pricingModel: "fixed",
                  priceHalala: 1800,
                  availableFor: ["subscription"],
                  availableForSubscription: true,
                  publishedAt: now,
                },
                {
                  categoryId: category._id,
                  key: "sourdough_turkey",
                  name: { ar: "ساوردو تركي", en: "Turkey sourdough" },
                  itemType: "sourdough",
                  pricingModel: "fixed",
                  priceHalala: 1700,
                  availableFor: ["subscription"],
                  availableForSubscription: true,
                  ui: { cardVariant: "standard" },
                  publishedAt: now,
                },
                {
                  categoryId: category._id,
                  key: "extra_sauce",
                  name: { ar: "صوص إضافي", en: "Extra sauce" },
                  itemType: "addon",
                  pricingModel: "fixed",
                  priceHalala: 200,
                  availableFor: ["subscription"],
                  availableForSubscription: true,
                  ui: { cardVariant: "addon_card" },
                  publishedAt: now,
                },
              ]);

              const app = createApp();
              const auth = await dashboardAuth("admin", "canonical-generic-products");

              const createDraft = await request(app)
                .post("/api/dashboard/meal-builder/draft")
                .set(auth.headers)
                .send({
                  sections: [
                    {
                      key: "direct_products",
                      sectionType: "product_list",
                      sourceKind: "product_list",
                      titleOverride: { ar: "منتجات", en: "Products" },
                      selectedProductIds: [String(baseMeal._id)],
                      selectedOptionIds: [],
                      includeMode: "selected",
                      selectionType: "full_meal_product",
                      sortOrder: 10,
                      required: false,
                      minSelections: 0,
                      maxSelections: 1,
                      multiSelect: false,
                      visible: true,
                      availableFor: ["subscription"],
                    },
                  ],
                });
              expectStatus(createDraft, 201, "create direct draft");

              const addSourdough = await request(app)
                .post("/api/dashboard/meal-builder/sections/direct_products/products")
                .set(auth.headers)
                .send({ productIds: [String(sourdough._id)] });
              expectStatus(addSourdough, 200, "add sourdough");
              assert.deepStrictEqual(
                new Set(addSourdough.body.data.section.selectedProductIds),
                new Set([String(baseMeal._id), String(sourdough._id)])
              );

              const picker = await request(app)
                .get("/api/dashboard/meal-builder/pickers/products?limit=1000&unassignedOnly=false")
                .set(auth.headers);
              expectStatus(picker, 200, "direct picker");
              const keys = new Set((picker.body.data.candidates || []).map((item) => item.key));
              assert(keys.has("sourdough_turkey"));
              assert(!keys.has("extra_sauce"));

              const rejectAddon = await request(app)
                .post("/api/dashboard/meal-builder/sections/direct_products/products")
                .set(auth.headers)
                .send({ productIds: [String(addon._id)] });
              expectStatus(rejectAddon, 422, "reject addon");
              assert.strictEqual(
                rejectAddon.body.error.code,
                "MEAL_BUILDER_PRODUCT_TYPE_INVALID"
              );

              console.log("dashboardMealPlannerCanonicalGenericProducts.test.js passed");
            } finally {
              await disconnect();
            }
          }

          run().catch(async (error) => {
            console.error(error && error.stack ? error.stack : error);
            await disconnect().catch(() => {});
            process.exitCode = 1;
          });
          EOF
          sed -i 's/^          //' tests/dashboardMealPlannerCanonicalGenericProducts.test.js

      - name: Validate canonical fix
        run: |
          node --check src/services/subscription/dashboardMealPlannerCanonicalService.js
          node --check tests/dashboardMealPlannerCanonicalGenericProducts.test.js
          node tests/dashboardMealPlannerCanonicalGenericProducts.test.js
          node tests/mealPlannerCardLifecycle.test.js

      - name: Commit fix
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-canonical-sourdough-meal-builder.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/services/subscription/dashboardMealPlannerCanonicalService.js \
            tests/dashboardMealPlannerCanonicalGenericProducts.test.js \
            .github/workflows/fix-canonical-sourdough-meal-builder.yml
          git diff --cached --check
          git commit -m "fix(meal-builder): accept sourdough in canonical direct cards"
          git push origin HEAD:main
