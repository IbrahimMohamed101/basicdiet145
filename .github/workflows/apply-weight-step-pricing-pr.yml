name: Verify weight step pricing

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.head_ref == 'agent/weight-step-pricing-active'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify weight pricing contracts
        run: npm run test:weight-pricing

      - name: Verify one-time menu contract
        run: npm run test:one-time-menu

      - name: Verify one-time order lifecycle
        run: npm run test:orders

      - name: Verify baseline tests
        run: npm test

      - name: Verify backend validation
        run: npm run validate:backend

      - name: Verify whitespace
        run: git diff --check origin/main...HEAD
