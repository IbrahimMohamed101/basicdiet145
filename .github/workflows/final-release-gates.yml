name: Final backend release gates

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: final-release-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      MONGO_URI: mongodb://127.0.0.1:27017/basicdiet_test
      MONGODB_URI: mongodb://127.0.0.1:27017/basicdiet_test
      MONGO_URI_TEST: mongodb://127.0.0.1:27017/basicdiet_test
      MONGOMS_VERSION: 7.0.14
      DASHBOARD_JWT_SECRET: release-gate-dashboard-secret
      JWT_SECRET: release-gate-app-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate backend syntax and composition
        run: npm run validate:backend

      - id: final_gates
        name: Capture final release gates
        shell: bash
        run: |
          set +e
          npm run test:release-gates > final-release-gates.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload final release gate diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: final-release-gates-log
          path: final-release-gates.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce final release gates
        run: |
          tail -n 250 final-release-gates.log
          test "${{ steps.final_gates.outputs.exit_code }}" = "0"
