name: Final backend release gates

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: final-release-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      MONGO_URI: mongodb://127.0.0.1:27017/basicdiet_test
      MONGODB_URI: mongodb://127.0.0.1:27017/basicdiet_test
      MONGOMS_VERSION: 7.0.14
      DASHBOARD_JWT_SECRET: release-gate-dashboard-secret
      JWT_SECRET: release-gate-app-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run final release gates
        shell: bash
        run: |
          set -o pipefail
          npm run test:release-gates 2>&1 | tee release-gates.log

      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: final-release-gates
          path: release-gates.log
          if-no-files-found: error
          retention-days: 2
