name: Final backend release gates

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: final-release-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NODE_ENV: test
      MONGOMS_VERSION: 7.0.14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate backend syntax and composition
        run: npm run validate:backend

      - name: Run final release gates
        run: npm run test:release-gates
