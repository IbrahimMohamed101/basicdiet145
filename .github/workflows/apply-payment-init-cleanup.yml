name: Verify Payment Reservation Cleanup

on:
  pull_request:
    branches: [main]
    paths:
      - "src/services/subscription/unifiedDayPaymentService.js"
      - "tests/subscriptionPaymentInitiationReservationCleanup.test.js"
      - ".github/workflows/apply-payment-init-cleanup.yml"

permissions:
  contents: read

jobs:
  focused-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: fix/payment-init-reservation-cleanup
          fetch-depth: 1
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run focused entitlement tests
        env:
          NODE_ENV: test
        run: |
          node tests/subscriptionMealEntitlementLifecycle.test.js
          node tests/subscriptionEntitlementReservationRecovery.test.js
          node tests/subscriptionPaymentInitiationReservationCleanup.test.js
