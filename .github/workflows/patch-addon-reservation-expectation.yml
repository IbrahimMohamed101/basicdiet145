name: Patch add-on reservation expectation

on:
  push:
    branches:
      - agent/dynamic-direct-meal-catalog-safe

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dynamic-direct-meal-catalog-safe
      - name: Align integration expectation with reservation lifecycle
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          target = Path('tests/subscriptionAddonEntitlementAuthority.integration.test.js')
          text = target.read_text()
          old = '    assert.strictEqual(repaired.addonBalance[0].consumedQty, 1);'
          new = '''    assert.strictEqual(repaired.addonBalance[0].consumedQty, 0, "Saving a future-day selection does not consume the add-on before fulfillment");
              assert.strictEqual(repaired.addonBalance[0].reservedQty, 1, "Saving a future-day selection reserves the included add-on");
              assert.strictEqual(
                repaired.addonBalance[0].purchasedQty,
                repaired.addonBalance[0].remainingQty + repaired.addonBalance[0].reservedQty + repaired.addonBalance[0].consumedQty,
                "Repaired add-on balance preserves the purchased = remaining + reserved + consumed invariant"
              );'''
          if text.count(old) != 1:
              raise SystemExit(f'Expected exactly one target assertion, found {text.count(old)}')
          target.write_text(text.replace(old, new, 1))

          workflow = Path('.github/workflows/patch-addon-reservation-expectation.yml')
          workflow.unlink()
          PY
      - name: Commit patch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/subscriptionAddonEntitlementAuthority.integration.test.js .github/workflows/patch-addon-reservation-expectation.yml
          git commit -m "test: align add-on reservation lifecycle expectation"
          git push origin HEAD:agent/dynamic-direct-meal-catalog-safe
