name: Apply add-on mobile visibility fix

on:
  push:
    branches:
      - agent/fix-addon-mobile-visibility

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-addon-mobile-visibility
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply backend visibility fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1))

          # Shared add-on choices filtering: inactive, archived, and soft-deleted
          # products/categories must never be selectable in the mobile app.
          replace_once(
              "src/services/subscription/subscriptionAddonChoicesService.js",
              '''function activePublishedQuery(extra = {}) {
            return {
              isActive: true,
              isVisible: { $ne: false },
              isAvailable: { $ne: false },
              publishedAt: { $ne: null },
              ...extra,
            };
          }''',
              '''function activePublishedQuery(extra = {}) {
            return {
              isActive: true,
              isVisible: { $ne: false },
              isAvailable: { $ne: false },
              isArchived: { $ne: true },
              archivedAt: null,
              isDeleted: { $ne: true },
              deletedAt: null,
              publishedAt: { $ne: null },
              ...extra,
            };
          }'''
          )

          replace_once(
              "src/services/subscription/subscriptionAddonChoicesService.js",
              '''    const addon = await AddonModel.findOne({ _id: productId, kind: "item" }).lean();
              if (addon && addon.isActive !== false) {''',
              '''    const addon = await AddonModel.findOne({
              _id: productId,
              kind: "item",
              isActive: true,
              isArchived: { $ne: true },
              archivedAt: null,
              isDeleted: { $ne: true },
              deletedAt: null,
            }).lean();
              if (addon) {'''
          )

          # Linked canonical catalog records must respect the same lifecycle.
          replace_once(
              "src/services/catalog/catalogAvailabilityService.js",
              '''function isCatalogItemUsable(catalogItem) {
            return Boolean(catalogItem)
              && catalogItem.isActive !== false
              && catalogItem.isAvailable !== false;
          }''',
              '''function isCatalogItemUsable(catalogItem) {
            return Boolean(catalogItem)
              && catalogItem.isActive !== false
              && catalogItem.isAvailable !== false
              && catalogItem.isArchived !== true
              && !catalogItem.archivedAt
              && catalogItem.isDeleted !== true
              && !catalogItem.deletedAt;
          }'''
          )

          # Persist lifecycle flags used by dashboard archive actions.
          replace_once(
              "src/models/MenuProduct.js",
              '''    isActive: { type: Boolean, default: true, index: true },
              isVisible: { type: Boolean, default: true, index: true },''',
              '''    isActive: { type: Boolean, default: true, index: true },
              isArchived: { type: Boolean, default: false, index: true },
              archivedAt: { type: Date, default: null },
              isDeleted: { type: Boolean, default: false, index: true },
              deletedAt: { type: Date, default: null },
              isVisible: { type: Boolean, default: true, index: true },'''
          )
          replace_once(
              "src/models/MenuCategory.js",
              '''    isActive: { type: Boolean, default: true, index: true },
              isVisible: { type: Boolean, default: true, index: true },''',
              '''    isActive: { type: Boolean, default: true, index: true },
              isArchived: { type: Boolean, default: false, index: true },
              archivedAt: { type: Date, default: null },
              isDeleted: { type: Boolean, default: false, index: true },
              deletedAt: { type: Date, default: null },
              isVisible: { type: Boolean, default: true, index: true },'''
          )
          replace_once(
              "src/models/CatalogItem.js",
              '''    isActive: { type: Boolean, default: true, index: true },
              isAvailable: { type: Boolean, default: true, index: true },''',
              '''    isActive: { type: Boolean, default: true, index: true },
              isArchived: { type: Boolean, default: false, index: true },
              archivedAt: { type: Date, default: null },
              isDeleted: { type: Boolean, default: false, index: true },
              deletedAt: { type: Date, default: null },
              isAvailable: { type: Boolean, default: true, index: true },'''
          )

          # Subscription purchase options also previously returned archived plans
          # and raw linked products without lifecycle filters.
          replace_once(
              "src/controllers/addonController.js",
              '''const {
            resolveDisplayCategoryForProduct,
          } = require("../services/subscription/subscriptionAddonChoicesService");''',
              '''const {
            resolveDisplayCategoryForProduct,
          } = require("../services/subscription/subscriptionAddonChoicesService");
          const {
            filterGloballyAvailable,
            loadCatalogItemsByIdForDocs,
          } = require("../services/catalog/catalogAvailabilityService");
          const {
            availableForChannelQuery,
          } = require("../services/subscription/subscriptionMenuEligibilityPolicyService");'''
          )

          replace_once(
              "src/controllers/addonController.js",
              '''  const addonDocs = await Addon.find({
              _id: { $in: addonIds },
              kind: "plan",
              isActive: true,
            }).lean();''',
              '''  const addonDocs = await Addon.find({
              _id: { $in: addonIds },
              kind: "plan",
              isActive: true,
              isArchived: { $ne: true },
              archivedAt: null,
              isDeleted: { $ne: true },
              deletedAt: null,
            }).lean();'''
          )

          replace_once(
              "src/controllers/addonController.js",
              '''  const menuProductDocs = allMenuProductIds.length
              ? await MenuProduct.find({ _id: { $in: allMenuProductIds } }).populate("categoryId").lean()
              : [];
            const menuProductById = new Map(
              menuProductDocs.map((p) => [String(p._id), p])
            );''',
              '''  const menuProductDocs = allMenuProductIds.length
              ? await MenuProduct.find({
                _id: { $in: allMenuProductIds },
                isActive: true,
                isVisible: { $ne: false },
                isAvailable: { $ne: false },
                isArchived: { $ne: true },
                archivedAt: null,
                isDeleted: { $ne: true },
                deletedAt: null,
                publishedAt: { $ne: null },
                ...availableForChannelQuery("one_time"),
              }).lean()
              : [];
            const categoryIds = [...new Set(menuProductDocs.map((p) => String(p.categoryId || "")).filter(Boolean))];
            const activeCategories = categoryIds.length
              ? await MenuCategory.find({
                _id: { $in: categoryIds },
                isActive: true,
                isVisible: { $ne: false },
                isAvailable: { $ne: false },
                isArchived: { $ne: true },
                archivedAt: null,
                isDeleted: { $ne: true },
                deletedAt: null,
                publishedAt: { $ne: null },
              }).lean()
              : [];
            const activeCategoryById = new Map(activeCategories.map((row) => [String(row._id), row]));
            const catalogItemsById = await loadCatalogItemsByIdForDocs(menuProductDocs);
            const selectableMenuProducts = filterGloballyAvailable(menuProductDocs, catalogItemsById)
              .filter((product) => activeCategoryById.has(String(product.categoryId)));
            const menuProductById = new Map(
              selectableMenuProducts.map((p) => [String(p._id), {
                ...p,
                categoryId: activeCategoryById.get(String(p.categoryId)),
              }])
            );'''
          )

          replace_once(
              "src/controllers/addonController.js",
              '''      menuProductIds: productIds.map(String),
              menuProductsCount: menuProducts.length,''',
              '''      menuProductIds: menuProducts.map((product) => String(product.id)),
              menuProductsCount: menuProducts.length,'''
          )

          # Extend fixture query emulation and add explicit archived/deleted rows.
          replace_once(
              "tests/subscription_addon_choices.test.js",
              '''    if (query.isActive === true && row.isActive === false) return false;
              if (query.isVisible && query.isVisible.$ne === false && row.isVisible === false) return false;''',
              '''    if (query.isActive === true && row.isActive === false) return false;
              if (query.isArchived && query.isArchived.$ne === true && row.isArchived === true) return false;
              if (query.archivedAt === null && row.archivedAt) return false;
              if (query.isDeleted && query.isDeleted.$ne === true && row.isDeleted === true) return false;
              if (query.deletedAt === null && row.deletedAt) return false;
              if (query.isVisible && query.isVisible.$ne === false && row.isVisible === false) return false;'''
          )

          # Add route-level regression assertions to the existing parity test.
          replace_once(
              "tests/addonDashboardMobileParity.test.js",
              '''  createDashboardAddonPlan,
              deleteDashboardAddonPlan,
              listDashboardAddonPlans,
              updateAddonPlan,
            } = require("../src/controllers/addonController");''',
              '''  createDashboardAddonPlan,
              deleteDashboardAddonPlan,
              getAddonSubscriptionOptions,
              listDashboardAddonPlans,
              updateAddonPlan,
            } = require("../src/controllers/addonController");'''
          )

          replace_once(
              "tests/addonDashboardMobileParity.test.js",
              '''    const archived = await invoke(deleteDashboardAddonPlan, { params: { id: created.body.data.id } });
              assert.strictEqual(archived.statusCode, 200);
              const afterArchiveChoices = await buildAddonChoicesCatalog({''',
              '''    await MenuProduct.updateOne(
              { _id: updatedIds[0] },
              { $set: { isActive: false } }
            );
            await MenuProduct.updateOne(
              { _id: updatedIds[1] },
              { $set: { isArchived: true, archivedAt: new Date() } }
            );

            const filteredOptions = await invoke(getAddonSubscriptionOptions, {
              query: { planId: String(basePlan._id) },
            });
            assert.strictEqual(filteredOptions.statusCode, 200, JSON.stringify(filteredOptions.body));
            const filteredPlan = filteredOptions.body.data.addons.find((row) => row.addonPlanId === created.body.data.id);
            assert(filteredPlan, "active add-on plan remains purchasable while it has selectable products");
            assert(!filteredPlan.menuProductIds.includes(String(updatedIds[0])), "inactive linked product is hidden from mobile options");
            assert(!filteredPlan.menuProductIds.includes(String(updatedIds[1])), "archived linked product is hidden from mobile options");
            assert(filteredPlan.menuProducts.every((product) => product.isActive !== false));

            const archived = await invoke(deleteDashboardAddonPlan, { params: { id: created.body.data.id } });
            assert.strictEqual(archived.statusCode, 200);
            const optionsAfterPlanArchive = await invoke(getAddonSubscriptionOptions, {
              query: { planId: String(basePlan._id) },
            });
            assert.strictEqual(optionsAfterPlanArchive.statusCode, 200);
            assert(!optionsAfterPlanArchive.body.data.addons.some((row) => row.addonPlanId === created.body.data.id),
              "archived add-on plans are hidden from mobile purchase options");

            const afterArchiveChoices = await buildAddonChoicesCatalog({'''
          )

          replace_once(
              "tests/addonDashboardMobileParity.test.js",
              '''      configuredIds.slice(0, 3).filter((id) => id !== String(eligibleProducts[4]._id)),
              "archiving the live plan must not replace the subscription snapshot"''',
              '''      configuredIds.slice(0, 3).filter((id) => (
                id !== String(eligibleProducts[4]._id)
                && id !== String(updatedIds[1])
              )),
              "historical plan snapshots remain intact while inactive or archived products are no longer selectable"'''
          )
          PY

      - name: Syntax and focused tests
        run: |
          node --check src/services/subscription/subscriptionAddonChoicesService.js
          node --check src/services/catalog/catalogAvailabilityService.js
          node --check src/controllers/addonController.js
          node --check src/models/MenuProduct.js
          node --check src/models/MenuCategory.js
          node --check src/models/CatalogItem.js
          node tests/subscription_addon_choices.test.js
          npm run test:addon-dashboard-mobile-parity
          npm run test:addon-credit-allocation
          npm run test:mobile-contracts
          npm test
          git diff --check

      - name: Commit tested change
        shell: bash
        run: |
          rm -f .github/workflows/apply-addon-visibility-fix.yml
          git config user.name "OpenAI Codex"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(addons): hide inactive and archived mobile items" \
            -m "Exclude inactive, archived, deleted, hidden, unavailable, and unpublished add-on products and categories from mobile choice and purchase endpoints." \
            -m "Keep historical entitlement snapshots intact while preventing unavailable records from being selected again."
          git push origin HEAD:agent/fix-addon-mobile-visibility
