name: Patch Meal Planner integration contract

on:
  pull_request:
    paths:
      - ".github/workflows/patch-meal-planner-integration-contract.yml"

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dynamic-direct-meal-catalog-safe
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Update canonical integration expectations
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          target = Path('tests/mealPlanner.integration.test.js')
          text = target.read_text()

          replacements = [
              (
                  "    assertEqual(Object.prototype.hasOwnProperty.call(defaultRes.body.data || {}, 'builderCatalogV2'), false, 'default response has no builderCatalogV2 mirror');\n    assertEqual(Object.prototype.hasOwnProperty.call(defaultRes.body.data || {}, 'plannerCatalog'), false, 'default response has no plannerCatalog mirror');",
                  "    assertTrue(!!defaultRes.body.data?.builderCatalogV2, 'default builderCatalogV2 compatibility catalog');\n    assertEqual(defaultRes.body.data?.builderCatalogV2?.catalogVersion, 'meal_planner_menu.v2', 'default builderCatalogV2 contract');\n    assertTrue(!!defaultRes.body.data?.plannerCatalog, 'default plannerCatalog alias');\n    assertEqual(defaultRes.body.data?.plannerCatalog?.contractVersion, 'meal_planner_menu.v3', 'default plannerCatalog v3 contract');",
              ),
              (
                  "      assertEqual(rejected.body.error.code, 'MEAL_SLOT_COUNT_EXCEEDED', 'over maxConsumableMealsNow error');",
                  "      assertEqual(rejected.body.error.code, 'MEAL_PLANNING_LIMIT_EXCEEDED', 'over subscription planning allowance error');",
              ),
              (
                  "    startDate: startDate, endDate: endDate, status: 'active',\n    totalMeals: totalMeals,",
                  "    startDate: startDate, endDate: endDate, status: 'active',\n    contractMode: 'canonical',\n    totalMeals: totalMeals,",
              ),
              (
                  "    assertEqual(Number(shrimpBalance?.remainingQty || 0), 1, 'shrimp balance decremented once for premium meal');\n    assertEqual(Number(saladBalance?.remainingQty || 0), 0, 'salad entitlement decremented');",
                  "    assertEqual(Number(shrimpBalance?.remainingQty || 0), 2, 'shrimp balance is not deducted before confirmation');\n    assertEqual(Number(shrimpBalance?.reservedQty || 0), 0, 'shrimp balance is not reserved before confirmation');\n    assertEqual(Number(saladBalance?.remainingQty || 0), 1, 'salad entitlement is not deducted before confirmation');\n    assertEqual(Number(saladBalance?.reservedQty || 0), 0, 'salad entitlement is not reserved before confirmation');",
              ),
              (
                  "        oneTimeAddonSelections: pendingSelections.map((item) => ({\n          addonId: String(item.addonId),\n          name: item.name,\n          category: item.category,\n          unitPriceHalala: Number(item.priceHalala || 0),\n          currency: item.currency || 'SAR',\n        })),\n        paymentUrl: 'https://example.com/pay',",
                  "        oneTimeAddonSelections: pendingSelections.map((item) => ({\n          addonSelectionId: String(item._id),\n          addonId: String(item.addonId),\n          name: item.name,\n          category: item.category,\n          priceHalala: Number(item.priceHalala || item.unitPriceHalala || 0),\n          currency: item.currency || 'SAR',\n          source: 'pending_payment',\n        })),\n        totalHalala: pendingSelections.reduce((sum, item) => sum + Number(item.priceHalala || item.unitPriceHalala || 0), 0),\n        paymentUrl: 'https://example.com/pay',",
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one match, found {count}: {old[:100]}')
              text = text.replace(old, new, 1)

          target.write_text(text)
          PY
      - name: Run focused integration suite
        id: focused
        continue-on-error: true
        shell: bash
        env:
          NODE_ENV: test
          USE_MONGODB_MEMORY_REPLSET: "true"
          JWT_SECRET: supersecret
          DASHBOARD_JWT_SECRET: dashboardsecret
        run: |
          set -o pipefail
          npm run test:integration 2>&1 | tee meal-planner-integration.log
      - name: Upload focused integration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meal-planner-integration-log
          path: meal-planner-integration.log
      - name: Enforce focused integration result
        if: steps.focused.outcome != 'success'
        run: exit 1
      - name: Remove temporary workflow and commit
        if: success()
        shell: bash
        run: |
          rm .github/workflows/patch-meal-planner-integration-contract.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/mealPlanner.integration.test.js .github/workflows/patch-meal-planner-integration-contract.yml
          git commit -m "test: align meal planner integration with canonical contracts"
          git push origin HEAD:agent/dynamic-direct-meal-catalog-safe
