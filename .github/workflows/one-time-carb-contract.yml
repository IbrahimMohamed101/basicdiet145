name: One-time carb contract

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/routes/index.js"
      - "src/services/orders/orderMenuService.js"
      - "src/services/installOneTimeCarbGramContract.js"
      - "tests/oneTimeCarbGramContract.test.js"
      - ".github/workflows/one-time-carb-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NODE_ENV: test
      MONGOMS_VERSION: 7.0.14
      DASHBOARD_JWT_SECRET: one-time-carb-dashboard-secret
      JWT_SECRET: one-time-carb-app-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Validate syntax
        run: |
          node -c src/services/orders/orderMenuService.js
          node -c src/services/installOneTimeCarbGramContract.js
          node -c src/routes/index.js

      - name: Verify complete one-time carb response and pricing
        run: node tests/oneTimeCarbGramContract.test.js

      - name: Core unit smoke
        run: npm test

      - name: One-time menu catalog
        run: npm run test:one-time-menu

      - id: mobile_response
        name: Capture mobile response contracts
        shell: bash
        run: |
          set +e
          node tests/mobileApiContracts.test.js > mobile-response-contract.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload mobile response diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: mobile-response-contract-log
          path: mobile-response-contract.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce mobile response contracts
        run: |
          cat mobile-response-contract.log
          test "${{ steps.mobile_response.outputs.exit_code }}" = "0"

      - name: Mobile auth password refresh
        run: node tests/mobileAuthPasswordRefresh.test.js

      - name: Fulfillment status endpoint
        run: node tests/fulfillmentStatusEndpoint.test.js

      - name: Fulfillment contract
        run: node tests/fulfillmentContract.test.js

      - name: Weekly menu dashboard
        run: npm run test:weekly-menu-dashboard

      - name: Payment init safety
        run: npm run test:payment-init-logging

      - name: Menu identity mapping
        run: npm run test:menu-identity

      - name: Dashboard menu identity
        run: npm run test:dashboard-menu-identity

      - name: Menu identity suggestions
        run: npm run test:menu-identity-suggestions

      - name: Menu identity approval
        run: npm run test:menu-identity-suggestions-approval

      - name: Moyasar retry safety
        run: node tests/moyasar_retry.test.js
