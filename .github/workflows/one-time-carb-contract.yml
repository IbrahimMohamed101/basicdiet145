name: One-time carb contract

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/routes/index.js"
      - "src/services/orders/orderMenuService.js"
      - "src/services/installOneTimeCarbGramContract.js"
      - "tests/oneTimeCarbGramContract.test.js"
      - "tests/mobileApiContracts.test.js"
      - ".github/workflows/one-time-carb-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_ENV: test
      MONGOMS_VERSION: 7.0.14
      DASHBOARD_JWT_SECRET: one-time-carb-dashboard-secret
      JWT_SECRET: one-time-carb-app-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Validate syntax
        run: |
          node -c src/services/orders/orderMenuService.js
          node -c src/services/installOneTimeCarbGramContract.js
          node -c src/routes/index.js
          node -c tests/oneTimeCarbGramContract.test.js
          node -c tests/mobileApiContracts.test.js

      - id: carb_contract
        name: Capture Basic Meal carb contract
        shell: bash
        run: |
          set +e
          node tests/oneTimeCarbGramContract.test.js > basic-meal-carb-contract.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Basic Meal carb diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: basic-meal-carb-contract-log
          path: basic-meal-carb-contract.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce Basic Meal carb contract
        run: |
          cat basic-meal-carb-contract.log
          test "${{ steps.carb_contract.outputs.exit_code }}" = "0"
