name: Prepare PR 25 for review

on:
  push:
    branches:
      - agent/fix-backend-contract-tests

permissions:
  pull-requests: write

jobs:
  ready:
    runs-on: ubuntu-latest
    steps:
      - name: Mark PR ready for review
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr ready 25 --repo "$GITHUB_REPOSITORY"
