name: Fix pickup ObjectId recursion

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-pickup-objectid-recursion.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Patch ObjectId recursion and add regression
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('src/services/installPickupCanonicalContract.js')
          text = path.read_text()
          old = '''function asId(value) {
            if (value === undefined || value === null || value === "") return null;
            if (value && typeof value === "object" && value._id) return asId(value._id);
            const text = clean(value);
            return text || null;
          }'''
          new = '''function asId(value) {
            if (value === undefined || value === null || value === "") return null;
            if (value && typeof value === "object") {
              if (typeof value.toHexString === "function") {
                const hex = clean(value.toHexString());
                if (hex) return hex;
              }
              const nestedId = value._id;
              if (nestedId !== undefined && nestedId !== null && nestedId !== value) {
                return asId(nestedId);
              }
            }
            const text = clean(value);
            return text || null;
          }'''
          if old not in text:
              raise SystemExit('asId patch target not found')
          path.write_text(text.replace(old, new, 1))

          test_path = Path('tests/pickupCanonicalObjectId.test.js')
          test_path.write_text('''"use strict";\n\nprocess.env.NODE_ENV = "test";\n\nconst assert = require("assert");\nconst mongoose = require("mongoose");\nconst { sourceSlotToPickupItem } = require("../src/services/installPickupCanonicalContract");\n\nconst productId = new mongoose.Types.ObjectId();\nlet item;\nassert.doesNotThrow(() => {\n  item = sourceSlotToPickupItem({\n    slotKey: "slot_1",\n    slotIndex: 1,\n    selectionType: "full_meal_product",\n    productId,\n    productNameI18n: { ar: "دجاج ترياكي", en: "Chicken Teriyaki" },\n  }, 0, {});\n});\nassert(item, "canonical item should be created");\nassert.strictEqual(item.product.id, productId.toHexString());\nconsole.log("pickup canonical ObjectId recursion check passed");\n''')

          package_path = Path('package.json')
          package_text = package_path.read_text()
          old_script = '"test:subscription-bilingual": "NODE_ENV=test node tests/subscriptionBilingualResponse.test.js && NODE_ENV=test node tests/pickupProductNameResponse.test.js",'
          new_script = '"test:subscription-bilingual": "NODE_ENV=test node tests/subscriptionBilingualResponse.test.js && NODE_ENV=test node tests/pickupProductNameResponse.test.js && NODE_ENV=test node tests/pickupCanonicalObjectId.test.js",'
          if old_script not in package_text:
              raise SystemExit('package script patch target not found')
          package_path.write_text(package_text.replace(old_script, new_script, 1))
          PY

      - name: Run focused regressions
        run: npm run test:subscription-bilingual

      - name: Commit production fix
        shell: bash
        run: |
          rm .github/workflows/fix-pickup-objectid-recursion.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/services/installPickupCanonicalContract.js tests/pickupCanonicalObjectId.test.js package.json .github/workflows/fix-pickup-objectid-recursion.yml
          git commit -m "fix(pickup): handle Mongoose ObjectId without recursion"
          git push origin HEAD:main
