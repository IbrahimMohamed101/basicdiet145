name: One-time menu deduplication

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/services/orders/orderMenuService.js"
      - "tests/oneTimeMenuDeduplication.test.js"
      - ".github/workflows/one-time-menu-deduplication.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Validate syntax
        run: node -c src/services/orders/orderMenuService.js

      - name: Verify one-time menu deduplication
        run: node tests/oneTimeMenuDeduplication.test.js
