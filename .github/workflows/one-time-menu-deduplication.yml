name: One-time menu contract

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/routes/index.js"
      - "src/services/installOneTimeCarbGramContract.js"
      - "src/services/orders/orderMenuService.js"
      - "tests/oneTimeCarbGramContract.test.js"
      - "tests/oneTimeMenuDeduplication.test.js"
      - ".github/workflows/one-time-menu-deduplication.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      MONGOMS_VERSION: 7.0.14
      DASHBOARD_JWT_SECRET: one-time-carb-dashboard-secret
      JWT_SECRET: one-time-carb-app-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --silent

      - name: Validate syntax
        run: |
          node -c src/routes/index.js
          node -c src/services/installOneTimeCarbGramContract.js
          node -c src/services/orders/orderMenuService.js
          node -c tests/oneTimeCarbGramContract.test.js

      - name: Verify one-time menu deduplication
        run: node tests/oneTimeMenuDeduplication.test.js

      - name: Verify one-time carb grams and pricing
        run: node tests/oneTimeCarbGramContract.test.js
