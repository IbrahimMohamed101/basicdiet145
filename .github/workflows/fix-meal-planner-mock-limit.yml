name: Fix meal planner query mock

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-meal-planner-mock-limit.yml

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --silent
      - name: Add limit to the Mongoose query mock
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('tests/meal_planner_types.test.js')
          text = path.read_text()
          old = '''    select() {
                return this;
              },
              lean() {'''
          new = '''    select() {
                return this;
              },
              limit() {
                return this;
              },
              lean() {'''
          if old not in text:
              raise SystemExit('mockQuery select/lean target not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - run: npm test
      - name: Commit test compatibility fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/meal_planner_types.test.js
          git commit -m "test: support limit in planner query mock"
          git push origin main
