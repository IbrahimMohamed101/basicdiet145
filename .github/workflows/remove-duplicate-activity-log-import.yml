name: Remove duplicate ActivityLog import

on:
  push:
    branches:
      - agent/dynamic-direct-meal-catalog-safe
    paths:
      - .github/workflows/remove-duplicate-activity-log-import.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dynamic-direct-meal-catalog-safe
          fetch-depth: 0
      - name: Remove exact duplicate import and self-delete
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          target = Path("tests/subscriptionBalancePolicy.test.js")
          text = target.read_text(encoding="utf-8")
          duplicate = 'const ActivityLog = require("../src/models/ActivityLog");\nconst ActivityLog = require("../src/models/ActivityLog");\n'
          if text.count(duplicate) != 1:
              raise SystemExit("Expected duplicate ActivityLog import exactly once")
          target.write_text(text.replace(duplicate, 'const ActivityLog = require("../src/models/ActivityLog");\n', 1), encoding="utf-8")
          Path(".github/workflows/remove-duplicate-activity-log-import.yml").unlink()
          PY
      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/subscriptionBalancePolicy.test.js .github/workflows/remove-duplicate-activity-log-import.yml
          git diff --cached --check
          git commit -m "Remove duplicate ActivityLog import"
          git push origin HEAD:agent/dynamic-direct-meal-catalog-safe
